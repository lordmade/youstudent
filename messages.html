<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Vynix · Messages</title>
    <script src="https://unpkg.com/feather-icons"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Grand+Hotel&display=swap" rel="stylesheet">
    <style>
        /* ── THEME SYSTEM ── */
        :root, [data-theme="light"] {
            --primary: #0095F6; /* Adjusted closer to IG blue for default */
            --primary-dark: #0077C5; 
            --primary-rgb: 0,149,246;
            --background: #FFFFFF; 
            --surface: #FFFFFF; 
            --surface2: #FAFAFA; 
            --surface3: #EFEFEF;
            --border: #DBDBDB; 
            --text-primary: #262626; 
            --text-secondary: #737373; 
            --text-muted: #8E8E8E;
            --like: #FF3040; 
            --online: #78DE45;
            --bubble-out: linear-gradient(135deg, #0095F6 0%, #2A54F5 100%);
            --bubble-in: #EFEFEF; 
            --bubble-out-text: #ffffff; 
            --bubble-in-text: #262626;
            --shadow: 0 1px 2px rgba(0,0,0,0.05); 
            --shadow-lg: 0 4px 12px rgba(0,0,0,0.08);
            --header-bg: rgba(255,255,255,0.95);
        }
        [data-theme="dark"] {
            --primary: #3797F0; 
            --primary-dark: #1877F2; 
            --primary-rgb: 55,151,240;
            --background: #000000; 
            --surface: #000000; 
            --surface2: #121212; 
            --surface3: #262626;
            --border: #262626; 
            --text-primary: #F5F5F5; 
            --text-secondary: #A8A8A8; 
            --text-muted: #737373;
            --like: #ED4956; 
            --online: #78DE45;
            --bubble-out: linear-gradient(135deg, #3797F0 0%, #5C33FF 100%); 
            --bubble-in: #262626; 
            --bubble-out-text: #ffffff; 
            --bubble-in-text: #F5F5F5;
            --shadow: 0 1px 2px rgba(255,255,255,0.05); 
            --shadow-lg: 0 4px 12px rgba(0,0,0,0.3);
            --header-bg: rgba(0,0,0,0.95);
        }
        [data-theme="midnight"] {
            --primary: #C084FC; --primary-dark: #A855F7; --primary-rgb: 192,132,252;
            --background: #09090B; --surface: #09090B; --surface2: #18181B; --surface3: #27272A;
            --border: #27272A; --text-primary: #FAFAFA; --text-secondary: #A1A1AA; --text-muted: #71717A;
            --like: #F472B6; --online: #10B981;
            --bubble-out: linear-gradient(135deg, #C084FC 0%, #9333EA 100%); --bubble-in: #27272A; --bubble-out-text: #ffffff; --bubble-in-text: #FAFAFA;
            --header-bg: rgba(9,9,11,0.95);
        }
        [data-theme="ocean"] {
            --primary: #06B6D4; --primary-dark: #0891B2; --primary-rgb: 6,182,212;
            --background: #F0F9FF; --surface: #F0F9FF; --surface2: #E0F2FE; --surface3: #BAE6FD;
            --border: #BAE6FD; --text-primary: #0C4A6E; --text-secondary: #0369A1; --text-muted: #7DD3FC;
            --like: #F43F5E; --online: #10B981;
            --bubble-out: linear-gradient(135deg, #06B6D4 0%, #0284C7 100%); --bubble-in: #E0F2FE; --bubble-out-text: #ffffff; --bubble-in-text: #0C4A6E;
            --header-bg: rgba(240,249,255,0.95);
        }
        [data-theme="rose"] {
            --primary: #E11D48; --primary-dark: #BE123C; --primary-rgb: 225,29,72;
            --background: #FFF1F2; --surface: #FFF1F2; --surface2: #FFE4E6; --surface3: #FECDD3;
            --border: #FECDD3; --text-primary: #881337; --text-secondary: #9F1239; --text-muted: #FDA4AF;
            --like: #E11D48; --online: #10B981;
            --bubble-out: linear-gradient(135deg, #E11D48 0%, #BE123C 100%); --bubble-in: #FFE4E6; --bubble-out-text: #ffffff; --bubble-in-text: #881337;
            --header-bg: rgba(255,241,242,0.95);
        }

        /* ── PREVENT LONG-PRESS SELECTION EVERYWHERE ── */
        *{ margin:0;padding:0;box-sizing:border-box; -webkit-tap-highlight-color:transparent; -webkit-touch-callout:none; -webkit-user-select:none; -moz-user-select:none; user-select:none; }
        .bubble, .msg-input, textarea, input[type="text"] { -webkit-user-select:text; -moz-user-select:text; user-select:text; }

        html,body{height:100%;overflow:hidden;}
        body{
            font-family:'Inter',sans-serif;
            background:var(--background);
            color:var(--text-primary);
            -webkit-font-smoothing:antialiased;
            transition:background 0.3s,color 0.3s;
        }

        @keyframes fadeUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
        @keyframes shimmer{0%{background-position:200% 0;}100%{background-position:-200% 0;}}
        @keyframes spin{to{transform:rotate(360deg);}}
        @keyframes msgIn{from{opacity:0;transform:translateY(8px) scale(0.98);}to{opacity:1;transform:translateY(0) scale(1);}}
        @keyframes typingBounce{0%,80%,100%{transform:translateY(0);opacity:.5;}40%{transform:translateY(-5px);opacity:1;}}
        @keyframes badgePop{from{transform:scale(0);}80%{transform:scale(1.15);}to{transform:scale(1);}}

        .shimmer{
            background:linear-gradient(90deg,var(--surface2) 25%,var(--surface3) 50%,var(--surface2) 75%);
            background-size:200% 100%;
            animation:shimmer 1.6s infinite;
            border-radius:6px;
        }

        /* ══ SHELL ══ */
        .app{
            display:flex;height:100dvh;
            max-width:1000px;margin:0 auto; /* Narrower max-width similar to IG Web */
            background:var(--surface);
        }
        @media(min-width: 1000px) {
            .app { border-left: 1px solid var(--border); border-right: 1px solid var(--border); }
        }

        /* ══ SIDEBAR ══ */
        .sidebar{
            width: 350px; flex-shrink: 0; display: flex; flex-direction: column;
            background: var(--surface); border-right: 1px solid var(--border);
            transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
        }
        @media(max-width:768px){
            .sidebar{position:fixed;inset:0;width:100%;z-index:10;}
            .sidebar.slide-out{transform:translateX(-100%);}
        }

        .sidebar-header{
            display:flex;align-items:center;justify-content:space-between;
            padding: calc(env(safe-area-inset-top) + 20px) 24px 16px;
            background:var(--surface);
            flex-shrink:0;position:sticky;top:0;z-index:100;
        }
        .header-left { display: flex; align-items: center; gap: 12px; }
        
        .sidebar-title{
            font-size:20px; font-weight:700; color:var(--text-primary); line-height:1;
        }
        
        .icon-btn{
            width:36px;height:36px;border-radius:50%;border:none;
            background:transparent;color:var(--text-primary);
            cursor:pointer;display:flex;align-items:center;justify-content:center;
            transition:background 0.2s,transform 0.1s;flex-shrink:0;
        }
        .icon-btn:hover{background:var(--surface2);}
        .icon-btn:active{transform:scale(0.95);}

        .conv-list-header {
            font-size: 16px; font-weight: 700; padding: 12px 24px 8px; color: var(--text-primary);
        }

        .conv-list{overflow-y:auto;flex:1;overscroll-behavior:contain;padding: 0 8px;}
        .conv-list::-webkit-scrollbar{width:0;}

        /* ── CONV ITEM (IG Style) ── */
        .conv-item{
            display:flex;align-items:center;gap:14px;
            padding:8px 16px; border-radius:8px;
            cursor:pointer;background:transparent;
            transition:background 0.2s ease;
            position:relative;animation:fadeUp 0.3s ease-out both;
        }
        .conv-item:hover{background:var(--surface2);}
        .conv-item.active{background:var(--surface3);}

        .conv-avatar-wrap{position:relative;flex-shrink:0;}
        .conv-avatar{
            width:56px;height:56px;border-radius:50%;object-fit:cover;
            background: var(--surface2);
        }
        /* Optional ring for unread stories/messages styling */
        .conv-item.unread .conv-avatar {
            padding: 2px; border: 2px solid var(--primary);
        }

        .conv-body{flex:1;min-width:0; display: flex; flex-direction: column; justify-content: center;}
        .conv-name{font-size:15px;font-weight:400;color:var(--text-primary);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
        .conv-item.unread .conv-name { font-weight: 600; }
        
        .conv-preview-row { display: flex; align-items: center; gap: 6px; margin-top: 4px; }
        .conv-preview{font-size:13px;color:var(--text-secondary);overflow:hidden;text-overflow:ellipsis;white-space:nowrap; flex: 1;}
        .conv-item.unread .conv-preview{color:var(--text-primary);font-weight:600;}
        .conv-time{font-size:13px;color:var(--text-secondary);flex-shrink:0;}
        
        .sidebar-typing { color: var(--text-secondary); font-style: italic; display: none; }
        .conv-item.is-typing .sidebar-typing { display: inline; }
        .conv-item.is-typing .preview-text { display: none; }

        .unread-dot {
            width: 8px; height: 8px; border-radius: 50%; background: var(--primary);
            display: none; flex-shrink: 0; animation: badgePop 0.3s ease-out;
        }
        .conv-item.unread .unread-dot { display: block; }

        /* ══ CHAT PANE ══ */
        .chat-pane{
            flex:1;display:flex;flex-direction:column;
            background:var(--background);min-width:0;position:relative;
        }
        @media(max-width:768px){
            .chat-pane{position:fixed;inset:0;z-index:200;transform:translateX(100%);transition:transform 0.3s cubic-bezier(0.4,0,0.2,1);}
            .chat-pane.open{transform:translateX(0);}
        }

        .chat-header{
            position:sticky;top:0;z-index:100;
            display:flex;align-items:center;gap:12px;
            padding:calc(env(safe-area-inset-top) + 16px) 20px 16px;
            background:var(--header-bg);
            backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
            border-bottom:1px solid var(--border);
        }
        .chat-back-btn{
            background:none;border:none;color:var(--text-primary);
            cursor:pointer;padding:8px;border-radius:50%;margin-left:-8px;
            display:none;align-items:center;justify-content:center;transition:background 0.2s;flex-shrink:0;
        }
        .chat-back-btn:hover{background:var(--surface2);}
        @media(max-width:768px){.chat-back-btn{display:flex;}}

        .chat-avatar-wrap{position:relative;flex-shrink:0;cursor:pointer;}
        .chat-avatar{width:44px;height:44px;border-radius:50%;object-fit:cover;}
        
        .chat-info{flex:1;min-width:0;cursor:pointer;display:flex;flex-direction:column;justify-content:center;}
        .chat-name{font-size:16px;font-weight:600;color:var(--text-primary);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;line-height:1.2;}
        .chat-sub{font-size:12px;color:var(--text-secondary);margin-top:2px;}
        .chat-sub.online-text{color:var(--text-secondary);} /* IG doesn't highlight online text heavily */
        
        .chat-actions{display:flex;gap:4px;align-items:center;}

        /* Messages Area */
        .messages-area{
            flex:1;overflow-y:auto;padding:20px;
            display:flex;flex-direction:column;gap:4px;overscroll-behavior:contain;
        }
        .messages-area::-webkit-scrollbar{width:0px;}

        /* Profile Header in Chat */
        .chat-profile-header {
            display: flex; flex-direction: column; align-items: center; padding: 40px 20px; text-align: center;
        }
        .chat-profile-header img { width: 96px; height: 96px; border-radius: 50%; object-fit: cover; margin-bottom: 12px; }
        .chat-profile-header .name { font-size: 20px; font-weight: 600; color: var(--text-primary); }
        .chat-profile-header .handle { font-size: 14px; color: var(--text-secondary); margin-top: 4px; }
        .chat-profile-header .btn { margin-top: 16px; background: var(--surface2); border: none; padding: 8px 16px; border-radius: 8px; font-weight: 600; font-size: 14px; cursor: pointer; color: var(--text-primary); transition: background 0.2s;}
        .chat-profile-header .btn:hover { background: var(--surface3); }

        .date-sep{
            align-self:center; color:var(--text-secondary);
            font-size:12px;font-weight:500;padding:6px 14px;margin:16px 0;
        }

        .msg-row{
            display:flex;align-items:flex-end;gap:8px;
            animation:msgIn 0.2s cubic-bezier(0.34,1.2,0.64,1);margin-bottom:2px;
        }
        .msg-row.out{flex-direction:row-reverse;}
        .msg-row.gap{margin-top:12px;}
        
        .msg-avatar-sm{width:28px;height:28px;border-radius:50%;object-fit:cover;flex-shrink:0;cursor:pointer;}
        .msg-avatar-sm.hidden{opacity:0;pointer-events:none;}
        .msg-row.out .msg-avatar-sm{display:none;}
        
        .msg-content{max-width:70%;display:flex;flex-direction:column;gap:2px;}
        .msg-row.out .msg-content{align-items:flex-end;}
        
        .bubble{
            padding:12px 16px;font-size:15px;line-height:1.4;
            word-break:break-word;
        }
        /* IG Style Bubbles */
        .msg-row.out .bubble{background:var(--bubble-out);color:var(--bubble-out-text);border-radius:22px 4px 22px 22px;}
        .msg-row.in .bubble{background:var(--bubble-in);color:var(--bubble-in-text);border-radius:4px 22px 22px 22px;}
        
        /* Single messages get fully rounded bubbles */
        .msg-row.out.single .bubble { border-radius: 22px; }
        .msg-row.in.single .bubble { border-radius: 22px; }

        /* Meta info hidden by default, shown on bubble hover or click if desired, IG keeps it minimal */
        .msg-meta{display:none; align-items:center;gap:4px;font-size:11px;color:var(--text-muted);padding:0 4px;margin-top:2px;}
        .msg-row:hover .msg-meta { display: flex; }
        .msg-row.out .msg-meta{flex-direction:row-reverse;}

        /* ── IN-CHAT TYPING INDICATOR ── */
        .typing-slot{display:none;align-items:flex-end;gap:8px;margin-top:12px;padding:0 20px 10px;}
        .typing-slot.show{display:flex;}
        .typing-avatar{width:28px;height:28px;border-radius:50%;object-fit:cover;}
        .typing-dots{background:var(--bubble-in);border-radius:22px;padding:14px 18px;display:flex;gap:4px;align-items:center;}
        .typing-dot{width:6px;height:6px;border-radius:50%;background:var(--text-secondary);animation:typingBounce 1.4s infinite ease-in-out both;}
        .typing-dot:nth-child(1){animation-delay:-0.32s;}
        .typing-dot:nth-child(2){animation-delay:-0.16s;}

        /* ── IG STYLE INPUT AREA ── */
        .input-area{
            padding: 12px 20px calc(env(safe-area-inset-bottom) + 16px);
            background:var(--background);
            display:flex;align-items:flex-end;gap:12px;flex-shrink:0;z-index:10;
        }
        .input-wrap{
            flex:1;display:flex;align-items:flex-end;background:transparent;
            border: 1px solid var(--border);
            border-radius:24px;padding:8px 12px;gap:8px;
            transition:border-color 0.2s;
        }
        .input-wrap:focus-within{border-color:var(--text-muted);}
        
        .attach-btn{
            background:none;border:none;color:var(--text-primary);cursor:pointer;
            padding:6px;display:flex;align-items:center;justify-content:center;
            border-radius:50%;flex-shrink:0; transition:background 0.2s;
        }
        .attach-btn:hover{background:var(--surface2);}
        
        .msg-input{
            flex:1;border:none;outline:none;background:transparent;
            font-size:15px;font-family:'Inter',sans-serif;color:var(--text-primary);
            resize:none;max-height:120px;line-height:1.4;padding:7px 0;
        }
        .msg-input::placeholder{color:var(--text-muted);}
        
        .send-btn-text{
            background:none;border:none;color:var(--primary);
            font-size:15px;font-weight:600;cursor:pointer;padding:7px 8px;
            display:none; transition:opacity 0.2s;
        }
        .send-btn-text:disabled{opacity:0.5;cursor:default;}
        .send-btn-text.show { display: block; }

        .chat-empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;color:var(--text-primary);}
        .chat-empty-icon{
            width:96px;height:96px;border-radius:50%;border:2px solid var(--text-primary);
            display:flex;align-items:center;justify-content:center;margin-bottom:16px;
        }
        .chat-empty h3{font-size:20px;font-weight:400;margin-bottom:8px;}
        .chat-empty p{font-size:14px;color:var(--text-secondary);}
        .chat-empty .btn { margin-top: 24px; background: var(--primary); color: white; border: none; padding: 10px 24px; border-radius: 8px; font-weight: 600; cursor: pointer; }

        /* ══ BOTTOM SHEET MODAL (New Chat) ══ */
        .modal-overlay{
            position:fixed;inset:0;z-index:1000;
            background:rgba(0,0,0,0.6);
            display:flex;align-items:flex-end;
            justify-content:center;
            opacity:0;pointer-events:none;transition:opacity 0.3s;
        }
        .modal-overlay.open{opacity:1;pointer-events:all;}
        .modal-box{
            background:var(--surface);
            border-radius:16px 16px 0 0;
            width:100%;max-width:600px;
            max-height:85vh;height:100%;
            display:flex;flex-direction:column;
            transform:translateY(100%);transition:transform 0.35s cubic-bezier(0.34,1.2,0.64,1);
            overflow:hidden;
            padding-bottom:env(safe-area-inset-bottom);
        }
        .modal-overlay.open .modal-box{transform:translateY(0);}
        .modal-header{
            display:flex;align-items:center;justify-content:space-between;
            padding:16px 20px;border-bottom:1px solid var(--border);
            flex-shrink:0;
        }
        .modal-title{font-size:16px;font-weight:600;color:var(--text-primary);text-align:center;flex:1;}
        .modal-close{background:none;border:none;color:var(--text-primary);cursor:pointer;padding:4px;display:flex;}
        
        .modal-search{padding:12px 16px;flex-shrink:0;border-bottom:1px solid var(--border);}
        .modal-search-inner{display:flex;align-items:center;gap:10px;}
        .modal-search-label { font-size: 15px; font-weight: 600; color: var(--text-primary); }
        .modal-search-input{flex:1;border:none;outline:none;background:transparent;font-size:15px;font-family:'Inter',sans-serif;color:var(--text-primary);}
        .modal-search-input::placeholder{color:var(--text-muted);}
        
        .users-list{overflow-y:auto;flex:1;padding:8px;}
        .users-list::-webkit-scrollbar{width:0;}
        .user-item{
            display:flex;align-items:center;gap:12px;padding:8px 16px;
            cursor:pointer;transition:background 0.2s;
        }
        .user-item:hover{background:var(--surface2);}
        .user-item-avatar{width:44px;height:44px;border-radius:50%;object-fit:cover;flex-shrink:0;}
        .user-item-info{flex:1;min-width:0;}
        .user-item-name{font-size:14px;font-weight:600;color:var(--text-primary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
        .user-item-username{font-size:14px;color:var(--text-secondary);margin-top:2px;}
        
        .user-item-loading{display:flex;align-items:center;justify-content:center;padding:30px;color:var(--text-muted);font-size:14px;flex-direction:column;gap:10px;}
        .spinner{width:28px;height:28px;border:3px solid var(--border);border-top-color:var(--text-primary);border-radius:50%;animation:spin 0.8s linear infinite;}

        /* Image Modal */
        .avatar-modal{
            position:fixed;inset:0;z-index:2000;
            background:rgba(0,0,0,0.92);
            display:flex;align-items:center;justify-content:center;
            opacity:0;pointer-events:none;transition:opacity 0.25s;
            padding:20px;
        }
        .avatar-modal.open{opacity:1;pointer-events:all;}
        .avatar-modal-img{
            max-width:100%;max-height:90vh;
            border-radius:8px;object-fit:contain;
            transform:scale(0.9);transition:transform 0.3s cubic-bezier(0.34,1.2,0.64,1);
        }
        .avatar-modal.open .avatar-modal-img{transform:scale(1);}
        .avatar-modal-close{
            position:absolute;top:calc(env(safe-area-inset-top) + 16px);right:16px;
            width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,0.15);
            border:none;color:white;cursor:pointer;
            display:flex;align-items:center;justify-content:center;
        }
    </style>
</head>
<body>

<div class="avatar-modal" id="avatar-modal" onclick="closeAvatarModal()">
    <button class="avatar-modal-close" onclick="closeAvatarModal()">
        <i data-feather="x" style="width:24px;height:24px;"></i>
    </button>
    <img class="avatar-modal-img" id="avatar-modal-img" src="" alt="">
</div>

<div class="modal-overlay" id="new-chat-modal" onclick="onNewChatOverlayClick(event)">
    <div class="modal-box">
        <div class="modal-header">
            <div style="width:24px;"></div>
            <span class="modal-title">New message</span>
            <button class="modal-close" onclick="closeNewChat()">
                <i data-feather="x" style="width:24px;height:24px;"></i>
            </button>
        </div>
        <div class="modal-search">
            <div class="modal-search-inner">
                <span class="modal-search-label">To:</span>
                <input class="modal-search-input" id="new-chat-search" placeholder="Search..." oninput="filterUsers(this.value)">
            </div>
        </div>
        <div class="users-list" id="users-list">
            <div class="user-item-loading">
                <div class="spinner"></div>
            </div>
        </div>
    </div>
</div>

<div class="app">
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="header-left">
                <button class="icon-btn" onclick="window.location.href='index.html'" title="Back">
                    <i data-feather="arrow-left" style="width:24px;height:24px;"></i>
                </button>
                <span class="sidebar-title" id="me-username">Messages</span>
            </div>
            <button class="icon-btn" onclick="openNewChat()" title="New Message">
                <i data-feather="edit" style="width:24px;height:24px;"></i>
            </button>
        </div>
        <div class="conv-list-header">Messages</div>
        <div class="conv-list" id="conv-list">
            <div id="skeletons">

const CLOUDINARY_CLOUD='dqkujefxj', CLOUDINARY_PRESET='banter_box';
const fbCfg={apiKey:"AIzaSyBOyZ3As4GTuNvjemvPF_SpsC6m6vqtNhc",authDomain:"fire-b-a8878.firebaseapp.com",databaseURL:"https://fire-b-a8878.firebaseio.com",projectId:"fire-b-a8878",storageBucket:"fire-b-a8878.appspot.com",messagingSenderId:"658673187627",appId:"1:658673187627:web:6e4c29af661785f0afa36e"};

// ── ENCRYPTION ──
const IDB_DB='vynix-e2e', IDB_STORE='keys';
function openIDB(){return new Promise((res,rej)=>{const r=indexedDB.open(IDB_DB,1);r.onupgradeneeded=e=>e.target.result.createObjectStore(IDB_STORE);r.onsuccess=e=>res(e.target.result);r.onerror=e=>rej(e.target.error);});}
async function idbGet(k){const d=await openIDB();return new Promise((res,rej)=>{const r=d.transaction(IDB_STORE,'readonly').objectStore(IDB_STORE).get(k);r.onsuccess=e=>res(e.target.result);r.onerror=e=>rej(e.target.error);});}
async function idbSet(k,v){const d=await openIDB();return new Promise((res,rej)=>{const tx=d.transaction(IDB_STORE,'readwrite');tx.objectStore(IDB_STORE).put(v,k);tx.oncomplete=res;tx.onerror=e=>rej(e.target.error);});}
const b64e=b=>btoa(String.fromCharCode(...new Uint8Array(b)));
const b64d=s=>Uint8Array.from(atob(s),c=>c.charCodeAt(0));
async function getOrCreateKP(uid){const stored=await idbGet(`kp-${uid}`);if(stored)return stored;const kp=await crypto.subtle.generateKey({name:'ECDH',namedCurve:'P-256'},true,['deriveKey','deriveBits']);await idbSet(`kp-${uid}`,kp);return kp;}
async function exportPub(kp){return b64e(await crypto.subtle.exportKey('spki',kp.publicKey));}
async function importPub(b64){return crypto.subtle.importKey('spki',b64d(b64),{name:'ECDH',namedCurve:'P-256'},true,[]);}
const skCache={};
async function getSharedKey(myKp,otherPubB64){if(skCache[otherPubB64])return skCache[otherPubB64];const pub=await importPub(otherPubB64);const bits=await crypto.subtle.deriveBits({name:'ECDH',public:pub},myKp.privateKey,256);const k=await crypto.subtle.importKey('raw',bits,{name:'AES-GCM',length:256},false,['encrypt','decrypt']);skCache[otherPubB64]=k;return k;}
async function encMsg(sk,plain){const iv=crypto.getRandomValues(new Uint8Array(12));const ct=await crypto.subtle.encrypt({name:'AES-GCM',iv},sk,new TextEncoder().encode(plain));return{iv:b64e(iv),ct:b64e(ct)};}
async function decMsg(sk,ivB64,ctB64){try{const pt=await crypto.subtle.decrypt({name:'AES-GCM',iv:b64d(ivB64)},sk,b64d(ctB64));return new TextDecoder().decode(pt);}catch{return'🔒 (encrypted on another device)';}}

let me=null,meData=null,myKP=null;
let chatId=null,otherUid=null,otherData=null,chatSK=null;
let allConvs=[],allUsers=[],loadedIds=new Set(),typingTimer=null,presenceRef=null;
let activeTypingListeners = new Set(); 

onAuthStateChanged(auth,async user=>{

// ── DEVICE BACK BUTTON ──
window.addEventListener('popstate', () => {

// ── PRESENCE ──
function setupMyPresence() {
    const myConnectionsRef = ref(db, `users/${me.uid}/online`);
    const lastSeenRef = ref(db, `users/${me.uid}/lastSeen`);
    const connectedRef = ref(db, '.info/connected');
    onValue(connectedRef, (snap) => {
        if (snap.val() === true) {
            onDisconnect(myConnectionsRef).set(false);
            onDisconnect(lastSeenRef).set(serverTimestamp());
            set(myConnectionsRef, true);
        }
    });
}

async function loadMe(){
    const s=await get(ref(db,`users/${me.uid}`));
    meData=s.val()||{uid:me.uid,displayName:'User',username:'user',photoURL:au({uid:me.uid})};
    document.getElementById('me-username').textContent = meData.username || 'Messages';
}
async function setupKeys(){myKP=await getOrCreateKP(me.uid);const pub=await exportPub(myKP);const snap=await get(ref(db,`users/${me.uid}/pubKey`));if(!snap.exists()||snap.val()!==pub)await update(ref(db,`users/${me.uid}`),{pubKey:pub});}
async function deriveSharedKey(uid){const snap=await get(ref(db,`users/${uid}/pubKey`));if(!snap.exists())return null;return getSharedKey(myKP,snap.val());}

// ── CONV LIST ──
function listenConvs(){
    onValue(ref(db,`userChats/${me.uid}`),async snap=>{
        document.getElementById('skeletons')?.remove();
        if(!snap.exists()){document.getElementById('conv-list').innerHTML='';allConvs=[];return;}
        const entries=[],ps=[];
        snap.forEach(child=>{
            const d={chatId:child.key,...child.val()};
            ps.push((async()=>{
                if(!d.otherUid)return;
                const us=await get(ref(db,`users/${d.otherUid}`));
                d.od=us.val()||{displayName:'User',photoURL:au({uid:d.otherUid}),username:'user'};
                if(d.lastIv&&d.lastCt){try{const sk=await deriveSharedKey(d.otherUid);d.lastMsg=sk?await decMsg(sk,d.lastIv,d.lastCt):'🔒 Encrypted';}catch{d.lastMsg='🔒 Encrypted';}}
                else d.lastMsg=d.lastMsg||'';
                entries.push(d);
            })());
        });
        await Promise.all(ps);
        entries.sort((a,b)=>(b.lastTs||0)-(a.lastTs||0));
        allConvs=entries;renderConvList(entries);
    });
}

function renderConvList(convs){
    const list=document.getElementById('conv-list');
    list.innerHTML='';
    convs.forEach((c,i)=>{
        const u=c.od||{},photo=u.photoURL||au(u),name=u.displayName||u.username||'User',unread=c.unreadCount||0,isAct=c.chatId===chatId;
        const item=document.createElement('div');
        item.className=`conv-item${isAct?' active':''}${unread>0?' unread':''}`;
        item.id=`conv-${c.chatId}`;

        if (!activeTypingListeners.has(c.chatId)) {
            activeTypingListeners.add(c.chatId);
            onValue(ref(db, `messages/${c.chatId}/typing/${c.otherUid}`), snap => {
                const el = document.getElementById(`conv-${c.chatId}`);
                if (el) {
                    if (snap.exists()) el.classList.add('is-typing');
                    else el.classList.remove('is-typing');
                }
            });
        }

        const timeStr = fmtTime(c.lastTs);
        item.innerHTML=`
            <div class="conv-avatar-wrap">
                <img class="conv-avatar" src="${photo}" alt="">
            </div>
            <div class="conv-body">
                <div class="conv-name">${esc(name)}</div>
                <div class="conv-preview-row">
                    <span class="conv-preview">
                        <span class="sidebar-typing">typing...</span>
                        <span class="preview-text">${esc(c.lastMsg||'Started a chat')}</span>
                    </span>
                    ${timeStr ? `<span class="conv-time">· ${timeStr}</span>` : ''}
                </div>
            </div>
            <div class="unread-dot"></div>
        `;
        item.addEventListener('click',()=>openChat(c.chatId,c.otherUid));
        list.appendChild(item);
    });
}

// ── NEW CHAT MODAL ──
window.openNewChat = async () => {
    const modal = document.getElementById('new-chat-modal');

    history.pushState({ page: 'new-chat-modal' }, '');

window.closeNewChat = () => {
    document.getElementById('new-chat-modal').classList.remove('open');

};

window.onNewChatOverlayClick = (e) => {

window.filterUsers = (q) => {

function renderUsersList(users) {

async function startChatWith(user) {
    closeNewChat();
    const chatIdNew = [me.uid, user.uid].sort().join('_');
    await openChat(chatIdNew, user.uid);
    const updates = {};
    const myEntry = await get(ref(db, `userChats/${me.uid}/${chatIdNew}`));
    if (!myEntry.exists()) {
        updates[`userChats/${me.uid}/${chatIdNew}`] = { otherUid: user.uid, lastTs: Date.now(), lastMsg: '', unreadCount: 0 };
    }
    const theirEntry = await get(ref(db, `userChats/${user.uid}/${chatIdNew}`));
    if (!theirEntry.exists()) {
        updates[`userChats/${user.uid}/${chatIdNew}`] = { otherUid: me.uid, lastTs: Date.now(), lastMsg: '', unreadCount: 0 };
    }
    if (Object.keys(updates).length) await update(ref(db), updates);
}

// ── AVATAR MODAL ──

// ── DELETE CHAT ──
window.deleteCurrentChat = async () => {
    if(!chatId) return;
    if(!confirm(`Delete conversation with ${otherData?.displayName || 'this user'}?`)) return;

// ── OPEN CHAT ──
window.openChat=async(cid,uid)=>{
    if(chatId&&chatId!==cid){try{off(ref(db,`messages/${chatId}/msgs`));off(ref(db,`messages/${chatId}/typing/${uid}`));if(presenceRef) off(presenceRef);}catch{}loadedIds.clear();}
    chatId=cid;otherUid=uid;
    document.querySelectorAll('.conv-item').forEach(el=>el.classList.remove('active'));

    // Add Profile Header Inside Chat

        <div class="chat-profile-header">
            <img src="${otherData.photoURL||au(otherData)}" alt="">

            <button class="btn" onclick="goToOtherProfile()">View Profile</button>
        </div>
    `;

    if(window.innerWidth<=768){
        document.getElementById('chat-pane').classList.add('open');

    await update(ref(db,`userChats/${me.uid}/${cid}`),{unreadCount:0}).catch(()=>{});

window.closeChat=()=>{
    document.getElementById('chat-pane').classList.remove('open');

    document.getElementById('chat-view').style.display='none';

// ── MESSAGES ──
function listenMsgs(cid){
    loadedIds.clear();
    onChildAdded(ref(db,`messages/${cid}/msgs`),async snap=>{
        if(loadedIds.has(snap.key))return;
        loadedIds.add(snap.key);
        await renderMsg({id:snap.key,...snap.val()});scrollBot();
        const msg = snap.val();
        if(msg.senderId!==me.uid&&chatId===cid) update(ref(db,`userChats/${me.uid}/${cid}`),{unreadCount:0}).catch(()=>{});
    });
}

async function renderMsg(msg){
    const area=document.getElementById('messages-area'),isMine=msg.senderId===me.uid;
    const msgDate=new Date(msg.timestamp||Date.now()).toDateString();
    const lastSep=area.querySelector('.date-sep:last-of-type');
    
    if(!lastSep||lastSep.dataset.date!==msgDate){
        const s=document.createElement('div');s.className='date-sep';
        s.dataset.date=msgDate;s.textContent=fmtDateSep(msg.timestamp);
        area.appendChild(s);
    }
    
    // Grouping check for border radius
    const prevRow=area.querySelector('.msg-row:last-of-type');
    const prevSender=prevRow?.dataset.sender;
    const isSingle = prevSender !== msg.senderId;

    const row=document.createElement('div');
    row.className=`msg-row ${isMine?'out':'in'} ${isSingle ? 'single gap' : ''}`;
    row.dataset.sender=msg.senderId;row.id=`msg-${msg.id}`;
    
    const avSrc=isMine?(meData?.photoURL||au(meData)):(otherData?.photoURL||au(otherData));
    const showAv = !isMine && isSingle;

    let displayText='',isImg=false;
    if(msg.iv&&msg.ct){displayText=chatSK?await decMsg(chatSK,msg.iv,msg.ct):'🔒 Encrypted';}
    else if(msg.imageUrl){isImg=true;displayText=msg.imageUrl;}
    else displayText=msg.text||'';

    const bubbleHTML=isImg?`<img class="bubble-img" src="${displayText}" alt="" style="max-width:240px;border-radius:12px;cursor:pointer;border:1px solid var(--border);" onclick="openAvatarModal('${displayText}')">`:`<div class="bubble">${esc(displayText).replace(/\n/g,'<br>')}</div>`;
    
    const delBtn = isMine ? `<span style="cursor:pointer; color:var(--text-muted);" onclick="deleteMsg('${msg.id}')" title="Delete"><i data-feather="trash-2" style="width:14px;height:14px;"></i></span>` : '';

    row.innerHTML=`
        ${!isMine?`<img class="msg-avatar-sm${showAv?'':' hidden'}" src="${avSrc}" alt="">`:''}
        <div class="msg-content">
            ${bubbleHTML}
            <div class="msg-meta">
                <span>${fmtMsgTime(msg.timestamp)}</span>
                ${delBtn}
            </div>
        </div>`;
    area.appendChild(row);
    if(isMine) feather.replace();
}
function scrollBot(){const a=document.getElementById('messages-area');if(a)a.scrollTo({top:a.scrollHeight,behavior:'smooth'});}

window.deleteMsg = async (msgId) => {
    if (!chatId) return;
    try {
        await remove(ref(db, `messages/${chatId}/msgs/${msgId}`));
        const msgEl = document.getElementById(`msg-${msgId}`);
        if (msgEl) msgEl.remove();
    } catch (err) {}
};

// ── SEND MESSAGE & TYPING ──
window.sendMessage=async()=>{
    const input=document.getElementById('msg-input'),text=input.value.trim();
    if(!text||!chatId)return;
    input.value='';resizeInput();document.getElementById('send-btn').classList.remove('show');stopTyping();
    const ts=Date.now();let msgData={senderId:me.uid,timestamp:ts};let previewUpdates={lastTs:ts};
    if(chatSK){const enc=await encMsg(chatSK,text);msgData.iv=enc.iv;msgData.ct=enc.ct;const pEnc=await encMsg(chatSK,text);previewUpdates.lastIv=pEnc.iv;previewUpdates.lastCt=pEnc.ct;previewUpdates.lastMsg='';}
    else{msgData.text=text;previewUpdates.lastMsg=text;}
    await push(ref(db,`messages/${chatId}/msgs`),msgData);
    const ocSnap=await get(ref(db,`userChats/${otherUid}/${chatId}`));
    const pU=(ocSnap.exists()?ocSnap.val().unreadCount:0)||0;
    const upd={};
    upd[`userChats/${me.uid}/${chatId}`]={...previewUpdates,otherUid,unreadCount:0};
    upd[`userChats/${otherUid}/${chatId}`]={...previewUpdates,otherUid:me.uid,unreadCount:pU+1};
    await update(ref(db),upd);
};
window.onMsgInput=()=>{
    resizeInput();
    const has=document.getElementById('msg-input').value.trim().length>0;
    const btn = document.getElementById('send-btn');
    if(has) { btn.classList.add('show'); startTyping(); } 
    else { btn.classList.remove('show'); stopTyping(); }
};
window.onMsgKeydown=e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();}};
function resizeInput(){const el=document.getElementById('msg-input');el.style.height='auto';el.style.height=Math.min(el.scrollHeight,120)+'px';}
function startTyping(){if(!chatId)return;set(ref(db,`messages/${chatId}/typing/${me.uid}`),true);clearTimeout(typingTimer);typingTimer=setTimeout(stopTyping,3000);}
function stopTyping(){if(!chatId)return;remove(ref(db,`messages/${chatId}/typing/${me.uid}`));clearTimeout(typingTimer);}
function listenTyping(cid,uid){onValue(ref(db,`messages/${cid}/typing/${uid}`),snap=>{const sl=document.getElementById('typing-slot');if(snap.exists()){sl.classList.add('show');scrollBot();}else sl.classList.remove('show');});}

// ── SEND IMAGE ──
window.handleImgAttach = async (e) => {
    const file = e.target.files[0];
    if (!file || !chatId) return;
    
    const attachBtn = document.querySelector('.attach-btn');
    attachBtn.style.opacity = '0.5'; 
    
    const fd = new FormData();
    fd.append('file', file);
    fd.append('upload_preset', CLOUDINARY_PRESET);

    try {
        const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD}/image/upload`, {
            method: 'POST',
            body: fd
        });
        const data = await res.json();
        
        if (data.secure_url) {
            const ts = Date.now();
            const msgData = { senderId: me.uid, timestamp: ts, imageUrl: data.secure_url };
            await push(ref(db, `messages/${chatId}/msgs`), msgData);

            const ocSnap = await get(ref(db, `userChats/${otherUid}/${chatId}`));
            const pU = (ocSnap.exists() ? ocSnap.val().unreadCount : 0) || 0;
            const upd = {};
            upd[`userChats/${me.uid}/${chatId}`] = { lastTs: ts, lastMsg: 'Sent an image', otherUid, unreadCount: 0 };
            upd[`userChats/${otherUid}/${chatId}`] = { lastTs: ts, lastMsg: 'Sent an image', otherUid: me.uid, unreadCount: pU + 1 };
            await update(ref(db), upd);
            
            scrollBot();
        }
    } catch (err) {
        console.error("Image upload failed", err);
    } finally {
        attachBtn.style.opacity = '1';
        e.target.value = ''; 
    }
};

window.goToOtherProfile = () => { if(otherData?.username) window.location.href=`profile.html?id=${otherUid}`; };

// Helpers
function esc(s){const d=document.createElement('div');d.textContent=s||'';return d.innerHTML;}
function au(u){return`https://ui-avatars.com/api/?name=${encodeURIComponent((u&&(u.displayName||u.username||u.uid||'U')))}&background=random`;}
function fmtTime(ts){
    if(!ts)return'';
    const d=new Date(ts),now=new Date(),diff=now-d;
    const mins = Math.floor(diff/60000), hrs = Math.floor(mins/60), days = Math.floor(hrs/24), wks = Math.floor(days/7);
    if(mins<1)return'now'; if(mins<60)return mins+'m'; if(hrs<24)return hrs+'h'; if(days<7)return days+'d'; return wks+'w';
}
function fmtMsgTime(ts){if(!ts)return'';return new Date(ts).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});}
function fmtDateSep(ts){
    if(!ts)return'';const d=new Date(ts),now=new Date();
    if(d.toDateString()===now.toDateString())return d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
    return d.toLocaleDateString([],{month:'short',day:'numeric'}) + ', ' + d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
}
