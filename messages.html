<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Vynix · Messages</title>
    <script src="https://unpkg.com/feather-icons"></script>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root,[data-theme="light"]{
            --primary:#2C6BED; --primary-dark:#1A56D6; --primary-rgb:44,107,237;
            --background:#F8F9FA; --surface:#FFFFFF; --surface2:#F0F2F5; --surface3:#E4E6EB;
            --border:#E8EAEF; --text-primary:#0F1419; --text-secondary:#536471; --text-muted:#8B98A5;
            --like:#F91880; --online:#00BA7C; --read-tick:#34B7F1;
            --bubble-out:#2C6BED; --bubble-in:#F0F2F5; --bubble-out-text:#fff; --bubble-in-text:#0F1419;
            --shadow:0 2px 8px rgba(0,0,0,0.04); --shadow-lg:0 12px 28px rgba(0,0,0,0.12);
            --header-bg:rgba(255,255,255,0.85);
        }
        [data-theme="dark"]{
            --primary:#1D9BF0; --primary-dark:#1A8CD8; --primary-rgb:29,155,240;
            --background:#000000; --surface:#16181C; --surface2:#202327; --surface3:#2F3336;
            --border:#2F3336; --text-primary:#E7E9EA; --text-secondary:#71767B; --text-muted:#536471;
            --like:#F91880; --online:#00BA7C; --read-tick:#34B7F1;
            --bubble-out:#1D9BF0; --bubble-in:#202327; --bubble-out-text:#fff; --bubble-in-text:#E7E9EA;
            --shadow:0 2px 8px rgba(255,255,255,0.02); --shadow-lg:0 12px 28px rgba(0,0,0,0.4);
            --header-bg:rgba(0,0,0,0.85);
        }

        *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-touch-callout:none;-webkit-user-select:none;user-select:none;}
        .bubble, .msg-input, textarea, input[type="text"] { -webkit-user-select:text; user-select:text; }
        html,body{height:100%;overflow:hidden;font-family:'DM Sans',sans-serif;background:var(--background);color:var(--text-primary);}
        
        @keyframes fadeUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
        @keyframes msgIn{from{opacity:0;transform:translateY(8px) scale(0.98);}to{opacity:1;transform:translateY(0) scale(1);}}
        @keyframes pulse{0%{transform:scale(1);}50%{transform:scale(1.1);}100%{transform:scale(1);}}

        .app{display:flex;height:100dvh;max-width:1200px;margin:0 auto;border-left:1px solid var(--border);border-right:1px solid var(--border);background:var(--surface);}
        @media(max-width:1024px){.app{max-width:100%;border:none;}}
        .sidebar{width:340px;flex-shrink:0;display:flex;flex-direction:column;background:var(--surface);border-right:1px solid var(--border);}
        @media(max-width:680px){.sidebar{position:fixed;inset:0;width:100%;z-index:10;transition:transform 0.3s;} .sidebar.slide-out{transform:translateX(-100%);}}
        
        /* Sidebar & Header Styles */
        .sidebar-header{display:flex;align-items:center;gap:12px;padding:calc(env(safe-area-inset-top) + 16px) 20px 14px;position:sticky;top:0;z-index:5;}
        .sidebar-title{font-size:24px;font-weight:700;flex:1;}
        .icon-btn{width:40px;height:40px;border-radius:50%;border:none;background:var(--surface2);color:var(--text-primary);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
        .search-wrap{padding:0 16px 12px;}
        .search-inner{display:flex;align-items:center;gap:10px;background:var(--surface2);border-radius:12px;padding:10px 14px;}
        .search-input{flex:1;border:none;outline:none;background:transparent;font-size:15px;color:var(--text-primary);user-select:text;}
        .conv-list{overflow-y:auto;flex:1;padding:0 8px;}
        
        /* Chat Items */
        .conv-item{display:flex;align-items:center;gap:14px;padding:12px;border-radius:14px;cursor:pointer;border-bottom:1px solid var(--border);}
        .conv-item.active{background:var(--surface2);box-shadow:inset 3px 0 0 var(--primary);}
        .conv-avatar{width:52px;height:52px;border-radius:50%;object-fit:cover;}
        .conv-body{flex:1;min-width:0;}
        .conv-name{font-size:16px;font-weight:600;}
        .conv-preview{font-size:14px;color:var(--text-secondary);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
        .unread-badge{min-width:22px;height:22px;border-radius:11px;background:var(--primary);color:white;font-size:12px;display:none;align-items:center;justify-content:center;padding:0 6px;}
        .unread-badge.show{display:flex;}

        /* Chat Pane */
        .chat-pane{flex:1;display:flex;flex-direction:column;background:var(--background);position:relative;}
        @media(max-width:680px){.chat-pane{position:fixed;inset:0;z-index:200;transform:translateX(100%);transition:transform 0.3s;} .chat-pane.open{transform:translateX(0);}}
        .chat-header{display:flex;align-items:center;gap:12px;padding:calc(env(safe-area-inset-top) + 12px) 20px 12px;background:var(--header-bg);border-bottom:1px solid var(--border);backdrop-filter:blur(12px);}
        .chat-back-btn{display:none;background:none;border:none;color:var(--text-primary);cursor:pointer;padding:8px;}
        @media(max-width:680px){.chat-back-btn{display:flex;}}
        .chat-avatar{width:44px;height:44px;border-radius:50%;object-fit:cover;}
        .chat-info{flex:1;min-width:0;}
        .chat-name{font-size:17px;font-weight:700;}
        .chat-sub{font-size:13px;color:var(--text-secondary);}

        /* Messages */
        .messages-area{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:4px;}
        .msg-row{display:flex;align-items:flex-end;gap:8px;animation:msgIn 0.2s;margin-bottom:2px;}
        .msg-row.out{flex-direction:row-reverse;}
        .msg-content{max-width:75%;display:flex;flex-direction:column;gap:2px;position:relative;}
        .bubble{padding:10px 16px;font-size:15px;line-height:1.5;word-break:break-word;box-shadow:var(--shadow);position:relative;}
        .msg-row.out .bubble{background:var(--bubble-out);color:var(--bubble-out-text);border-radius:20px 20px 4px 20px;}
        .msg-row.in .bubble{background:var(--bubble-in);color:var(--bubble-in-text);border-radius:20px 20px 20px 4px;}
        .msg-meta{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--text-muted);padding:0 4px;}
        .msg-row.out .msg-meta{flex-direction:row-reverse;}
        .tick svg{width:15px;height:15px;color:var(--text-muted);}
        .tick.read svg{color:var(--read-tick);}

        /* Audio & File Cards */
        .file-card {display:flex; align-items:center; gap:12px; background:rgba(0,0,0,0.08); padding:8px 12px; border-radius:12px; cursor:pointer;}
        .msg-row.out .file-card {background:rgba(255,255,255,0.2);}
        .audio-player {display:flex; align-items:center; gap:10px; min-width:200px;}
        audio {height: 30px; outline: none;}
        
        /* Input Area & Recording State */
        .input-area{padding:12px 20px calc(env(safe-area-inset-bottom) + 12px);background:var(--surface);border-top:1px solid var(--border);display:flex;align-items:flex-end;gap:12px;z-index:10;}
        .input-wrap{flex:1;display:flex;align-items:flex-end;background:var(--surface2);border-radius:24px;padding:10px 14px;gap:8px;}
        .attach-btn{background:none;border:none;color:var(--text-secondary);cursor:pointer;}
        .msg-input{flex:1;border:none;outline:none;background:transparent;font-size:16px;color:var(--text-primary);resize:none;max-height:120px;}
        .action-btn{width:44px;height:44px;border-radius:50%;border:none;background:var(--primary);color:white;display:flex;align-items:center;justify-content:center;cursor:pointer;}
        
        #recording-ui {display:none; flex:1; align-items:center; gap:10px; color:var(--like); font-weight:bold;}
        .recording-dot {width:12px; height:12px; background:var(--like); border-radius:50%; animation:pulse 1s infinite;}
        
        .chat-empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;}
    </style>
</head>
<body>

<div class="app">
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <span class="sidebar-title">Vynix</span>
        </div>
        <div class="search-wrap">
            <div class="search-inner"><i data-feather="search" style="width:18px;height:18px;"></i><input type="text" class="search-input" placeholder="Search chats..."></div>
        </div>
        <div class="conv-list" id="conv-list"></div>
    </div>

    <div class="chat-pane" id="chat-pane">
        <div class="chat-empty" id="chat-empty">
            <h3>Your Messages</h3>
            <p>Select a conversation to chat.</p>
        </div>

        <div id="chat-view" style="display:none;flex:1;min-height:0;flex-direction:column;">
            <div class="chat-header">
                <button class="chat-back-btn" onclick="closeChat()"><i data-feather="arrow-left" style="width:24px;height:24px;"></i></button>
                <img id="chat-avatar" class="chat-avatar" src="" alt="">
                <div class="chat-info">
                    <div class="chat-name" id="chat-name">—</div>
                    <div class="chat-sub" id="chat-last-seen">Online</div>
                </div>
            </div>

            <div class="messages-area" id="messages-area"></div>

            <div class="input-area">
                <div id="recording-ui">
                    <div class="recording-dot"></div>
                    <span id="recording-time">Recording...</span>
                    <button onclick="cancelRecording()" style="margin-left:auto; background:none; border:none; color:var(--text-secondary); cursor:pointer;">Cancel</button>
                </div>

                <div class="input-wrap" id="standard-ui">
                    <button class="attach-btn" onclick="document.getElementById('file-input').click()"><i data-feather="paperclip" style="width:22px;height:22px;"></i></button>
                    <textarea class="msg-input" id="msg-input" placeholder="Type a message..." rows="1" oninput="onMsgInput()"></textarea>
                </div>
                
                <input type="file" id="file-input" accept="image/*,.pdf,.doc,.docx,.zip" style="display:none;" onchange="handleFileUpload(event)">
                
                <button class="action-btn" id="action-btn" onclick="handleActionClick()">
                    <i id="action-icon" data-feather="mic" style="width:20px;height:20px;"></i>
                </button>
            </div>
        </div>
    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getDatabase, ref, get, set, push, update, onChildAdded } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

// --- YOUR CONFIGURATIONS ---
const fbCfg={apiKey:"AIzaSyBOyZ3As4GTuNvjemvPF_SpsC6m6vqtNhc",authDomain:"fire-b-a8878.firebaseapp.com",databaseURL:"https://fire-b-a8878.firebaseio.com",projectId:"fire-b-a8878",storageBucket:"fire-b-a8878.appspot.com",messagingSenderId:"658673187627",appId:"1:658673187627:web:6e4c29af661785f0afa36e"};
const app=initializeApp(fbCfg), auth=getAuth(app), db=getDatabase(app);
const CLOUDINARY_URL = "https://api.cloudinary.com/v1_1/dqkujefxj/auto/upload";
const CLOUDINARY_PRESET = "banter_box";

let me=null, chatId=null, otherUid=null;
let mediaRecorder, audioChunks = [], isRecording = false;

onAuthStateChanged(auth, user => {
    if(!user){window.location.href='auth.html';return;}
    me=user; listenConvs(); feather.replace();
});

// --- CLOUDINARY UPLOAD LOGIC ---
async function uploadToCloudinary(file, resourceType = 'auto') {
    const formData = new FormData();
    formData.append("file", file);
    formData.append("upload_preset", CLOUDINARY_PRESET);
    
    // Notify user upload is happening (You can replace this with a real loading spinner)
    document.getElementById('msg-input').placeholder = "Uploading media...";
    
    try {
        const res = await fetch(CLOUDINARY_URL, { method: "POST", body: formData });
        const data = await res.json();
        document.getElementById('msg-input').placeholder = "Type a message...";
        return data.secure_url;
    } catch (err) {
        console.error("Upload failed", err);
        alert("Media upload failed.");
        document.getElementById('msg-input').placeholder = "Type a message...";
        return null;
    }
}

// --- FILE / IMAGE ATTACHMENT ---
window.handleFileUpload = async (event) => {
    const file = event.target.files[0];
    if(!file || !chatId) return;
    
    const url = await uploadToCloudinary(file);
    if(url) {
        let msgData = { senderId: me.uid, timestamp: Date.now(), status: 'sent' };
        
        if (file.type.startsWith('image/')) {
            msgData.imageUrl = url;
        } else {
            msgData.fileUrl = url;
            msgData.fileName = file.name;
        }
        
        // Push to Firebase (Bypassing E2E for files in this demo for simplicity)
        await push(ref(db, `messages/${chatId}/msgs`), msgData);
        updateUnread();
    }
};

// --- VOICE NOTE LOGIC (MediaRecorder API) ---
window.handleActionClick = async () => {
    const input = document.getElementById('msg-input').value.trim();
    
    // If there is text, Send Text Message
    if(input.length > 0) {
        sendMessage();
        return;
    }

    // If no text and not recording, Start Recording
    if(!isRecording) {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRecorder = new MediaRecorder(stream);
            
            mediaRecorder.ondataavailable = e => { if(e.data.size > 0) audioChunks.push(e.data); };
            mediaRecorder.onstop = async () => {
                if(audioChunks.length === 0) return; // Cancelled
                const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                audioChunks = []; // reset
                
                const url = await uploadToCloudinary(audioBlob, 'video'); // Cloudinary uses 'video' for audio
                if(url) {
                    await push(ref(db, `messages/${chatId}/msgs`), { 
                        senderId: me.uid, timestamp: Date.now(), status: 'sent', audioUrl: url 
                    });
                    updateUnread();
                }
            };
            
            mediaRecorder.start();
            isRecording = true;
            
            // Toggle UI
            document.getElementById('standard-ui').style.display = 'none';
            document.getElementById('recording-ui').style.display = 'flex';
            document.getElementById('action-icon').setAttribute('data-feather', 'send');
            feather.replace();
            
        } catch (err) {
            alert("Microphone access denied or unavailable.");
        }
    } else {
        // If recording, Stop and Send
        mediaRecorder.stop();
        isRecording = false;
        resetInputUI();
    }
};

window.cancelRecording = () => {
    if(mediaRecorder && isRecording) {
        audioChunks = []; // Clear chunks so onstop ignores it
        mediaRecorder.stop();
        isRecording = false;
        resetInputUI();
    }
};

function resetInputUI() {
    document.getElementById('standard-ui').style.display = 'flex';
    document.getElementById('recording-ui').style.display = 'none';
    document.getElementById('action-icon').setAttribute('data-feather', 'mic');
    feather.replace();
}

window.onMsgInput = () => {
    const val = document.getElementById('msg-input').value.trim();
    const icon = val.length > 0 ? 'send' : 'mic';
    document.getElementById('action-icon').setAttribute('data-feather', icon);
    feather.replace();
};

// --- SEND TEXT MESSAGE ---
window.sendMessage = async () => {
    const input = document.getElementById('msg-input');
    const text = input.value.trim();
    if(!text || !chatId) return;
    
    input.value = ''; onMsgInput();
    
    // *Assuming standard unencrypted text for this demo to ensure stability*
    // *If you want E2E back, wrap text in your encMsg() function here*
    await push(ref(db, `messages/${chatId}/msgs`), {
        senderId: me.uid, timestamp: Date.now(), status: 'sent', text: text
    });
    updateUnread();
};

async function updateUnread() {
    await update(ref(db, `userChats/${otherUid}/${chatId}`), { unreadCount: 1, lastTs: Date.now() });
}

// --- RENDER MESSAGES ---
function listenMsgs(cid){
    document.getElementById('messages-area').innerHTML = '';
    onChildAdded(ref(db,`messages/${cid}/msgs`), snap => {
        renderMsg({id:snap.key, ...snap.val()});
        const area = document.getElementById('messages-area');
        area.scrollTop = area.scrollHeight;
    });
}

function renderMsg(msg){
    const area=document.getElementById('messages-area'), isMine = msg.senderId===me.uid;
    const row=document.createElement('div');
    row.className=`msg-row ${isMine?'out':'in'}`;
    
    let bubbleHTML = '';
    if (msg.imageUrl) {
        bubbleHTML = `<img src="${msg.imageUrl}" style="max-width:200px;border-radius:12px;">`;
    } else if (msg.audioUrl) {
        bubbleHTML = `<div class="audio-player"><i data-feather="mic" style="color:var(--primary)"></i> <audio controls src="${msg.audioUrl}"></audio></div>`;
    } else if (msg.fileUrl) {
        bubbleHTML = `<div class="file-card" onclick="window.open('${msg.fileUrl}')"><i data-feather="file"></i> <div><b>${msg.fileName}</b></div></div>`;
    } else {
        bubbleHTML = msg.text || '';
    }

    let tickHTML = isMine ? `<span class="tick ${msg.status === 'read' ? 'read' : 'delivered'}"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"></polyline><polyline points="24 6 13 17 8 12"></polyline></svg></span>` : '';

    row.innerHTML=`
        <div class="msg-content">
            <div class="bubble">${bubbleHTML}</div>
            <div class="msg-meta"><span>${new Date(msg.timestamp).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}</span>${tickHTML}</div>
        </div>
    `;
    area.appendChild(row);
    feather.replace();
    
    // Auto Read Receipt Update
    if (!isMine && msg.status !== 'read') {
        update(ref(db, `messages/${chatId}/msgs/${msg.id}`), { status: 'read' });
    }
}

// --- NAVIGATION MOCKS ---
window.openChat = (cid, uid) => { 
    chatId = cid; otherUid = uid; 
    document.getElementById('chat-empty').style.display='none'; 
    document.getElementById('chat-view').style.display='flex'; 
    listenMsgs(cid); 
};
window.closeChat = () => { document.getElementById('chat-view').style.display='none'; document.getElementById('chat-empty').style.display='flex'; };

// Dummy Conv List for Demo
function listenConvs() {
    const list = document.getElementById('conv-list');
    list.innerHTML = `<div class="conv-item" onclick="openChat('demo_chat_1', 'user_2')"><div class="conv-body"><div class="conv-name">Test Contact</div><div class="conv-preview">Tap to test voice notes & files</div></div></div>`;
}
</script>
</body>
</html>
