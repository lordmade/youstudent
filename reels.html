<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Vynix Reels</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,700;0,900;1,400&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/feather-icons"></script>
    <style>
        :root {
            --primary: #6366F1;
            --like: #F43F5E;
            --repost: #10B981;
            --verified: #1D9BF0;
            --surface: #FFFFFF;
            --border: #E2E8F0;
            --text-secondary: #64748B;
            --text-muted: #94A3B8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: #000;
            color: #fff;
            overflow: hidden;
            height: 100dvh;
            width: 100vw;
            touch-action: none;
            user-select: none;
        }

        /* ── REELS CONTAINER ── */
        #reels-container {
            width: 100%;
            height: 100dvh;
            overflow: hidden;
            position: relative;
        }

        .reel-track {
            width: 100%;
            height: 100%;
            transition: transform 0.42s cubic-bezier(0.77, 0, 0.175, 1);
            will-change: transform;
        }

        /* Each reel = full viewport */
        .reel-slide {
            width: 100%;
            height: 100dvh;
            position: absolute;
            left: 0;
            top: 0;
            overflow: hidden;
            background: #111;
        }

        /* Video fills the slide */
        .reel-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* Dark gradient overlays */
        .reel-gradient-top {
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 180px;
            background: linear-gradient(to bottom, rgba(0,0,0,0.65) 0%, transparent 100%);
            pointer-events: none;
            z-index: 5;
        }

        .reel-gradient-bottom {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            height: 320px;
            background: linear-gradient(to top, rgba(0,0,0,0.8) 0%, transparent 100%);
            pointer-events: none;
            z-index: 5;
        }

        /* ── HEADER ── */
        .reels-header {
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 50;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            padding-top: calc(12px + env(safe-area-inset-top));
        }

        .header-tab {
            font-size: 17px;
            font-weight: 700;
            color: rgba(255,255,255,0.5);
            background: none;
            border: none;
            cursor: pointer;
            letter-spacing: -0.3px;
            transition: color 0.2s;
            padding: 4px 0;
        }

        .header-tab.active {
            color: #fff;
            border-bottom: 2.5px solid #fff;
        }

        .header-title {
            font-size: 18px;
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        /* ── REEL INFO (bottom-left) ── */
        .reel-info {
            position: absolute;
            bottom: calc(90px + env(safe-area-inset-bottom));
            left: 16px;
            right: 80px;
            z-index: 10;
        }

        .reel-author-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
        }

        .reel-avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            object-fit: cover;
            border: 2.5px solid rgba(255,255,255,0.8);
            cursor: pointer;
            flex-shrink: 0;
        }

        .reel-author-text { flex: 1; min-width: 0; }

        .reel-username {
            font-size: 15px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .reel-handle {
            font-size: 13px;
            color: rgba(255,255,255,0.7);
            font-weight: 400;
        }

        .follow-btn {
            background: transparent;
            border: 1.5px solid #fff;
            color: #fff;
            padding: 5px 14px;
            border-radius: 9999px;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.2s;
            font-family: inherit;
            flex-shrink: 0;
        }

        .follow-btn.following {
            background: rgba(255,255,255,0.15);
            border-color: rgba(255,255,255,0.4);
        }

        .reel-caption {
            font-size: 14px;
            line-height: 1.5;
            color: rgba(255,255,255,0.92);
            font-weight: 400;
            margin-bottom: 10px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .reel-caption.expanded {
            display: block;
            -webkit-line-clamp: unset;
        }

        .reel-caption-more {
            font-size: 13px;
            color: rgba(255,255,255,0.6);
            cursor: pointer;
            font-weight: 600;
        }

        .reel-audio {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            color: rgba(255,255,255,0.8);
            margin-top: 4px;
        }

        .audio-disc {
            width: 26px;
            height: 26px;
            border-radius: 50%;
            background: #333;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: spin 4s linear infinite;
            flex-shrink: 0;
            border: 1px solid rgba(255,255,255,0.2);
            overflow: hidden;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── ACTIONS SIDEBAR (right) ── */
        .reel-actions {
            position: absolute;
            right: 12px;
            bottom: calc(90px + env(safe-area-inset-bottom));
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            z-index: 10;
        }

        .reel-action-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            cursor: pointer;
            background: none;
            border: none;
            color: #fff;
            font-family: inherit;
        }

        .reel-action-icon {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: rgba(255,255,255,0.12);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .reel-action-btn:active .reel-action-icon { transform: scale(0.88); }
        .reel-action-btn.liked .reel-action-icon { background: rgba(244,63,94,0.2); }
        .reel-action-btn.liked svg { color: var(--like); }
        .reel-action-btn.reposted .reel-action-icon { background: rgba(16,185,129,0.2); }
        .reel-action-btn.reposted svg { color: var(--repost); }

        .reel-action-label {
            font-size: 12px;
            font-weight: 600;
            color: rgba(255,255,255,0.9);
            text-shadow: 0 1px 4px rgba(0,0,0,0.5);
        }

        /* Like pop animation */
        @keyframes likePoP {
            0%   { transform: scale(1); }
            30%  { transform: scale(1.5); }
            60%  { transform: scale(0.9); }
            100% { transform: scale(1); }
        }
        .like-pop { animation: likePoP 0.45s ease-out; }

        /* Double-tap heart */
        .double-tap-heart {
            position: absolute;
            font-size: 80px;
            pointer-events: none;
            opacity: 0;
            transform: scale(0);
            z-index: 20;
            transition: none;
        }

        @keyframes heartBurst {
            0%   { opacity: 1; transform: scale(0.3); }
            50%  { opacity: 1; transform: scale(1.2); }
            80%  { opacity: 0.8; transform: scale(1); }
            100% { opacity: 0; transform: scale(1.1); }
        }

        .double-tap-heart.burst { animation: heartBurst 0.7s ease-out forwards; }

        /* ── PROGRESS BAR ── */
        .reel-progress {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 2.5px;
            background: rgba(255,255,255,0.2);
            z-index: 15;
        }

        .reel-progress-fill {
            height: 100%;
            background: #fff;
            width: 0%;
            transition: width 0.1s linear;
        }

        /* ── PAUSE INDICATOR ── */
        .pause-indicator {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 15;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .pause-indicator.show { opacity: 1; }

        .pause-circle {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* ── BOTTOM NAV ── */
        .bottom-nav {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255,255,255,0.08);
            padding: 8px 0 calc(8px + env(safe-area-inset-bottom));
            display: flex;
            justify-content: space-around;
            z-index: 100;
        }

        .nav-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            padding: 8px;
            color: rgba(255,255,255,0.5);
            background: none;
            border: none;
            font-family: inherit;
            cursor: pointer;
            transition: color 0.2s;
            position: relative;
        }

        .nav-item.active { color: #fff; }
        .nav-item span { font-size: 11px; font-weight: 600; }

        .nav-badge {
            position: absolute;
            top: 4px;
            right: calc(50% - 16px);
            background: var(--like);
            color: white;
            font-size: 10px;
            font-weight: 700;
            min-width: 18px;
            height: 18px;
            border-radius: 9px;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 0 5px;
            border: 2px solid #000;
        }

        .nav-badge.show { display: flex; }

        .fab {
            width: 52px;
            height: 52px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 20px rgba(99,102,241,0.5);
            transform: translateY(-18px);
            cursor: pointer;
            transition: transform 0.2s;
        }

        .fab:active { transform: translateY(-18px) scale(0.9); }

        /* ── UPLOAD SHEET ── */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(6px);
            z-index: 200;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }

        .modal-overlay.active { opacity: 1; pointer-events: auto; }

        .bottom-sheet {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            background: #111;
            border-radius: 24px 24px 0 0;
            border: 1px solid rgba(255,255,255,0.1);
            padding: 24px 20px;
            padding-bottom: calc(24px + env(safe-area-inset-bottom));
            transform: translateY(100%);
            transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 201;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-overlay.active ~ .bottom-sheet { transform: translateY(0); }

        .sheet-handle {
            width: 40px;
            height: 4px;
            background: rgba(255,255,255,0.2);
            border-radius: 2px;
            margin: 0 auto 20px;
        }

        .sheet-title {
            font-size: 20px;
            font-weight: 800;
            color: #fff;
            margin-bottom: 20px;
            letter-spacing: -0.3px;
        }

        .upload-zone {
            border: 2px dashed rgba(255,255,255,0.2);
            border-radius: 20px;
            padding: 40px 24px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 20px;
        }

        .upload-zone:hover { border-color: var(--primary); background: rgba(99,102,241,0.06); }
        .upload-zone.drag-over { border-color: var(--primary); background: rgba(99,102,241,0.12); }

        .upload-icon {
            width: 60px;
            height: 60px;
            background: rgba(99,102,241,0.15);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
        }

        .upload-title { font-size: 17px; font-weight: 700; color: #fff; margin-bottom: 6px; }
        .upload-sub { font-size: 13px; color: rgba(255,255,255,0.5); }

        .caption-input {
            width: 100%;
            background: rgba(255,255,255,0.07);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 14px;
            padding: 14px 16px;
            font-size: 15px;
            color: #fff;
            outline: none;
            font-family: inherit;
            resize: none;
            height: 90px;
            margin-bottom: 16px;
            transition: border-color 0.2s;
        }

        .caption-input::placeholder { color: rgba(255,255,255,0.3); }
        .caption-input:focus { border-color: var(--primary); }

        .upload-progress-bar {
            height: 5px;
            background: rgba(255,255,255,0.1);
            border-radius: 3px;
            overflow: hidden;
            margin-bottom: 16px;
            display: none;
        }

        .upload-progress-bar.active { display: block; }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), #818CF8);
            width: 0%;
            transition: width 0.3s ease;
            border-radius: 3px;
        }

        .video-preview-wrap {
            border-radius: 16px;
            overflow: hidden;
            margin-bottom: 16px;
            position: relative;
            display: none;
            background: #000;
            max-height: 280px;
        }

        .video-preview-wrap.active { display: block; }

        .video-preview-wrap video {
            width: 100%;
            max-height: 280px;
            object-fit: contain;
            display: block;
        }

        .remove-video-btn {
            position: absolute;
            top: 8px;
            right: 8px;
            background: rgba(0,0,0,0.65);
            color: #fff;
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .post-reel-btn {
            width: 100%;
            background: var(--primary);
            color: #fff;
            border: none;
            padding: 16px;
            border-radius: 16px;
            font-size: 16px;
            font-weight: 800;
            cursor: pointer;
            font-family: inherit;
            opacity: 0.4;
            transition: opacity 0.2s, transform 0.1s;
            letter-spacing: -0.2px;
        }

        .post-reel-btn.ready { opacity: 1; }
        .post-reel-btn:active { transform: scale(0.98); }

        /* ── EMPTY / LOADING STATES ── */
        .reels-empty {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100dvh;
            gap: 16px;
            color: rgba(255,255,255,0.5);
            text-align: center;
            padding: 24px;
        }

        .reels-empty h3 { font-size: 22px; font-weight: 800; color: #fff; }
        .reels-empty p { font-size: 15px; line-height: 1.5; }

        .spinner {
            width: 44px;
            height: 44px;
            border: 3px solid rgba(255,255,255,0.15);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.9s linear infinite;
        }

        /* ── TOAST ── */
        .toast {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%) translateY(60px);
            background: rgba(30,30,30,0.95);
            color: white;
            padding: 12px 24px;
            border-radius: 9999px;
            font-weight: 600;
            font-size: 14px;
            opacity: 0;
            transition: all 0.3s;
            z-index: 9999;
            pointer-events: none;
            border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(12px);
        }

        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

        /* ── VERIFIED BADGE ── */
        .verified { color: #1D9BF0; display: inline-flex; align-items: center; }

        /* Swipe hint */
        .swipe-hint {
            position: fixed;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            color: rgba(255,255,255,0.5);
            font-size: 11px;
            font-weight: 600;
            z-index: 20;
            pointer-events: none;
            animation: hintFade 4s ease-out forwards;
        }

        @keyframes hintFade {
            0%   { opacity: 0; }
            20%  { opacity: 1; }
            70%  { opacity: 1; }
            100% { opacity: 0; }
        }

        .hint-arrow {
            animation: hintBounce 0.8s ease-in-out infinite alternate;
        }

        @keyframes hintBounce {
            from { transform: translateY(0); }
            to   { transform: translateY(-8px); }
        }

        @media (min-width: 1024px) {
            #reels-container { max-width: 420px; margin: 0 auto; }
            .bottom-nav { max-width: 420px; left: 50%; transform: translateX(-50%); }
            .reels-header { max-width: 420px; left: 50%; transform: translateX(-50%); }
            .new-posts-pill { max-width: 420px; }
        }
    </style>
</head>
<body>

<!-- Header -->
<div class="reels-header">
    <button onclick="goHome()" style="background:none;border:none;color:rgba(255,255,255,0.7);cursor:pointer;padding:8px;">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <span class="header-title">Reels</span>
    <button onclick="openUploadSheet()" style="background:none;border:none;color:#fff;cursor:pointer;padding:8px;">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    </button>
</div>

<!-- Reels Viewport -->
<div id="reels-container">
    <div id="reels-loading" class="reels-empty">
        <div class="spinner"></div>
        <p>Loading reels…</p>
    </div>
    <div id="reels-empty" class="reels-empty" style="display:none;">
        <div style="font-size:56px;">🎬</div>
        <h3>No Reels Yet</h3>
        <p>Be the first to upload a reel.<br>Tap + to get started.</p>
        <button onclick="openUploadSheet()" style="background:var(--primary);color:#fff;border:none;padding:14px 32px;border-radius:9999px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;margin-top:8px;">Upload Reel</button>
    </div>
    <div id="reel-track" style="position:relative;width:100%;height:100%;display:none;"></div>
</div>

<!-- Swipe hint (shown once) -->
<div class="swipe-hint" id="swipe-hint" style="display:none;">
    <div class="hint-arrow">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="18 15 12 9 6 15"/></svg>
    </div>
    <span>Swipe</span>
</div>

<!-- Bottom Nav -->
<nav class="bottom-nav">
    <button class="nav-item" onclick="goHome()">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        <span>Home</span>
    </button>
    <button class="nav-item" onclick="goToSearch()">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <span>Search</span>
    </button>
    <button class="fab" onclick="openUploadSheet()">
        <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    </button>
    <button class="nav-item active">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg>
        <span>Reels</span>
    </button>
    <button class="nav-item" onclick="goToNotifications()">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
        <span>Alerts</span>
        <span class="nav-badge" id="badge-notifications"></span>
    </button>
</nav>

<!-- Upload Sheet -->
<div class="modal-overlay" id="modal-overlay" onclick="closeUploadSheet()"></div>
<div class="bottom-sheet" id="upload-sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title">New Reel</div>

    <div class="upload-zone" id="upload-zone" onclick="triggerFileInput()">
        <div class="upload-icon">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#6366F1" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg>
        </div>
        <div class="upload-title">Choose a video</div>
        <div class="upload-sub">MP4, MOV, WebM · up to 3 minutes</div>
    </div>

    <div class="video-preview-wrap" id="video-preview-wrap">
        <video id="preview-video" muted playsinline loop></video>
        <button class="remove-video-btn" onclick="clearVideoSelection(event)">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
    </div>

    <textarea class="caption-input" id="caption-input" placeholder="Write a caption… #hashtags @mentions" oninput="updatePostBtn()"></textarea>

    <div class="upload-progress-bar" id="upload-progress">
        <div class="progress-fill" id="progress-fill"></div>
    </div>

    <button class="post-reel-btn" id="post-reel-btn" onclick="uploadReel()">Post Reel</button>

    <input type="file" id="reel-file-input" accept="video/*" style="display:none;" onchange="handleVideoSelect(event)">
</div>

<div class="toast" id="toast"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getDatabase, ref, onValue, onChildAdded, onChildRemoved, push, set, get, update, remove, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const CLOUDINARY_CLOUD_NAME = 'dqkujefxj';
    const CLOUDINARY_UPLOAD_PRESET = 'banter_box';
    const MAX_VIDEO_DURATION = 180; // 3 min

    const VERIFIED_BADGE = `<svg viewBox="0 0 24 24" width="14" height="14" fill="#1D9BF0"><path d="M22.25 12c0-1.43-.88-2.67-2.19-3.34.46-1.39.2-2.9-.81-3.91s-2.52-1.27-3.91-.81c-.66-1.31-1.91-2.19-3.34-2.19s-2.67.88-3.33 2.19c-1.4-.46-2.91-.2-3.92.81s-1.26 2.52-.8 3.91c-1.31.67-2.2 1.91-2.2 3.34s.89 2.67 2.2 3.34c-.46 1.39-.21 2.9.8 3.91s2.52 1.26 3.91.81c.67 1.31 1.91 2.19 3.34 2.19s2.68-.88 3.34-2.19c1.39.45 2.9.2 3.91-.81s1.27-2.52.81-3.91c1.31-.67 2.19-1.91 2.19-3.34zm-11.71 4.2L6.8 12.22l1.41-1.41 2.83 2.83 5.66-5.66 1.41 1.41-7.07 7.22z"/></svg>`;

    const REPOST_SVG = `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>`;

    const firebaseConfig = {
        apiKey: "AIzaSyBOyZ3As4GTuNvjemvPF_SpsC6m6vqtNhc",
        authDomain: "fire-b-a8878.firebaseapp.com",
        databaseURL: "https://fire-b-a8878.firebaseio.com",
        projectId: "fire-b-a8878",
        storageBucket: "fire-b-a8878.appspot.com",
        messagingSenderId: "658673187627",
        appId: "1:658673187627:web:6e4c29af661785f0afa36e"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);

    let currentUser = null;
    let currentUserData = null;
    let reels = [];              // ordered array of reel objects
    let currentIndex = 0;
    let selectedFile = null;
    let isAnimating = false;
    let progressInterval = null;

    // Touch/swipe state
    let touchStartY = 0;
    let touchStartTime = 0;

    // ── AUTH ──
    onAuthStateChanged(auth, async (user) => {
        if (!user) { window.location.href = 'auth.html'; return; }
        currentUser = user;
        await loadCurrentUser();
        setupNotifListener();
        loadReels();
    });

    async function loadCurrentUser() {
        const snap = await get(ref(db, `users/${currentUser.uid}`));
        currentUserData = snap.val() || {
            uid: currentUser.uid,
            displayName: currentUser.displayName || 'User',
            username: currentUser.email?.split('@')[0] || 'user',
            photoURL: currentUser.photoURL || `https://ui-avatars.com/api/?name=U&background=6366F1&color=fff`,
            verified: false
        };
    }

    function setupNotifListener() {
        onValue(ref(db, `notifications/${currentUser.uid}`), (snap) => {
            let count = 0;
            if (snap.exists()) snap.forEach(c => { if (!c.val().read) count++; });
            const badge = document.getElementById('badge-notifications');
            if (count > 0) { badge.textContent = count > 99 ? '99+' : count; badge.classList.add('show'); }
            else badge.classList.remove('show');
        });
    }

    // ── LOAD REELS ──
    async function loadReels() {
        try {
            const snap = await get(ref(db, 'reels'));
            if (!snap.exists()) {
                showEmpty();
                return;
            }

            const arr = [];
            snap.forEach(child => {
                arr.push({ id: child.key, ...child.val() });
            });

            // sort newest first
            arr.sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0));

            // load user data for each
            for (const reel of arr) {
                try {
                    const uSnap = await get(ref(db, `users/${reel.uid}`));
                    reel.user = uSnap.val() || {};
                } catch { reel.user = {}; }
            }

            reels = arr;
            buildTrack();
            showTrack();

            // Real-time: new reels prepend
            onChildAdded(ref(db, 'reels'), async (snapshot) => {
                const id = snapshot.key;
                if (reels.find(r => r.id === id)) return;
                const reel = { id, ...snapshot.val() };
                try {
                    const uSnap = await get(ref(db, `users/${reel.uid}`));
                    reel.user = uSnap.val() || {};
                } catch { reel.user = {}; }
                reels.unshift(reel);
                prependSlide(reel);
                currentIndex++;  // shift index since we prepended
            });

            onChildRemoved(ref(db, 'reels'), (snapshot) => {
                const idx = reels.findIndex(r => r.id === snapshot.key);
                if (idx === -1) return;
                reels.splice(idx, 1);
                const slide = document.getElementById(`reel-slide-${snapshot.key}`);
                if (slide) slide.remove();
                rebuildPositions();
            });

        } catch (err) {
            console.error(err);
            showEmpty();
        }
    }

    function showEmpty() {
        document.getElementById('reels-loading').style.display = 'none';
        document.getElementById('reels-empty').style.display = 'flex';
    }

    function showTrack() {
        document.getElementById('reels-loading').style.display = 'none';
        document.getElementById('reels-empty').style.display = 'none';
        document.getElementById('reel-track').style.display = 'block';

        // Show swipe hint once
        if (!localStorage.getItem('vynix_swipe_hint_shown') && reels.length > 1) {
            const hint = document.getElementById('swipe-hint');
            hint.style.display = 'flex';
            localStorage.setItem('vynix_swipe_hint_shown', '1');
            setTimeout(() => hint.style.display = 'none', 4200);
        }

        setupTouchListeners();
        setupKeyboardListeners();
        activateSlide(0);
    }

    // ── BUILD SLIDES ──
    function buildTrack() {
        const track = document.getElementById('reel-track');
        track.innerHTML = '';
        reels.forEach((reel, i) => {
            const slide = createSlide(reel, i);
            track.appendChild(slide);
        });
        positionSlides();
    }

    function createSlide(reel, index) {
        const div = document.createElement('div');
        div.className = 'reel-slide';
        div.id = `reel-slide-${reel.id}`;
        div.dataset.index = index;
        div.dataset.id = reel.id;

        const user = reel.user || {};
        const likeCount = Object.keys(reel.likes || {}).length;
        const commentCount = Object.keys(reel.comments || {}).length;
        const repostCount = Object.keys(reel.reposts || {}).length;
        const userLiked = reel.likes?.[currentUser.uid];
        const userReposted = reel.reposts?.[currentUser.uid];

        div.innerHTML = `
            <video class="reel-video" id="video-${reel.id}" src="${reel.videoUrl}"
                playsinline loop preload="metadata"
                style="pointer-events:none;">
            </video>
            <div class="reel-gradient-top"></div>
            <div class="reel-gradient-bottom"></div>
            <div class="pause-indicator" id="pause-${reel.id}">
                <div class="pause-circle">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="white"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
                </div>
            </div>
            <div class="double-tap-heart" id="heart-${reel.id}">❤️</div>
            <div class="reel-info">
                <div class="reel-author-row">
                    <img class="reel-avatar" src="${user.photoURL || `https://ui-avatars.com/api/?name=${user.username||'U'}&background=random`}" onclick="goToProfile('${reel.uid}')">
                    <div class="reel-author-text">
                        <div class="reel-username">
                            ${escapeHtml(user.displayName || 'User')}
                            ${user.verified ? VERIFIED_BADGE : ''}
                        </div>
                        <div class="reel-handle">@${escapeHtml(user.username || 'user')}</div>
                    </div>
                    ${reel.uid !== currentUser.uid ? `<button class="follow-btn" id="follow-btn-${reel.id}" onclick="toggleFollow('${reel.uid}', '${reel.id}')">Follow</button>` : ''}
                </div>
                <div class="reel-caption" id="caption-${reel.id}">${enrichText(escapeHtml(reel.caption || ''))}</div>
                ${(reel.caption || '').length > 80 ? `<span class="reel-caption-more" onclick="expandCaption('${reel.id}')">more</span>` : ''}
                <div class="reel-audio">
                    <div class="audio-disc">
                        <img src="${user.photoURL || `https://ui-avatars.com/api/?name=${user.username||'U'}&background=random`}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">
                    </div>
                    <span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:180px;">
                        ${escapeHtml(user.displayName || 'Original audio')}
                    </span>
                </div>
            </div>
            <div class="reel-actions">
                <button class="reel-action-btn ${userLiked ? 'liked' : ''}" id="like-btn-${reel.id}" onclick="toggleLike('${reel.id}')">
                    <div class="reel-action-icon">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="${userLiked ? 'currentColor' : 'none'}" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
                    </div>
                    <span class="reel-action-label" id="like-count-${reel.id}">${formatCount(likeCount)}</span>
                </button>
                <button class="reel-action-btn" onclick="openComments('${reel.id}')">
                    <div class="reel-action-icon">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                    </div>
                    <span class="reel-action-label" id="comment-count-${reel.id}">${formatCount(commentCount)}</span>
                </button>
                <button class="reel-action-btn ${userReposted ? 'reposted' : ''}" id="repost-btn-${reel.id}" onclick="handleRepost('${reel.id}')">
                    <div class="reel-action-icon">${REPOST_SVG}</div>
                    <span class="reel-action-label" id="repost-count-${reel.id}">${formatCount(repostCount)}</span>
                </button>
                ${reel.uid === currentUser.uid ? `
                <button class="reel-action-btn" onclick="confirmDeleteReel('${reel.id}')">
                    <div class="reel-action-icon">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>
                    </div>
                    <span class="reel-action-label">Delete</span>
                </button>
                ` : ''}
            </div>
            <div class="reel-progress"><div class="reel-progress-fill" id="progress-${reel.id}"></div></div>
        `;

        // Double-tap to like
        let lastTap = 0;
        div.addEventListener('click', (e) => {
            if (e.target.closest('.reel-actions') || e.target.closest('.reel-info')) return;
            const now = Date.now();
            if (now - lastTap < 300) {
                doubleTapLike(reel.id, e);
            } else {
                togglePlay(reel.id);
            }
            lastTap = now;
        });

        return div;
    }

    function prependSlide(reel) {
        const track = document.getElementById('reel-track');
        const slide = createSlide(reel, 0);
        track.insertBefore(slide, track.firstChild);
        rebuildPositions();
    }

    function positionSlides() {
        const slides = document.querySelectorAll('.reel-slide');
        slides.forEach((slide, i) => {
            slide.style.transform = `translateY(${i * 100}dvh)`;
            slide.dataset.index = i;
        });
        applyTrackOffset();
    }

    function rebuildPositions() {
        // Re-index
        const slides = Array.from(document.querySelectorAll('.reel-slide'));
        slides.forEach((s, i) => { s.dataset.index = i; });
        positionSlides();
    }

    function applyTrackOffset(animated = false) {
        const track = document.getElementById('reel-track');
        track.style.transition = animated ? 'transform 0.42s cubic-bezier(0.77,0,0.175,1)' : 'none';
        track.style.transform = `translateY(calc(-${currentIndex * 100}dvh))`;
    }

    // ── SLIDE ACTIVATION ──
    function activateSlide(index) {
        if (index < 0 || index >= reels.length) return;

        // Pause previous
        if (currentIndex !== index) {
            const prevReel = reels[currentIndex];
            if (prevReel) pauseVideo(prevReel.id);
        }

        currentIndex = index;
        applyTrackOffset(true);

        const reel = reels[currentIndex];
        if (!reel) return;
        playVideo(reel.id);
    }

    function playVideo(reelId) {
        const video = document.getElementById(`video-${reelId}`);
        if (!video) return;
        video.play().catch(() => {});
        document.getElementById(`pause-${reelId}`).classList.remove('show');
        startProgress(reelId);
    }

    function pauseVideo(reelId) {
        const video = document.getElementById(`video-${reelId}`);
        if (!video) return;
        video.pause();
        video.currentTime = 0;
        stopProgress(reelId);
        const fill = document.getElementById(`progress-${reelId}`);
        if (fill) fill.style.width = '0%';
    }

    function togglePlay(reelId) {
        const video = document.getElementById(`video-${reelId}`);
        if (!video) return;
        const pauseEl = document.getElementById(`pause-${reelId}`);
        if (video.paused) {
            video.play();
            pauseEl.classList.remove('show');
            startProgress(reelId);
        } else {
            video.pause();
            pauseEl.classList.add('show');
            stopProgress(reelId);
        }
    }

    function startProgress(reelId) {
        stopProgress(reelId);
        const video = document.getElementById(`video-${reelId}`);
        const fill = document.getElementById(`progress-${reelId}`);
        if (!video || !fill) return;

        progressInterval = setInterval(() => {
            if (!video.duration) return;
            const pct = (video.currentTime / video.duration) * 100;
            fill.style.width = pct + '%';
        }, 100);
    }

    function stopProgress(reelId) {
        clearInterval(progressInterval);
        progressInterval = null;
    }

    // ── DOUBLE TAP LIKE ──
    function doubleTapLike(reelId, event) {
        // Auto-like
        const reel = reels.find(r => r.id === reelId);
        if (reel && !reel.likes?.[currentUser.uid]) {
            toggleLike(reelId);
        }

        // Heart burst at tap position
        const heart = document.getElementById(`heart-${reelId}`);
        if (!heart) return;
        const slide = document.getElementById(`reel-slide-${reelId}`);
        const rect = slide.getBoundingClientRect();
        heart.style.left = (event.clientX - rect.left - 40) + 'px';
        heart.style.top = (event.clientY - rect.top - 40) + 'px';
        heart.classList.remove('burst');
        void heart.offsetWidth; // reflow
        heart.classList.add('burst');
        setTimeout(() => heart.classList.remove('burst'), 750);
    }

    // ── SWIPE / TOUCH ──
    function setupTouchListeners() {
        const container = document.getElementById('reels-container');

        container.addEventListener('touchstart', (e) => {
            touchStartY = e.touches[0].clientY;
            touchStartTime = Date.now();
        }, { passive: true });

        container.addEventListener('touchend', (e) => {
            const dy = touchStartY - e.changedTouches[0].clientY;
            const dt = Date.now() - touchStartTime;
            const speed = Math.abs(dy) / dt;

            if (Math.abs(dy) > 50 || speed > 0.5) {
                if (dy > 0 && currentIndex < reels.length - 1) {
                    activateSlide(currentIndex + 1);
                } else if (dy < 0 && currentIndex > 0) {
                    activateSlide(currentIndex - 1);
                }
            }
        }, { passive: true });

        // Mouse wheel support (desktop)
        let wheelCooldown = false;
        container.addEventListener('wheel', (e) => {
            if (wheelCooldown) return;
            wheelCooldown = true;
            setTimeout(() => wheelCooldown = false, 600);

            if (e.deltaY > 0 && currentIndex < reels.length - 1) activateSlide(currentIndex + 1);
            else if (e.deltaY < 0 && currentIndex > 0) activateSlide(currentIndex - 1);
        }, { passive: true });
    }

    function setupKeyboardListeners() {
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowDown' && currentIndex < reels.length - 1) activateSlide(currentIndex + 1);
            if (e.key === 'ArrowUp' && currentIndex > 0) activateSlide(currentIndex - 1);
            if (e.key === ' ') { e.preventDefault(); const r = reels[currentIndex]; if (r) togglePlay(r.id); }
        });
    }

    // ── LIKE ──
    window.toggleLike = async (reelId) => {
        const likeRef = ref(db, `reels/${reelId}/likes/${currentUser.uid}`);
        const snap = await get(likeRef);
        const btn = document.getElementById(`like-btn-${reelId}`);
        const icon = btn?.querySelector('svg');
        const countEl = document.getElementById(`like-count-${reelId}`);

        const reel = reels.find(r => r.id === reelId);

        if (snap.exists()) {
            await remove(likeRef);
            if (reel && reel.likes) delete reel.likes[currentUser.uid];
            btn?.classList.remove('liked');
            if (icon) { icon.setAttribute('fill', 'none'); }
        } else {
            await set(likeRef, true);
            if (reel) { if (!reel.likes) reel.likes = {}; reel.likes[currentUser.uid] = true; }
            btn?.classList.add('liked');
            if (icon) { icon.setAttribute('fill', 'currentColor'); }
            if (navigator.vibrate) navigator.vibrate(50);

            // Animate icon
            const iconWrap = btn?.querySelector('.reel-action-icon');
            if (iconWrap) { iconWrap.classList.add('like-pop'); setTimeout(() => iconWrap.classList.remove('like-pop'), 500); }
        }

        if (countEl && reel) countEl.textContent = formatCount(Object.keys(reel.likes || {}).length);
    };

    // ── REPOST ──
    window.handleRepost = async (reelId) => {
        const repostRef = ref(db, `reels/${reelId}/reposts/${currentUser.uid}`);
        const snap = await get(repostRef);
        const reel = reels.find(r => r.id === reelId);
        const btn = document.getElementById(`repost-btn-${reelId}`);

        if (snap.exists()) {
            await remove(repostRef);
            if (reel && reel.reposts) delete reel.reposts[currentUser.uid];
            btn?.classList.remove('reposted');
            showToast('Repost removed');
        } else {
            await set(repostRef, serverTimestamp());
            if (reel) { if (!reel.reposts) reel.reposts = {}; reel.reposts[currentUser.uid] = true; }
            btn?.classList.add('reposted');
            showToast('Reposted!');
            if (navigator.vibrate) navigator.vibrate(40);
        }

        const countEl = document.getElementById(`repost-count-${reelId}`);
        if (countEl && reel) countEl.textContent = formatCount(Object.keys(reel.reposts || {}).length);
    };

    // ── FOLLOW ──
    window.toggleFollow = async (uid, reelId) => {
        const followRef = ref(db, `follows/${currentUser.uid}/${uid}`);
        const snap = await get(followRef);
        const btn = document.getElementById(`follow-btn-${reelId}`);
        if (snap.exists()) {
            await remove(followRef);
            if (btn) { btn.textContent = 'Follow'; btn.classList.remove('following'); }
        } else {
            await set(followRef, true);
            if (btn) { btn.textContent = 'Following'; btn.classList.add('following'); }
            showToast('Followed!');
        }
    };

    // ── COMMENTS (simple toast for now – can be expanded) ──
    window.openComments = (reelId) => {
        // Pause while viewing comments
        const reel = reels.find(r => r.id === reelId);
        if (reel) { const v = document.getElementById(`video-${reelId}`); if (v) v.pause(); }
        showToast('Comments coming soon');
    };

    // ── EXPAND CAPTION ──
    window.expandCaption = (reelId) => {
        const el = document.getElementById(`caption-${reelId}`);
        if (el) el.classList.add('expanded');
        const more = el?.nextElementSibling;
        if (more && more.classList.contains('reel-caption-more')) more.style.display = 'none';
    };

    // ── DELETE ──
    window.confirmDeleteReel = (reelId) => {
        if (confirm('Delete this reel? This cannot be undone.')) {
            remove(ref(db, `reels/${reelId}`)).then(() => showToast('Reel deleted'));
        }
    };

    // ── GO TO PROFILE ──
    window.goToProfile = (uid) => { window.location.href = `profile.html?id=${uid}`; };

    // ── UPLOAD ──
    window.triggerFileInput = () => document.getElementById('reel-file-input').click();

    window.handleVideoSelect = (e) => {
        const file = e.target.files[0];
        if (!file) return;

        const video = document.createElement('video');
        video.preload = 'metadata';
        video.onloadedmetadata = () => {
            window.URL.revokeObjectURL(video.src);
            if (video.duration > MAX_VIDEO_DURATION) {
                showToast(`Video too long. Max ${MAX_VIDEO_DURATION / 60} minutes.`);
                return;
            }
            selectedFile = file;
            const preview = document.getElementById('preview-video');
            preview.src = URL.createObjectURL(file);
            preview.play().catch(() => {});
            document.getElementById('video-preview-wrap').classList.add('active');
            document.getElementById('upload-zone').style.display = 'none';
            updatePostBtn();
        };
        video.src = URL.createObjectURL(file);
    };

    window.clearVideoSelection = (e) => {
        e.stopPropagation();
        selectedFile = null;
        const preview = document.getElementById('preview-video');
        preview.pause();
        preview.src = '';
        document.getElementById('video-preview-wrap').classList.remove('active');
        document.getElementById('upload-zone').style.display = 'block';
        document.getElementById('reel-file-input').value = '';
        updatePostBtn();
    };

    window.updatePostBtn = () => {
        const btn = document.getElementById('post-reel-btn');
        btn.classList.toggle('ready', !!selectedFile);
    };

    window.uploadReel = async () => {
        if (!selectedFile) return;

        const btn = document.getElementById('post-reel-btn');
        btn.textContent = 'Uploading…';
        btn.disabled = true;

        const progressBar = document.getElementById('upload-progress');
        const fill = document.getElementById('progress-fill');
        progressBar.classList.add('active');

        try {
            // Simulate progress (Cloudinary doesn't expose XHR progress via fetch)
            let fakeProgress = 0;
            const fakeInterval = setInterval(() => {
                fakeProgress = Math.min(fakeProgress + Math.random() * 8, 88);
                fill.style.width = fakeProgress + '%';
            }, 300);

            const formData = new FormData();
            formData.append('file', selectedFile);
            formData.append('upload_preset', CLOUDINARY_UPLOAD_PRESET);
            formData.append('folder', 'reels');
            formData.append('resource_type', 'video');

            const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD_NAME}/video/upload`, {
                method: 'POST',
                body: formData
            });

            clearInterval(fakeInterval);
            fill.style.width = '100%';

            if (!res.ok) throw new Error('Upload failed');
            const data = await res.json();

            const caption = document.getElementById('caption-input').value.trim();

            const reelRef = push(ref(db, 'reels'));
            await set(reelRef, {
                uid: currentUser.uid,
                videoUrl: data.secure_url,
                thumbnailUrl: data.secure_url.replace('/upload/', '/upload/so_0,f_jpg/'),
                caption,
                duration: data.duration || 0,
                timestamp: serverTimestamp(),
                likes: {},
                comments: {},
                reposts: {}
            });

            showToast('Reel posted! 🎬');
            closeUploadSheet();
            resetUploadForm();

        } catch (err) {
            showToast('Upload failed. Try again.');
            console.error(err);
        } finally {
            btn.textContent = 'Post Reel';
            btn.disabled = false;
            progressBar.classList.remove('active');
            fill.style.width = '0%';
        }
    };

    function resetUploadForm() {
        selectedFile = null;
        document.getElementById('caption-input').value = '';
        const preview = document.getElementById('preview-video');
        preview.pause();
        preview.src = '';
        document.getElementById('video-preview-wrap').classList.remove('active');
        document.getElementById('upload-zone').style.display = 'block';
        document.getElementById('reel-file-input').value = '';
        updatePostBtn();
    }

    // ── UPLOAD SHEET ──
    window.openUploadSheet = () => {
        // Pause current reel
        const reel = reels[currentIndex];
        if (reel) { const v = document.getElementById(`video-${reel.id}`); if (v) v.pause(); }
        document.getElementById('modal-overlay').classList.add('active');
    };

    window.closeUploadSheet = () => {
        document.getElementById('modal-overlay').classList.remove('active');
        // Resume current reel
        const reel = reels[currentIndex];
        if (reel) { const v = document.getElementById(`video-${reel.id}`); if (v) v.play().catch(()=>{}); }
    };

    // ── DRAG & DROP on upload zone ──
    const zone = document.getElementById('upload-zone');
    zone.addEventListener('dragover', (e) => { e.preventDefault(); zone.classList.add('drag-over'); });
    zone.addEventListener('dragleave', () => zone.classList.remove('drag-over'));
    zone.addEventListener('drop', (e) => {
        e.preventDefault();
        zone.classList.remove('drag-over');
        const file = e.dataTransfer.files[0];
        if (file && file.type.startsWith('video/')) {
            const dt = new DataTransfer();
            dt.items.add(file);
            document.getElementById('reel-file-input').files = dt.files;
            handleVideoSelect({ target: { files: [file] } });
        }
    });

    // ── UTILITIES ──
    function formatCount(n) {
        if (!n) return '0';
        if (n >= 1000000) return (n / 1000000).toFixed(1) + 'M';
        if (n >= 1000) return (n / 1000).toFixed(1) + 'K';
        return String(n);
    }

    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    function enrichText(html) {
        return html
            .replace(/(https?:\/\/[^\s<]+)/g, '<span style="color:#818CF8">$1</span>')
            .replace(/@([a-zA-Z0-9_]+)/g, '<span style="color:#818CF8;font-weight:600">@$1</span>')
            .replace(/#([a-zA-Z0-9_]+)/g, '<span style="color:#818CF8;font-weight:600">#$1</span>');
    }

    window.showToast = (msg) => {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 3000);
    };

    window.goHome = () => { window.location.href = 'home.html'; };
    window.goToSearch = () => { window.location.href = 'search.html'; };
    window.goToNotifications = () => { window.location.href = 'notifications.html'; };
</script>

</body>
</html>
