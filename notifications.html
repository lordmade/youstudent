<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Notifications · Vynix</title>
    <script src="https://unpkg.com/feather-icons"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root,[data-theme="light"]{--primary:#6366F1;--primary-rgb:99,102,241;--background:#F8FAFC;--surface:#FFFFFF;--surface2:#F1F5F9;--border:#E2E8F0;--text-primary:#0F172A;--text-secondary:#64748B;--text-muted:#94A3B8;--like:#F43F5E;--verified:#1D9BF0;--repost:#10B981;--shadow-lg:0 10px 40px rgba(0,0,0,0.12);}
        [data-theme="dark"]{--primary:#818CF8;--primary-rgb:129,140,248;--background:#0F172A;--surface:#1E293B;--surface2:#334155;--border:#334155;--text-primary:#F1F5F9;--text-secondary:#94A3B8;--text-muted:#64748B;--like:#FB7185;--verified:#38BDF8;--repost:#34D399;--shadow-lg:0 10px 40px rgba(0,0,0,0.5);}
        [data-theme="midnight"]{--primary:#C084FC;--primary-rgb:192,132,252;--background:#09090B;--surface:#18181B;--surface2:#27272A;--border:#3F3F46;--text-primary:#FAFAFA;--text-secondary:#A1A1AA;--text-muted:#71717A;--like:#F472B6;--verified:#67E8F9;--repost:#4ADE80;--shadow-lg:0 10px 40px rgba(0,0,0,0.7);}
        [data-theme="ocean"]{--primary:#06B6D4;--primary-rgb:6,182,212;--background:#F0F9FF;--surface:#FFFFFF;--surface2:#E0F2FE;--border:#BAE6FD;--text-primary:#0C4A6E;--text-secondary:#0369A1;--text-muted:#7DD3FC;--like:#F43F5E;--verified:#06B6D4;--repost:#10B981;--shadow-lg:0 10px 40px rgba(6,182,212,0.15);}
        [data-theme="rose"]{--primary:#E11D48;--primary-rgb:225,29,72;--background:#FFF1F2;--surface:#FFFFFF;--surface2:#FFE4E6;--border:#FECDD3;--text-primary:#881337;--text-secondary:#9F1239;--text-muted:#FDA4AF;--like:#E11D48;--verified:#3B82F6;--repost:#10B981;--shadow-lg:0 10px 40px rgba(225,29,72,0.15);}

        *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
        body{font-family:'Inter',sans-serif;background:var(--background);color:var(--text-primary);-webkit-font-smoothing:antialiased;padding-bottom:calc(80px + env(safe-area-inset-bottom));transition:background 0.3s,color 0.3s;}

        @keyframes spin{to{transform:rotate(360deg);}}
        @keyframes slideIn{from{opacity:0;transform:translateX(-12px);}to{opacity:1;transform:translateX(0);}}
        @keyframes fadeIn{from{opacity:0;}to{opacity:1;}}

        .header{position:sticky;top:0;z-index:50;background:rgba(255,255,255,0.92);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;gap:12px;transition:background 0.3s;}
        [data-theme="dark"] .header{background:rgba(30,41,59,0.92);}
        [data-theme="midnight"] .header{background:rgba(24,24,27,0.95);}
        .back-btn{background:none;border:none;color:var(--text-primary);cursor:pointer;display:flex;align-items:center;justify-content:center;padding:4px;border-radius:50%;transition:background 0.2s;}
        .back-btn:hover{background:var(--surface2);}
        .header-title{font-size:18px;font-weight:800;color:var(--text-primary);flex:1;}
        .mark-all-btn{background:none;border:none;color:var(--primary);font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;padding:6px 10px;border-radius:8px;transition:background 0.2s;}
        .mark-all-btn:hover{background:rgba(var(--primary-rgb),0.08);}

        /* Filter tabs */
        .filter-tabs{display:flex;gap:8px;padding:12px 16px;overflow-x:auto;scrollbar-width:none;border-bottom:1px solid var(--border);background:var(--surface);}
        .filter-tabs::-webkit-scrollbar{display:none;}
        .filter-tab{flex-shrink:0;padding:6px 14px;border-radius:9999px;font-size:13px;font-weight:600;border:1px solid var(--border);background:none;color:var(--text-secondary);cursor:pointer;font-family:inherit;transition:all 0.2s;}
        .filter-tab.active{background:var(--primary);color:white;border-color:var(--primary);}
        .filter-tab:hover:not(.active){background:var(--surface2);color:var(--text-primary);}

        .notif-list{padding:0;}

        .notif-item{display:flex;align-items:flex-start;gap:12px;padding:14px 16px;border-bottom:1px solid var(--border);cursor:pointer;transition:background 0.15s;animation:slideIn 0.3s ease-out;position:relative;}
        .notif-item:hover{background:var(--surface2);}
        .notif-item.unread{background:rgba(var(--primary-rgb),0.04);}
        .notif-item.unread::before{content:'';position:absolute;left:6px;top:50%;transform:translateY(-50%);width:6px;height:6px;border-radius:50%;background:var(--primary);}
        .notif-avatar-wrap{position:relative;flex-shrink:0;}
        .notif-avatar{width:46px;height:46px;border-radius:50%;object-fit:cover;}
        .notif-icon{position:absolute;bottom:-2px;right:-2px;width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;border:2px solid var(--surface);}
        .notif-icon svg{width:11px;height:11px;}
        .notif-icon.like{background:var(--like);}
        .notif-icon.comment{background:var(--primary);}
        .notif-icon.follow{background:var(--repost);}
        .notif-icon.mention{background:#F59E0B;}
        .notif-icon.tag{background:#8B5CF6;}
        .notif-icon.repost{background:var(--repost);}

        .notif-body{flex:1;min-width:0;}
        .notif-text{font-size:14px;line-height:1.45;color:var(--text-primary);}
        .notif-text strong{font-weight:700;}
        .notif-time{font-size:12px;color:var(--text-muted);margin-top:3px;}
        .notif-preview{font-size:13px;color:var(--text-secondary);margin-top:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;background:var(--surface2);padding:5px 10px;border-radius:8px;border:1px solid var(--border);}

        .notif-thumb{width:46px;height:46px;border-radius:10px;object-fit:cover;flex-shrink:0;border:1px solid var(--border);}
        .follow-btn{flex-shrink:0;background:var(--primary);color:white;border:none;padding:7px 14px;border-radius:9999px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;transition:opacity 0.2s;}
        .follow-btn:hover{opacity:0.85;}
        .follow-btn.following{background:var(--surface2);color:var(--text-primary);}

        .empty-state{padding:64px 24px;text-align:center;}
        .empty-icon{width:64px;height:64px;border-radius:24px;background:var(--surface2);display:flex;align-items:center;justify-content:center;margin:0 auto 16px;}
        .empty-title{font-size:18px;font-weight:700;margin-bottom:8px;color:var(--text-primary);}
        .empty-sub{font-size:14px;color:var(--text-muted);}

        .loading{padding:48px;text-align:center;}
        .spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin 0.9s linear infinite;margin:0 auto;}

        .bottom-nav{position:fixed;bottom:0;left:0;right:0;background:rgba(255,255,255,0.95);backdrop-filter:blur(20px);border-top:1px solid var(--border);padding:8px 0 calc(8px + env(safe-area-inset-bottom));display:flex;justify-content:space-around;z-index:100;transition:background 0.3s;}
        [data-theme="dark"] .bottom-nav,[data-theme="midnight"] .bottom-nav{background:rgba(30,41,59,0.97);}
        [data-theme="midnight"] .bottom-nav{background:rgba(24,24,27,0.97);}
        .nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;padding:8px;color:var(--text-secondary);background:none;border:none;font-family:inherit;cursor:pointer;transition:color 0.2s;position:relative;}
        .nav-item.active{color:var(--primary);}
        .nav-item span{font-size:11px;font-weight:600;}
        .nav-badge{position:absolute;top:4px;right:calc(50% - 16px);background:var(--like);color:white;font-size:10px;font-weight:800;min-width:18px;height:18px;border-radius:9px;display:none;align-items:center;justify-content:center;padding:0 5px;border:2px solid var(--surface);}
        .nav-badge.show{display:flex;}
        .fab{width:56px;height:56px;background:var(--primary);color:white;border:none;border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(var(--primary-rgb),0.4);transform:translateY(-20px);cursor:pointer;}

        .toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%) translateY(100px);background:var(--text-primary);color:var(--surface);padding:12px 24px;border-radius:9999px;font-weight:500;opacity:0;transition:all 0.3s;z-index:9999;pointer-events:none;}
        .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

        @media(min-width:1024px){.bottom-nav{display:none;}body{padding-bottom:0;}
            .notif-list-wrap{max-width:600px;margin:0 auto;border-left:1px solid var(--border);border-right:1px solid var(--border);}
        }
    </style>
</head>
<body>

<header class="header">
    <button class="back-btn" onclick="history.back()">
        <i data-feather="arrow-left" style="width:22px;height:22px;"></i>
    </button>
    <span class="header-title">Notifications</span>
    <button class="mark-all-btn" onclick="markAllRead()">Mark all read</button>
</header>

<div class="filter-tabs" id="filter-tabs">
    <button class="filter-tab active" onclick="setFilter('all',this)">All</button>
    <button class="filter-tab" onclick="setFilter('like',this)">❤️ Likes</button>
    <button class="filter-tab" onclick="setFilter('comment',this)">💬 Comments</button>
    <button class="filter-tab" onclick="setFilter('follow',this)">👤 Follows</button>
    <button class="filter-tab" onclick="setFilter('mention',this)">@ Mentions</button>
    <button class="filter-tab" onclick="setFilter('tag',this)">🏷 Tags</button>
    <button class="filter-tab" onclick="setFilter('repost',this)">🔁 Reposts</button>
</div>

<div class="notif-list-wrap">
    <div class="notif-list" id="notif-list">
        <div class="loading"><div class="spinner"></div></div>
    </div>
</div>

<nav class="bottom-nav">
    <button class="nav-item" onclick="window.location.href='index.html'"><i data-feather="home"></i><span>Home</span></button>
    <button class="nav-item" onclick="window.location.href='search.html'"><i data-feather="search"></i><span>Search</span></button>
    <button class="fab" onclick="window.location.href='index.html'"><i data-feather="plus" style="width:28px;height:28px;"></i></button>
    <button class="nav-item active"><i data-feather="bell"></i><span>Alerts</span><span class="nav-badge show" id="badge-notifications"></span></button>
    <button class="nav-item" onclick="window.location.href='messages.html'"><i data-feather="mail"></i><span>Messages</span><span class="nav-badge" id="badge-messages"></span></button>
</nav>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getDatabase, ref, onValue, get, update, set, remove, serverTimestamp, push } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig={apiKey:"AIzaSyBOyZ3As4GTuNvjemvPF_SpsC6m6vqtNhc",authDomain:"fire-b-a8878.firebaseapp.com",databaseURL:"https://fire-b-a8878.firebaseio.com",projectId:"fire-b-a8878",storageBucket:"fire-b-a8878.appspot.com",messagingSenderId:"658673187627",appId:"1:658673187627:web:6e4c29af661785f0afa36e"};
const app=initializeApp(firebaseConfig); const auth=getAuth(app); const db=getDatabase(app);

// Apply theme
document.documentElement.setAttribute('data-theme', localStorage.getItem('vynix_theme') || 'light');

let currentUser=null, allNotifications=[], currentFilter='all', followingMap={};

onAuthStateChanged(auth, async user=>{
    if(!user){window.location.href='auth.html';return;}
    currentUser=user;
    loadFollowing();
    setupBadges();
    listenNotifications();
});

function setupBadges(){
    onValue(ref(db,`userChats/${currentUser.uid}`), snap=>{
        let c=0; if(snap.exists())snap.forEach(ch=>c+=ch.val().unreadCount||0);
        updateBadge('badge-messages',c);
    });
}

function updateBadge(id,count){
    const b=document.getElementById(id); if(!b)return;
    if(count>0){b.textContent=count>99?'99+':count;b.classList.add('show');}else b.classList.remove('show');
}

async function loadFollowing(){
    try{const s=await get(ref(db,`users/${currentUser.uid}/following`));if(s.exists())followingMap=s.val()||{};}catch{}
}

function listenNotifications(){
    onValue(ref(db,`notifications/${currentUser.uid}`), snap=>{
        allNotifications=[];
        if(snap.exists()){
            snap.forEach(child=>{ allNotifications.push({id:child.key,...child.val()}); });
            allNotifications.sort((a,b)=>(b.timestamp||0)-(a.timestamp||0));
        }
        const unread=allNotifications.filter(n=>!n.read).length;
        updateBadge('badge-notifications',unread);
        renderNotifications();
    });
}

function setFilter(filter, btn){
    currentFilter=filter;
    document.querySelectorAll('.filter-tab').forEach(t=>t.classList.remove('active'));
    btn.classList.add('active');
    renderNotifications();
}
window.setFilter=setFilter;

function renderNotifications(){
    const list=document.getElementById('notif-list');
    let filtered=currentFilter==='all' ? allNotifications : allNotifications.filter(n=>n.type===currentFilter);
    if(!filtered.length){
        list.innerHTML=`<div class="empty-state">
            <div class="empty-icon"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="var(--text-muted)" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg></div>
            <div class="empty-title">No notifications yet</div>
            <div class="empty-sub">${currentFilter==='all'?'When people interact with you, you\'ll see it here.':'No '+currentFilter+' notifications.'}</div>
        </div>`;
        return;
    }
    list.innerHTML=filtered.map(n=>renderNotif(n)).join('');
    feather.replace();
}

function getIcon(type){
    const icons={
        like:`<svg viewBox="0 0 24 24" fill="white" stroke="none"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg>`,
        comment:`<svg viewBox="0 0 24 24" fill="white" stroke="none"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>`,
        follow:`<svg viewBox="0 0 24 24" fill="white" stroke="none"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14" stroke="white" stroke-width="2"/><line x1="22" y1="11" x2="16" y2="11" stroke="white" stroke-width="2"/></svg>`,
        mention:`<svg viewBox="0 0 24 24" fill="white" stroke="none"><circle cx="12" cy="12" r="4"/><path d="M16 8v5a3 3 0 0 0 6 0v-1a10 10 0 1 0-3.92 7.94"/></svg>`,
        tag:`<svg viewBox="0 0 24 24" fill="white" stroke="none"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7" stroke="black" stroke-width="3" stroke-linecap="round"/></svg>`,
        repost:`<svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>`,
    };
    return icons[type] || icons.like;
}

function getText(n){
    const name=`<strong>${escapeHtml(n.actorName||'Someone')}</strong>`;
    switch(n.type){
        case 'like': return `${name} liked your post`;
        case 'comment': return `${name} commented on your post`;
        case 'follow': return `${name} started following you`;
        case 'mention': return `${name} mentioned you in a post`;
        case 'tag': return `${name} tagged you in a post`;
        case 'repost': return `${name} reposted your post`;
        default: return `${name} interacted with you`;
    }
}

function renderNotif(n){
    const isFollowed=n.type==='follow' && !!followingMap[n.actorId];
    const followBtn=n.type==='follow'
        ? `<button class="follow-btn ${isFollowed?'following':''}" onclick="toggleFollow('${n.actorId}',this,event)">${isFollowed?'Following':'Follow'}</button>`
        : '';
    const thumb=n.postThumb && n.type!=='follow'
        ? `<img class="notif-thumb" src="${n.postThumb}" alt="">`
        : followBtn;
    const preview=n.commentText ? `<div class="notif-preview">"${escapeHtml(n.commentText.slice(0,80))}${n.commentText.length>80?'…':''}"</div>` : '';

    return `<div class="notif-item ${n.read?'':'unread'}" id="notif-${n.id}" onclick="handleNotifClick('${n.id}','${n.type}','${n.postId||''}','${n.actorId||''}')">
        <div class="notif-avatar-wrap">
            <img class="notif-avatar" src="${n.actorPhoto||`https://ui-avatars.com/api/?name=${encodeURIComponent(n.actorName||'U')}&background=random`}" alt="">
            <div class="notif-icon ${n.type}">${getIcon(n.type)}</div>
        </div>
        <div class="notif-body">
            <div class="notif-text">${getText(n)}</div>
            ${preview}
            <div class="notif-time">${formatTime(n.timestamp)}</div>
        </div>
        ${thumb}
    </div>`;
}

window.handleNotifClick=async(notifId, type, postId, actorId)=>{
    // Mark as read
    try{await update(ref(db,`notifications/${currentUser.uid}/${notifId}`),{read:true});}catch{}
    // Navigate
    if(type==='follow' && actorId) window.location.href=`profile.html?id=${actorId}`;
    else if(postId) window.location.href=`index.html#post-${postId}`;
    else if(actorId) window.location.href=`profile.html?id=${actorId}`;
};

window.toggleFollow=async(uid, btn, e)=>{
    e.stopPropagation();
    const isFollowing=btn.classList.contains('following');
    try{
        if(isFollowing){
            await remove(ref(db,`users/${currentUser.uid}/following/${uid}`));
            await remove(ref(db,`users/${uid}/followers/${currentUser.uid}`));
            btn.textContent='Follow'; btn.classList.remove('following');
            followingMap[uid]=false;
        }else{
            await set(ref(db,`users/${currentUser.uid}/following/${uid}`),true);
            await set(ref(db,`users/${uid}/followers/${currentUser.uid}`),true);
            btn.textContent='Following'; btn.classList.add('following');
            followingMap[uid]=true;
        }
    }catch{showToast('Action failed');}
};

window.markAllRead=async()=>{
    const unread=allNotifications.filter(n=>!n.read);
    if(!unread.length){showToast('All caught up!');return;}
    const updates={};
    unread.forEach(n=>updates[`notifications/${currentUser.uid}/${n.id}/read`]=true);
    try{
        const {getDatabase:gDB,ref:rr,update:uu}=await import("https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js");
        await update(ref(db),updates);
        showToast('All marked as read');
    }catch{showToast('Failed to mark read');}
};

function formatTime(ts){
    if(!ts)return'just now'; const s=Math.floor((Date.now()-ts)/1000);
    if(s<60)return'just now'; if(s<3600)return Math.floor(s/60)+'m ago';
    if(s<86400)return Math.floor(s/3600)+'h ago';
    if(s<604800)return Math.floor(s/86400)+'d ago';
    return new Date(ts).toLocaleDateString(undefined,{month:'short',day:'numeric'});
}
function escapeHtml(t){const d=document.createElement('div');d.textContent=t;return d.innerHTML;}
window.showToast=msg=>{const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3000);};

feather.replace();
</script>
</body>
</html>
