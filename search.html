<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Vynix · Search</title>
    <script src="https://unpkg.com/feather-icons"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* ══ THEME SYSTEM ══ */
        :root,[data-theme="light"]{
            --primary:#6366F1;--primary-dark:#4F46E5;--primary-rgb:99,102,241;
            --background:#F8FAFC;--surface:#FFFFFF;--surface2:#F1F5F9;
            --border:#E2E8F0;--text-primary:#0F172A;--text-secondary:#64748B;--text-muted:#94A3B8;
            --like:#F43F5E;--verified:#1D9BF0;
            --nav-bg: rgba(255,255,255,0.92);
        }
        [data-theme="dark"]{
            --primary:#818CF8;--primary-dark:#6366F1;--primary-rgb:129,140,248;
            --background:#0F172A;--surface:#1E293B;--surface2:#334155;
            --border:#334155;--text-primary:#F1F5F9;--text-secondary:#94A3B8;--text-muted:#64748B;
            --like:#FB7185;--verified:#38BDF8;
            --nav-bg: rgba(15,23,42,0.95);
        }
        [data-theme="midnight"]{
            --primary:#C084FC;--primary-dark:#A855F7;--primary-rgb:192,132,252;
            --background:#09090B;--surface:#18181B;--surface2:#27272A;
            --border:#3F3F46;--text-primary:#FAFAFA;--text-secondary:#A1A1AA;--text-muted:#71717A;
            --like:#F472B6;--verified:#67E8F9;
            --nav-bg: rgba(9,9,11,0.95);
        }
        [data-theme="ocean"]{
            --primary:#06B6D4;--primary-dark:#0891B2;--primary-rgb:6,182,212;
            --background:#F0F9FF;--surface:#FFFFFF;--surface2:#E0F2FE;
            --border:#BAE6FD;--text-primary:#0C4A6E;--text-secondary:#0369A1;--text-muted:#7DD3FC;
            --like:#F43F5E;--verified:#06B6D4;
            --nav-bg: rgba(240,249,255,0.92);
        }
        [data-theme="rose"]{
            --primary:#E11D48;--primary-dark:#BE123C;--primary-rgb:225,29,72;
            --background:#FFF1F2;--surface:#FFFFFF;--surface2:#FFE4E6;
            --border:#FECDD3;--text-primary:#881337;--text-secondary:#9F1239;--text-muted:#FDA4AF;
            --like:#E11D48;--verified:#3B82F6;
            --nav-bg: rgba(255,241,242,0.92);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--background);
            color: var(--text-primary);
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
            padding-bottom: calc(100px + env(safe-area-inset-bottom));
            min-height: 100vh;
            transition: background 0.3s, color 0.3s;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes navSlideUp { from { opacity: 0; transform: translateX(-50%) translateY(20px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }
        @keyframes badgePop { 0% { transform: scale(0.5); } 70% { transform: scale(1.2); } 100% { transform: scale(1); } }

        .shimmer {
            background: linear-gradient(90deg, var(--surface2) 25%, var(--border) 50%, var(--surface2) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: 6px;
        }

        .app-container { max-width: 100%; margin: 0 auto; }
        @media (min-width: 1024px) {
            .app-container { max-width: 600px; border-left: 1px solid var(--border); border-right: 1px solid var(--border); }
        }

        /* ── Header ── */
        .header {
            position: sticky; top: 0; z-index: 50;
            background: rgba(255,255,255,0.97);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            padding: 12px 16px;
            transition: background 0.3s, border-color 0.3s;
        }
        [data-theme="dark"] .header { background: rgba(30,41,59,0.97); }
        [data-theme="midnight"] .header { background: rgba(24,24,27,0.98); }
        [data-theme="ocean"] .header { background: rgba(240,249,255,0.97); }
        [data-theme="rose"] .header { background: rgba(255,241,242,0.97); }

        .search-bar-row { display: flex; align-items: center; gap: 10px; }

        .back-btn {
            background: none; border: none; color: var(--text-primary);
            cursor: pointer; padding: 6px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0; transition: background 0.15s;
        }
        .back-btn:hover { background: var(--surface2); }

        .search-input-wrap {
            flex: 1; display: flex; align-items: center; gap: 10px;
            background: var(--surface2);
            border: 1.5px solid transparent;
            border-radius: 9999px; padding: 10px 16px;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .search-input-wrap:focus-within {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(var(--primary-rgb), 0.12);
        }
        .search-input-wrap i { color: var(--text-muted); flex-shrink: 0; transition: color 0.2s; }
        .search-input-wrap:focus-within i { color: var(--primary); }

        #search-input {
            flex: 1; border: none; outline: none; background: transparent;
            font-size: 16px; font-family: inherit; color: var(--text-primary);
        }
        #search-input::placeholder { color: var(--text-muted); }

        .clear-btn {
            background: var(--text-muted); border: none; color: white;
            width: 18px; height: 18px; border-radius: 50%;
            display: none; align-items: center; justify-content: center;
            cursor: pointer; flex-shrink: 0; transition: background 0.15s;
        }
        .clear-btn.show { display: flex; }
        .clear-btn:hover { background: var(--text-secondary); }

        /* ── Filter tabs ── */
        .filter-tabs {
            display: flex; gap: 0;
            border-bottom: 1px solid var(--border);
            background: var(--surface);
            transition: background 0.3s;
        }
        .filter-tab {
            flex: 1; padding: 12px 8px; text-align: center;
            font-size: 14px; font-weight: 600; color: var(--text-secondary);
            background: none; border: none; cursor: pointer;
            position: relative; transition: color 0.2s; font-family: inherit;
        }
        .filter-tab::after {
            content: ''; position: absolute; bottom: 0; left: 20%; right: 20%;
            height: 3px; border-radius: 3px 3px 0 0; background: var(--primary);
            transform: scaleX(0); transition: transform 0.2s;
        }
        .filter-tab.active { color: var(--primary); }
        .filter-tab.active::after { transform: scaleX(1); }

        /* ── Sections ── */
        .section { padding: 16px 16px 8px; }
        .section-title {
            font-size: 13px; font-weight: 700; color: var(--text-muted);
            text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 12px;
        }

        /* ── Trending chips ── */
        .trending-chips { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 4px; }
        .trend-chip {
            background: var(--surface2); border: 1px solid var(--border);
            border-radius: 9999px; padding: 6px 14px;
            font-size: 13px; font-weight: 600; color: var(--text-secondary);
            cursor: pointer; transition: all 0.2s; white-space: nowrap;
        }
        .trend-chip:hover {
            border-color: var(--primary); color: var(--primary);
            background: rgba(var(--primary-rgb), 0.06);
        }
        .trend-chip .chip-hash { color: var(--primary); }

        /* ── Trending posts ── */
        .trending-post {
            display: flex; gap: 12px; padding: 12px 16px;
            border-bottom: 1px solid var(--border); background: var(--surface);
            cursor: pointer; transition: background 0.15s; animation: fadeIn 0.3s ease-out;
        }
        .trending-post:hover { background: var(--surface2); }
        .trending-rank { font-size: 20px; font-weight: 800; color: var(--border); width: 28px; flex-shrink: 0; line-height: 1; padding-top: 2px; }
        .trending-meta { flex: 1; min-width: 0; }
        .trending-tag { font-size: 15px; font-weight: 700; color: var(--text-primary); margin-bottom: 2px; }
        .trending-count { font-size: 13px; color: var(--text-muted); }
        .trending-thumb { width: 56px; height: 56px; border-radius: 12px; object-fit: cover; flex-shrink: 0; }

        /* ── User cards ── */
        .user-card {
            display: flex; align-items: center; gap: 12px;
            padding: 12px 16px; border-bottom: 1px solid var(--border);
            background: var(--surface); cursor: pointer; transition: background 0.15s;
            animation: fadeIn 0.3s ease-out both;
        }
        .user-card:hover { background: var(--surface2); }

        .user-avatar { width: 48px; height: 48px; border-radius: 50%; object-fit: cover; flex-shrink: 0; }
        .user-info { flex: 1; min-width: 0; }
        .user-name-row { display: flex; align-items: center; gap: 4px; font-weight: 700; font-size: 15px; margin-bottom: 2px; }
        .user-name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: var(--text-primary); }
        .user-handle { font-size: 13px; color: var(--text-secondary); font-weight: 400; }
        .user-bio { font-size: 13px; color: var(--text-secondary); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; margin-top: 2px; }

        .follow-btn {
            background: var(--text-primary); color: var(--surface);
            border: none; padding: 7px 18px; border-radius: 9999px;
            font-size: 13px; font-weight: 700; cursor: pointer; flex-shrink: 0;
            transition: all 0.2s; font-family: inherit;
        }
        .follow-btn:hover { opacity: 0.85; }
        .follow-btn.following {
            background: var(--surface2); color: var(--text-primary);
            border: 1.5px solid var(--border);
        }

        /* ── Post results ── */
        .post-result {
            background: var(--surface); border-bottom: 1px solid var(--border);
            padding: 14px 16px; cursor: pointer; transition: background 0.15s;
            animation: fadeIn 0.3s ease-out both;
        }
        .post-result:hover { background: var(--surface2); }

        .post-result-header { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
        .post-result-avatar { width: 36px; height: 36px; border-radius: 50%; object-fit: cover; flex-shrink: 0; }
        .post-result-meta { flex: 1; min-width: 0; }
        .post-result-name { font-weight: 700; font-size: 14px; display: flex; align-items: center; gap: 4px; color: var(--text-primary); }
        .post-result-handle { font-size: 12px; color: var(--text-muted); }

        .post-result-text {
            font-size: 15px; line-height: 1.5; color: var(--text-primary);
            display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical;
            overflow: hidden; word-wrap: break-word;
        }
        .post-result-text .highlight {
            background: rgba(var(--primary-rgb), 0.15); color: var(--primary);
            font-weight: 600; border-radius: 3px; padding: 0 2px;
        }

        .post-result-media { margin-top: 10px; border-radius: 12px; overflow: hidden; border: 1px solid var(--border); }
        .post-result-media img { width: 100%; max-height: 200px; object-fit: cover; display: block; }

        .post-result-stats { display: flex; gap: 16px; margin-top: 8px; color: var(--text-muted); font-size: 13px; }
        .post-stat { display: flex; align-items: center; gap: 4px; }

        .verified-badge { color: var(--verified); display: inline-flex; align-items: center; flex-shrink: 0; }

        /* ── States ── */
        .empty-state { padding: 64px 24px; text-align: center; color: var(--text-muted); }
        .empty-state svg { margin: 0 auto 16px; opacity: 0.3; display: block; }
        .empty-state h3 { font-size: 18px; font-weight: 700; color: var(--text-secondary); margin-bottom: 6px; }
        .empty-state p { font-size: 14px; }

        .spinner {
            width: 36px; height: 36px; border: 3px solid var(--border);
            border-top-color: var(--primary); border-radius: 50%;
            animation: spin 0.8s linear infinite; margin: 32px auto;
        }

        /* ── Recent searches ── */
        .recent-item {
            display: flex; align-items: center; gap: 12px;
            padding: 10px 16px; cursor: pointer; transition: background 0.15s; border-radius: 12px;
        }
        .recent-item:hover { background: var(--surface2); }
        .recent-icon {
            width: 36px; height: 36px; border-radius: 50%;
            background: var(--surface2);
            display: flex; align-items: center; justify-content: center;
            color: var(--text-secondary); flex-shrink: 0;
        }
        .recent-text { flex: 1; font-size: 15px; color: var(--text-primary); font-weight: 500; }
        .recent-remove {
            background: none; border: none; color: var(--text-muted);
            cursor: pointer; padding: 4px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center; transition: color 0.15s;
        }
        .recent-remove:hover { color: var(--like); }

        /* ══════════════════════════════════════════
           PILL BOTTOM NAV — Instagram style but pill-shaped
        ══════════════════════════════════════════ */
        .bottom-nav {
            position: fixed;
            bottom: calc(16px + env(safe-area-inset-bottom));
            left: 50%;
            transform: translateX(-50%);
            width: calc(100% - 32px);
            max-width: 420px;
            background: var(--nav-bg);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--border);
            border-radius: 9999px;
            padding: 8px 12px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 100;
            box-shadow: 0 8px 32px rgba(0,0,0,0.12), 0 2px 8px rgba(0,0,0,0.06);
            animation: navSlideUp 0.4s cubic-bezier(0.34,1.56,0.64,1) both;
            transition: background 0.3s, border-color 0.3s, box-shadow 0.3s;
        }
        [data-theme="dark"] .bottom-nav,
        [data-theme="midnight"] .bottom-nav {
            box-shadow: 0 8px 32px rgba(0,0,0,0.45), 0 2px 8px rgba(0,0,0,0.3);
        }

        .nav-item {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px 4px;
            background: none;
            border: none;
            cursor: pointer;
            color: var(--text-secondary);
            transition: color 0.2s, transform 0.15s;
            position: relative;
            border-radius: 9999px;
        }
        .nav-item:active { transform: scale(0.85); }
        .nav-item.active { color: var(--text-primary); }

        /* Active indicator dot under icon */
        .nav-item .nav-dot {
            position: absolute;
            bottom: 3px;
            left: 50%;
            transform: translateX(-50%) scale(0);
            width: 4px;
            height: 4px;
            border-radius: 50%;
            background: var(--primary);
            transition: transform 0.2s cubic-bezier(0.34,1.56,0.64,1);
        }
        .nav-item.active .nav-dot { transform: translateX(-50%) scale(1); }

        /* Filled vs outline icon swap */
        .nav-item .nav-icon-filled { display: none; }
        .nav-item .nav-icon-outline { display: block; }
        .nav-item.active .nav-icon-filled { display: block; }
        .nav-item.active .nav-icon-outline { display: none; }

        /* FAB compose button — centered pill item */
        .nav-fab {
            width: 44px;
            height: 44px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 9999px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 4px 16px rgba(var(--primary-rgb),0.45);
            transition: transform 0.2s, box-shadow 0.2s;
            flex-shrink: 0;
        }
        .nav-fab:active { transform: scale(0.88); box-shadow: 0 2px 8px rgba(var(--primary-rgb),0.35); }

        /* Profile avatar ring */
        .nav-avatar-ring {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            border: 2px solid transparent;
            overflow: hidden;
            transition: border-color 0.2s;
        }
        .nav-item.active .nav-avatar-ring { border-color: var(--primary); }
        .nav-avatar-ring img { width: 100%; height: 100%; object-fit: cover; display: block; }

        /* Notification badge — dot style */
        .nav-badge {
            position: absolute;
            top: 7px;
            right: calc(50% - 16px);
            width: 8px; height: 8px;
            border-radius: 50%;
            background: var(--like);
            border: 2px solid var(--surface);
            display: none;
            animation: badgePop 0.3s ease-out;
        }
        .nav-badge.show { display: block; }

        .toast {
            position: fixed; bottom: 100px; left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--text-primary); color: var(--surface);
            padding: 12px 24px; border-radius: 9999px;
            font-weight: 500; opacity: 0; transition: all 0.3s; z-index: 9999; pointer-events: none;
        }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

        @media (min-width: 1024px) { .bottom-nav { display: none; } body { padding-bottom: 0; } }
    </style>
</head>
<body>

<div class="app-container">

    <header class="header">
        <div class="search-bar-row">
            <button class="back-btn" onclick="history.back()">
                <i data-feather="arrow-left" style="width:20px;height:20px;"></i>
            </button>
            <div class="search-input-wrap">
                <i data-feather="search" style="width:18px;height:18px;"></i>
                <input
                    type="text" id="search-input"
                    placeholder="Search Vynix"
                    autocomplete="off" autocorrect="off" spellcheck="false"
                    oninput="onSearchInput()" onkeydown="onSearchKeydown(event)"
                >
                <button class="clear-btn" id="clear-btn" onclick="clearSearch()">
                    <i data-feather="x" style="width:11px;height:11px;"></i>
                </button>
            </div>
        </div>

        <div class="filter-tabs" id="filter-tabs" style="display:none; margin: 10px -16px -12px; padding: 0 16px;">
            <button class="filter-tab active" data-tab="all" onclick="switchTab('all')">All</button>
            <button class="filter-tab" data-tab="people" onclick="switchTab('people')">People</button>
            <button class="filter-tab" data-tab="posts" onclick="switchTab('posts')">Posts</button>
            <button class="filter-tab" data-tab="tags" onclick="switchTab('tags')">Tags</button>
        </div>
    </header>

    <main id="main-content">
        <div id="default-view">
            <div class="section" id="recent-section" style="display:none;">
                <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">
                    <span class="section-title" style="margin-bottom:0;">Recent</span>
                    <button onclick="clearAllRecent()" style="background:none;border:none;color:var(--primary);font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;">Clear all</button>
                </div>
                <div id="recent-list"></div>
            </div>

            <div class="section">
                <div class="section-title">Trending</div>
                <div class="trending-chips" id="trending-chips"></div>
            </div>

            <div id="trending-posts-section">
                <div style="padding:0 16px 8px;">
                    <span class="section-title">Hot right now</span>
                </div>
                <div id="trending-posts-list"></div>
            </div>

            <div class="section" style="padding-bottom:0;">
                <div class="section-title">Who to follow</div>
            </div>
            <div id="suggested-people-list"></div>
        </div>

        <div id="results-view" style="display:none;">
            <div id="spinner" class="spinner" style="display:none;"></div>
            <div id="results-list"></div>
            <div id="no-results" class="empty-state" style="display:none;">
                <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
                <h3>No results found</h3>
                <p>Try a different search term</p>
            </div>
        </div>
    </main>
</div>

<nav class="bottom-nav" id="bottom-nav">
    <button class="nav-item" onclick="window.location.href='index.html'">
        <svg class="nav-icon-filled" width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
        <svg class="nav-icon-outline" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12L12 3l9 9"/><path d="M5 10v10a1 1 0 0 0 1 1h4v-5h4v5h4a1 1 0 0 0 1-1V10"/></svg>
        <span class="nav-dot"></span>
    </button>

    <button class="nav-item active" onclick="window.scrollTo({top:0,behavior:'smooth'})">
        <svg class="nav-icon-filled" width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
        <svg class="nav-icon-outline" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <span class="nav-dot"></span>
    </button>

    <button class="nav-fab" onclick="window.location.href='index.html'" aria-label="Create post">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    </button>

    <button class="nav-item" onclick="window.location.href='notifications.html'" style="position:relative;">
        <svg class="nav-icon-filled" width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.9 2 2 2zm6-6v-5c0-3.07-1.64-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.63 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z"/></svg>
        <svg class="nav-icon-outline" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
        <span class="nav-badge" id="badge-notifications"></span>
        <span class="nav-dot"></span>
    </button>

    <button class="nav-item" onclick="window.location.href='profile.html'">
        <div class="nav-avatar-ring">
            <img src="" id="nav-profile-avatar" alt="Profile">
        </div>
        <span class="nav-dot"></span>
    </button>
</nav>

<div class="toast" id="toast"></div>

<script type="module">
    import { initializeApp }      from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getDatabase, ref, get, set, update, remove, onValue, push, serverTimestamp }
        from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const VERIFIED_SVG = `<svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor" style="color:#1D9BF0;"><path d="M22.25 12c0-1.43-.88-2.67-2.19-3.34.46-1.39.2-2.9-.81-3.91s-2.52-1.27-3.91-.81c-.66-1.31-1.91-2.19-3.34-2.19s-2.67.88-3.33 2.19c-1.4-.46-2.91-.2-3.92.81s-1.26 2.52-.8 3.91c-1.31.67-2.2 1.91-2.2 3.34s.89 2.67 2.2 3.34c-.46 1.39-.21 2.9.8 3.91s2.52 1.26 3.91.81c.67 1.31 1.91 2.19 3.34 2.19s2.68-.88 3.34-2.19c1.39.45 2.9.2 3.91-.81s1.27-2.52.81-3.91c1.31-.67 2.19-1.91 2.19-3.34zm-11.71 4.2L6.8 12.22l1.41-1.41 2.83 2.83 5.66-5.66 1.41 1.41-7.07 7.22z"/></svg>`;

    const firebaseConfig = {
        apiKey: "AIzaSyBOyZ3As4GTuNvjemvPF_SpsC6m6vqtNhc",
        authDomain: "fire-b-a8878.firebaseapp.com",
        databaseURL: "https://fire-b-a8878.firebaseio.com",
        projectId: "fire-b-a8878",
        storageBucket: "fire-b-a8878.appspot.com",
        messagingSenderId: "658673187627",
        appId: "1:658673187627:web:6e4c29af661785f0afa36e"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db   = getDatabase(app);

    // ── Apply saved theme immediately (no flash) ──
    document.documentElement.setAttribute('data-theme', localStorage.getItem('vynix_theme') || 'light');

    let currentUser = null;
    let currentUserData = null;
    let allUsers = [];
    let allPosts = [];
    let followingMap = {};
    let searchDebounce = null;
    let activeTab = 'all';
    let recentSearches = JSON.parse(localStorage.getItem('vynix_recent') || '[]');

    // ── Bootstrap ──
    onAuthStateChanged(auth, async user => {
        if (!user) { window.location.href = 'signup.html'; return; }
        currentUser = user;
        await loadCurrentUser();
        await loadAllData();
        renderDefaultView();
        setupUnreadListeners();
        feather.replace();
    });

    async function loadCurrentUser() {
        const snap = await get(ref(db, `users/${currentUser.uid}`));
        currentUserData = snap.val() || { uid: currentUser.uid, photoURL: '', username: '' };
        
        // Update nav avatar
        const navAvatar = document.getElementById('nav-profile-avatar');
        if (navAvatar) {
            navAvatar.src = currentUserData.photoURL || avatarUrl(currentUserData);
        }
    }

    // ── Original Firebase nodes preserved exactly ──
    async function loadAllData() {
        const [usersSnap, postsSnap, followSnap] = await Promise.all([
            get(ref(db, 'users')),
            get(ref(db, 'posts')),
            get(ref(db, `following/${currentUser.uid}`))
        ]);

        allUsers = [];
        if (usersSnap.exists()) {
            usersSnap.forEach(child => {
                if (child.key !== currentUser.uid) {
                    allUsers.push({ uid: child.key, ...child.val() });
                }
            });
        }

        allPosts = [];
        if (postsSnap.exists()) {
            postsSnap.forEach(child => { allPosts.push({ id: child.key, ...child.val() }); });
            allPosts.sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0));
        }

        followingMap = {};
        if (followSnap.exists()) {
            followSnap.forEach(child => { followingMap[child.key] = true; });
        }
    }

    // ── Default view ──
    function renderDefaultView() {
        renderRecentSearches();
        renderTrendingChips();
        renderTrendingPosts();
        renderSuggestedPeople();
    }

    function renderRecentSearches() {
        const section = document.getElementById('recent-section');
        const list = document.getElementById('recent-list');
        if (recentSearches.length === 0) { section.style.display = 'none'; return; }
        section.style.display = 'block';
        list.innerHTML = recentSearches.slice(0, 8).map(q => `
            <div class="recent-item" onclick="applyRecent('${escHtml(q)}')">
                <div class="recent-icon"><i data-feather="clock" style="width:16px;height:16px;"></i></div>
                <span class="recent-text">${escHtml(q)}</span>
                <button class="recent-remove" onclick="removeRecent(event,'${escHtml(q)}')">
                    <i data-feather="x" style="width:14px;height:14px;"></i>
                </button>
            </div>
        `).join('');
        feather.replace();
    }

    function renderTrendingChips() {
        const tagCount = {};
        allPosts.forEach(p => {
            const matches = (p.text || '').match(/#([a-zA-Z0-9_]+)/g) || [];
            matches.forEach(t => { tagCount[t] = (tagCount[t] || 0) + 1; });
        });
        const sorted = Object.entries(tagCount).sort((a,b) => b[1]-a[1]).slice(0, 12);
        const defaults = ['#trending','#viral','#fyp','#vynix','#explore','#new','#hot','#today'];
        while (sorted.length < 6) {
            const d = defaults[sorted.length % defaults.length];
            if (!tagCount[d]) sorted.push([d, Math.floor(Math.random()*500+50)]);
        }
        document.getElementById('trending-chips').innerHTML = sorted.slice(0,10).map(([tag]) => `
            <div class="trend-chip" onclick="searchTag('${escHtml(tag)}')">
                <span class="chip-hash">#</span>${escHtml(tag.slice(1))}
            </div>
        `).join('');
    }

    function renderTrendingPosts() {
        const container = document.getElementById('trending-posts-list');
        const top = [...allPosts]
            .sort((a, b) => Object.keys(b.likes || {}).length - Object.keys(a.likes || {}).length)
            .slice(0, 5);
        if (top.length === 0) { container.innerHTML = ''; return; }
        Promise.all(top.map(async (post, idx) => {
            const userSnap = await get(ref(db, `users/${post.uid}`));
            const user = userSnap.val() || {};
            const likeCount = Object.keys(post.likes || {}).length;
            const commentCount = Object.keys(post.comments || {}).length;
            const snippet = (post.text || '').slice(0, 80) + ((post.text || '').length > 80 ? '…' : '');
            return `
                <div class="trending-post" onclick="goToPost('${post.id}')">
                    <div class="trending-rank">${idx + 1}</div>
                    <div class="trending-meta">
                        <div class="trending-tag">${escHtml(snippet || '(media post)')}</div>
                        <div class="trending-count">${likeCount} likes · ${commentCount} comments · @${escHtml(user.username || 'user')}</div>
                    </div>
                    ${post.mediaUrl && post.mediaType !== 'video' ? `<img class="trending-thumb" src="${post.mediaUrl}" loading="lazy">` : ''}
                </div>
            `;
        })).then(htmls => { container.innerHTML = htmls.join(''); });
    }

    function renderSuggestedPeople() {
        const container = document.getElementById('suggested-people-list');
        const suggested = allUsers.filter(u => !followingMap[u.uid]).slice(0, 5);
        container.innerHTML = suggested.map((u, i) => userCardHtml(u, i * 50)).join('');
        feather.replace();
    }

    // ── Search ──
    window.onSearchInput = () => {
        const q = document.getElementById('search-input').value.trim();
        document.getElementById('clear-btn').classList.toggle('show', q.length > 0);
        if (q.length === 0) { showDefaultView(); return; }
        showResultsView();
        clearTimeout(searchDebounce);
        searchDebounce = setTimeout(() => runSearch(q), 300);
    };

    window.onSearchKeydown = (e) => {
        if (e.key === 'Enter') {
            const q = document.getElementById('search-input').value.trim();
            if (q) { saveRecent(q); runSearch(q); }
        }
    };

    async function runSearch(q) {
        document.getElementById('spinner').style.display = 'block';
        document.getElementById('results-list').innerHTML = '';
        document.getElementById('no-results').style.display = 'none';
        document.getElementById('filter-tabs').style.display = 'flex';

        const ql = q.toLowerCase();

        const userResults = allUsers.filter(u =>
            u.username?.toLowerCase().includes(ql) ||
            u.displayName?.toLowerCase().includes(ql) ||
            u.bio?.toLowerCase().includes(ql)
        );

        const postResults = allPosts.filter(p => (p.text || '').toLowerCase().includes(ql)).slice(0, 30);

        const postsWithUsers = await Promise.all(postResults.slice(0, 20).map(async post => {
            const snap = await get(ref(db, `users/${post.uid}`));
            return { ...post, user: snap.val() || {} };
        }));

        document.getElementById('spinner').style.display = 'none';
        renderResults(userResults, postsWithUsers, q);
    }

    function renderResults(users, posts, q) {
        const list = document.getElementById('results-list');
        list.innerHTML = '';
        const showPeople = activeTab === 'all' || activeTab === 'people';
        const showPosts  = activeTab === 'all' || activeTab === 'posts';
        const showTags   = activeTab === 'all' || activeTab === 'tags';
        let hasContent = false;

        if (showTags && q.startsWith('#')) {
            const tagPosts = posts.filter(p => (p.text || '').toLowerCase().includes(q.toLowerCase()));
            if (tagPosts.length > 0) {
                hasContent = true;
                list.insertAdjacentHTML('beforeend', `<div class="section"><div class="section-title">Posts with ${escHtml(q)}</div></div>`);
                tagPosts.forEach((p, i) => list.insertAdjacentHTML('beforeend', postResultHtml(p, q, i * 40)));
            }
        }

        if (showPeople && users.length > 0) {
            hasContent = true;
            list.insertAdjacentHTML('beforeend', `<div class="section"><div class="section-title">People</div></div>`);
            users.forEach((u, i) => list.insertAdjacentHTML('beforeend', userCardHtml(u, i * 40)));
        }

        if (showPosts && posts.length > 0) {
            hasContent = true;
            list.insertAdjacentHTML('beforeend', `<div class="section"><div class="section-title">Posts</div></div>`);
            posts.forEach((p, i) => list.insertAdjacentHTML('beforeend', postResultHtml(p, q, i * 40)));
        }

        if (!hasContent) document.getElementById('no-results').style.display = 'block';
        feather.replace();
    }

    // ── Tab switching ──
    window.switchTab = (tab) => {
        activeTab = tab;
        document.querySelectorAll('.filter-tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
        const q = document.getElementById('search-input').value.trim();
        if (q) runSearch(q);
    };

    // ── HTML builders ──
    function userCardHtml(u, delay = 0) {
        const isFollowing = followingMap[u.uid];
        return `
            <div class="user-card" style="animation-delay:${delay}ms" onclick="goToProfile('${u.uid}')">
                <img class="user-avatar" src="${u.photoURL || avatarUrl(u)}" loading="lazy">
                <div class="user-info">
                    <div class="user-name-row">
                        <span class="user-name">${escHtml(u.displayName || u.username || 'User')}</span>
                        ${u.verified ? `<span class="verified-badge">${VERIFIED_SVG}</span>` : ''}
                    </div>
                    <div class="user-handle">@${escHtml(u.username || '')}</div>
                    ${u.bio ? `<div class="user-bio">${escHtml(u.bio)}</div>` : ''}
                </div>
                <button class="follow-btn ${isFollowing ? 'following' : ''}" onclick="toggleFollow(event, '${u.uid}')">
                    ${isFollowing ? 'Following' : 'Follow'}
                </button>
            </div>
        `;
    }

    function postResultHtml(post, q, delay = 0) {
        const user = post.user || {};
        const likeCount = Object.keys(post.likes || {}).length;
        const commentCount = Object.keys(post.comments || {}).length;
        const highlightedText = highlightQuery(escHtml(post.text || ''), q);
        return `
            <div class="post-result" style="animation-delay:${delay}ms" onclick="goToPost('${post.id}')">
                <div class="post-result-header">
                    <img class="post-result-avatar" src="${user.photoURL || avatarUrl(user)}" loading="lazy">
                    <div class="post-result-meta">
                        <div class="post-result-name">
                            ${escHtml(user.displayName || 'User')}
                            ${user.verified ? `<span class="verified-badge">${VERIFIED_SVG}</span>` : ''}
                        </div>
                        <div class="post-result-handle">@${escHtml(user.username || 'user')} · ${formatTime(post.timestamp)}</div>
                    </div>
                </div>
                ${post.text ? `<div class="post-result-text">${highlightedText}</div>` : ''}
                ${post.mediaUrl && post.mediaType !== 'video' ? `<div class="post-result-media"><img src="${post.mediaUrl}" loading="lazy"></div>` : ''}
                <div class="post-result-stats">
                    <span class="post-stat"><i data-feather="heart" style="width:13px;height:13px;"></i> ${likeCount}</span>
                    <span class="post-stat"><i data-feather="message-circle" style="width:13px;height:13px;"></i> ${commentCount}</span>
                </div>
            </div>
        `;
    }

    function highlightQuery(escapedHtml, q) {
        if (!q || q.startsWith('#')) return escapedHtml;
        const escaped = escHtml(q);
        return escapedHtml.replace(
            new RegExp(`(${escaped.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi'),
            '<span class="highlight">$1</span>'
        );
    }

    // ── Follow / Unfollow (original nodes) ──
    window.toggleFollow = async (e, uid) => {
        e.stopPropagation();
        const btn = e.currentTarget;
        if (followingMap[uid]) {
            // Unfollow — same nodes as profile.html
            await remove(ref(db, `following/${currentUser.uid}/${uid}`));
            await remove(ref(db, `followers/${uid}/${currentUser.uid}`));
            delete followingMap[uid];
            btn.textContent = 'Follow'; btn.classList.remove('following');
            showToast('Unfollowed');
        } else {
            // Follow — same nodes as profile.html
            await set(ref(db, `following/${currentUser.uid}/${uid}`), true);
            await set(ref(db, `followers/${uid}/${currentUser.uid}`), true);
            // Write follow notification
            const notifRef = push(ref(db, `notifications/${uid}`));
            await set(notifRef, {
                type: 'follow',
                actorId: currentUser.uid,
                actorName: currentUserData.displayName || currentUserData.username || 'Someone',
                actorPhoto: currentUserData.photoURL || '',
                timestamp: serverTimestamp(),
                read: false
            });
            followingMap[uid] = true;
            btn.textContent = 'Following'; btn.classList.add('following');
            showToast('Following!');
            if (navigator.vibrate) navigator.vibrate(40);
        }
    };

    // ── Recent searches ──
    function saveRecent(q) {
        recentSearches = [q, ...recentSearches.filter(r => r !== q)].slice(0, 10);
        localStorage.setItem('vynix_recent', JSON.stringify(recentSearches));
    }
    window.applyRecent = (q) => {
        document.getElementById('search-input').value = q;
        document.getElementById('clear-btn').classList.add('show');
        showResultsView(); runSearch(q);
    };
    window.removeRecent = (e, q) => {
        e.stopPropagation();
        recentSearches = recentSearches.filter(r => r !== q);
        localStorage.setItem('vynix_recent', JSON.stringify(recentSearches));
        renderRecentSearches();
    };
    window.clearAllRecent = () => {
        recentSearches = [];
        localStorage.setItem('vynix_recent', JSON.stringify(recentSearches));
        renderRecentSearches();
    };
    window.searchTag = (tag) => {
        document.getElementById('search-input').value = tag;
        document.getElementById('clear-btn').classList.add('show');
        saveRecent(tag); showResultsView(); runSearch(tag);
    };

    // ── Views ──
    function showDefaultView() {
        document.getElementById('default-view').style.display = 'block';
        document.getElementById('results-view').style.display = 'none';
        document.getElementById('filter-tabs').style.display = 'none';
        document.getElementById('clear-btn').classList.remove('show');
    }
    function showResultsView() {
        document.getElementById('default-view').style.display = 'none';
        document.getElementById('results-view').style.display = 'block';
    }
    window.clearSearch = () => {
        document.getElementById('search-input').value = '';
        showDefaultView();
        document.getElementById('search-input').focus();
    };

    // ── Navigation ──
    window.goToProfile = (uid) => { window.location.href = `profile.html?id=${uid}`; };
    window.goToPost    = (postId) => { window.location.href = `index.html#post-${postId}`; };

    // ── Real-time unread badge listeners ──
    function setupUnreadListeners() {
        onValue(ref(db, `notifications/${currentUser.uid}`), snap => {
            let c = 0;
            if (snap.exists()) snap.forEach(ch => { if (!ch.val().read) c++; });
            updateBadge('badge-notifications', c);
        });
    }

    function updateBadge(id, count) {
        const b = document.getElementById(id);
        if (!b) return;
        if (count > 0) { b.textContent = count > 99 ? '99+' : count; b.classList.add('show'); }
        else b.classList.remove('show');
    }

    // ── Utilities ──
    function escHtml(str) { const d = document.createElement('div'); d.textContent = str || ''; return d.innerHTML; }
    function avatarUrl(u) { return `https://ui-avatars.com/api/?name=${encodeURIComponent(u.username || u.displayName || 'U')}&background=random`; }
    function formatTime(ts) {
        if (!ts) return '';
        const s = Math.floor((Date.now() - ts) / 1000);
        if (s < 60) return 'now'; if (s < 3600) return Math.floor(s / 60) + 'm';
        if (s < 86400) return Math.floor(s / 3600) + 'h'; return Math.floor(s / 86400) + 'd';
    }
    window.showToast = (msg) => {
        const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 2500);
    };

    feather.replace();
</script>

</body>
</html>
