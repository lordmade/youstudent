<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Vynix · Search</title>
    <script src="https://unpkg.com/feather-icons"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366F1;
            --primary-dark: #4F46E5;
            --background: #F8FAFC;
            --surface: #FFFFFF;
            --border: #E2E8F0;
            --text-primary: #0F172A;
            --text-secondary: #64748B;
            --text-muted: #94A3B8;
            --like: #F43F5E;
            --verified: #1D9BF0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--background);
            color: var(--text-primary);
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
            padding-bottom: calc(90px + env(safe-area-inset-bottom));
            min-height: 100vh;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        @keyframes shimmer {
            0%   { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .shimmer {
            background: linear-gradient(90deg, #f0f0f0 25%, #e8e8e8 50%, #f0f0f0 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: 6px;
        }

        /* ── App container ── */
        .app-container {
            max-width: 100%;
            margin: 0 auto;
        }
        @media (min-width: 1024px) {
            .app-container { max-width: 600px; border-left: 1px solid var(--border); border-right: 1px solid var(--border); }
        }

        /* ── Header / Search bar ── */
        .header {
            position: sticky;
            top: 0;
            z-index: 50;
            background: rgba(255,255,255,0.97);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            padding: 12px 16px;
        }

        .search-bar-row {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .back-btn {
            background: none;
            border: none;
            color: var(--text-primary);
            cursor: pointer;
            padding: 6px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: background 0.15s;
        }
        .back-btn:hover { background: var(--background); }

        .search-input-wrap {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 10px;
            background: var(--background);
            border: 1.5px solid var(--border);
            border-radius: 9999px;
            padding: 10px 16px;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .search-input-wrap:focus-within {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99,102,241,0.12);
        }

        .search-input-wrap i { color: var(--text-muted); flex-shrink: 0; }

        #search-input {
            flex: 1;
            border: none;
            outline: none;
            background: transparent;
            font-size: 16px;
            font-family: inherit;
            color: var(--text-primary);
        }
        #search-input::placeholder { color: var(--text-muted); }

        .clear-btn {
            background: var(--text-muted);
            border: none;
            color: white;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            display: none;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            flex-shrink: 0;
            transition: background 0.15s;
        }
        .clear-btn.show { display: flex; }
        .clear-btn:hover { background: var(--text-secondary); }

        /* ── Filter tabs ── */
        .filter-tabs {
            display: flex;
            gap: 0;
            border-bottom: 1px solid var(--border);
            background: var(--surface);
        }

        .filter-tab {
            flex: 1;
            padding: 12px 8px;
            text-align: center;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-secondary);
            background: none;
            border: none;
            cursor: pointer;
            position: relative;
            transition: color 0.2s;
            font-family: inherit;
        }

        .filter-tab::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 20%;
            right: 20%;
            height: 3px;
            border-radius: 3px 3px 0 0;
            background: var(--primary);
            transform: scaleX(0);
            transition: transform 0.2s;
        }

        .filter-tab.active {
            color: var(--primary);
        }
        .filter-tab.active::after { transform: scaleX(1); }

        /* ── Sections ── */
        .section { padding: 16px 16px 8px; }
        .section-title {
            font-size: 13px;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.06em;
            margin-bottom: 12px;
        }

        /* ── Trending chips ── */
        .trending-chips {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 4px;
        }
        .trend-chip {
            background: var(--background);
            border: 1px solid var(--border);
            border-radius: 9999px;
            padding: 6px 14px;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }
        .trend-chip:hover {
            border-color: var(--primary);
            color: var(--primary);
            background: rgba(99,102,241,0.06);
        }
        .trend-chip .chip-hash { color: var(--primary); }

        /* ── Trending posts ── */
        .trending-post {
            display: flex;
            gap: 12px;
            padding: 12px 16px;
            border-bottom: 1px solid var(--border);
            background: var(--surface);
            cursor: pointer;
            transition: background 0.15s;
            animation: fadeIn 0.3s ease-out;
        }
        .trending-post:hover { background: var(--background); }

        .trending-rank {
            font-size: 20px;
            font-weight: 800;
            color: var(--border);
            width: 28px;
            flex-shrink: 0;
            line-height: 1;
            padding-top: 2px;
        }

        .trending-meta { flex: 1; min-width: 0; }
        .trending-tag {
            font-size: 15px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 2px;
        }
        .trending-count {
            font-size: 13px;
            color: var(--text-muted);
        }
        .trending-thumb {
            width: 56px;
            height: 56px;
            border-radius: 12px;
            object-fit: cover;
            flex-shrink: 0;
        }

        /* ── User cards ── */
        .user-card {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            border-bottom: 1px solid var(--border);
            background: var(--surface);
            cursor: pointer;
            transition: background 0.15s;
            animation: fadeIn 0.3s ease-out both;
        }
        .user-card:hover { background: var(--background); }

        .user-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            object-fit: cover;
            flex-shrink: 0;
        }

        .user-info { flex: 1; min-width: 0; }
        .user-name-row {
            display: flex;
            align-items: center;
            gap: 4px;
            font-weight: 700;
            font-size: 15px;
            margin-bottom: 2px;
        }
        .user-name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .user-handle { font-size: 13px; color: var(--text-secondary); font-weight: 400; }
        .user-bio {
            font-size: 13px;
            color: var(--text-secondary);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            margin-top: 2px;
        }

        .follow-btn {
            background: var(--text-primary);
            color: white;
            border: none;
            padding: 7px 18px;
            border-radius: 9999px;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            flex-shrink: 0;
            transition: all 0.2s;
            font-family: inherit;
        }
        .follow-btn:hover { opacity: 0.85; }
        .follow-btn.following {
            background: var(--surface);
            color: var(--text-primary);
            border: 1.5px solid var(--border);
        }

        /* ── Post result cards ── */
        .post-result {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 14px 16px;
            cursor: pointer;
            transition: background 0.15s;
            animation: fadeIn 0.3s ease-out both;
        }
        .post-result:hover { background: var(--background); }

        .post-result-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
        }

        .post-result-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            object-fit: cover;
            flex-shrink: 0;
        }

        .post-result-meta { flex: 1; min-width: 0; }
        .post-result-name {
            font-weight: 700;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .post-result-handle { font-size: 12px; color: var(--text-muted); }

        .post-result-text {
            font-size: 15px;
            line-height: 1.5;
            color: var(--text-primary);
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
            word-wrap: break-word;
        }
        .post-result-text .highlight {
            background: rgba(99,102,241,0.15);
            color: var(--primary);
            font-weight: 600;
            border-radius: 3px;
            padding: 0 2px;
        }

        .post-result-media {
            margin-top: 10px;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--border);
        }
        .post-result-media img {
            width: 100%;
            max-height: 200px;
            object-fit: cover;
            display: block;
        }

        .post-result-stats {
            display: flex;
            gap: 16px;
            margin-top: 8px;
            color: var(--text-muted);
            font-size: 13px;
        }
        .post-stat { display: flex; align-items: center; gap: 4px; }

        /* ── Verified badge ── */
        .verified-badge { color: var(--verified); display: inline-flex; align-items: center; flex-shrink: 0; }

        /* ── Empty / loading states ── */
        .empty-state {
            padding: 64px 24px;
            text-align: center;
            color: var(--text-muted);
        }
        .empty-state svg { margin: 0 auto 16px; opacity: 0.3; display: block; }
        .empty-state h3 { font-size: 18px; font-weight: 700; color: var(--text-secondary); margin-bottom: 6px; }
        .empty-state p { font-size: 14px; }

        .spinner {
            width: 36px; height: 36px;
            border: 3px solid var(--border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 32px auto;
        }

        /* ── Recent searches ── */
        .recent-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 16px;
            cursor: pointer;
            transition: background 0.15s;
            border-radius: 12px;
        }
        .recent-item:hover { background: var(--background); }
        .recent-icon {
            width: 36px; height: 36px;
            border-radius: 50%;
            background: var(--background);
            display: flex; align-items: center; justify-content: center;
            color: var(--text-secondary);
            flex-shrink: 0;
        }
        .recent-text { flex: 1; font-size: 15px; color: var(--text-primary); font-weight: 500; }
        .recent-remove {
            background: none; border: none;
            color: var(--text-muted);
            cursor: pointer; padding: 4px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            transition: color 0.15s;
        }
        .recent-remove:hover { color: var(--like); }

        /* ── Bottom Nav ── */
        .bottom-nav {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(20px);
            border-top: 1px solid var(--border);
            padding: 8px 0 calc(8px + env(safe-area-inset-bottom));
            display: flex;
            justify-content: space-around;
            z-index: 100;
        }

        .nav-item {
            flex: 1;
            display: flex; flex-direction: column; align-items: center; gap: 4px;
            padding: 8px;
            color: var(--text-secondary);
            background: none; border: none;
            font-family: inherit; cursor: pointer;
            transition: color 0.2s;
            position: relative;
        }
        .nav-item.active { color: var(--primary); }
        .nav-item span { font-size: 11px; font-weight: 600; }

        .nav-badge {
            position: absolute;
            top: 4px; right: calc(50% - 16px);
            background: var(--like); color: white;
            font-size: 10px; font-weight: 700;
            min-width: 18px; height: 18px;
            border-radius: 9px;
            display: none; align-items: center; justify-content: center;
            padding: 0 5px;
            border: 2px solid var(--surface);
        }
        .nav-badge.show { display: flex; }

        .fab {
            width: 56px; height: 56px;
            background: var(--primary); color: white;
            border: none; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 4px 20px rgba(99,102,241,0.4);
            transform: translateY(-20px);
            cursor: pointer; transition: transform 0.2s;
        }
        .fab:active { transform: translateY(-20px) scale(0.9); }

        /* Toast */
        .toast {
            position: fixed; bottom: 100px; left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #1e293b; color: white;
            padding: 12px 24px; border-radius: 9999px;
            font-weight: 500; opacity: 0;
            transition: all 0.3s; z-index: 9999; pointer-events: none;
        }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

        @media (min-width: 1024px) {
            .bottom-nav { display: none; }
            body { padding-bottom: 0; }
        }
    </style>
</head>
<body>

<div class="app-container">

    <!-- Header -->
    <header class="header">
        <div class="search-bar-row">
            <button class="back-btn" onclick="history.back()">
                <i data-feather="arrow-left" style="width:20px;height:20px;"></i>
            </button>
            <div class="search-input-wrap">
                <i data-feather="search" style="width:18px;height:18px;"></i>
                <input
                    type="text"
                    id="search-input"
                    placeholder="Search Vynix"
                    autocomplete="off"
                    autocorrect="off"
                    spellcheck="false"
                    oninput="onSearchInput()"
                    onkeydown="onSearchKeydown(event)"
                >
                <button class="clear-btn" id="clear-btn" onclick="clearSearch()">
                    <i data-feather="x" style="width:11px;height:11px;"></i>
                </button>
            </div>
        </div>

        <!-- Filter tabs (shown only when results visible) -->
        <div class="filter-tabs" id="filter-tabs" style="display:none; margin: 10px -16px -12px; padding: 0 16px;">
            <button class="filter-tab active" data-tab="all" onclick="switchTab('all')">All</button>
            <button class="filter-tab" data-tab="people" onclick="switchTab('people')">People</button>
            <button class="filter-tab" data-tab="posts" onclick="switchTab('posts')">Posts</button>
            <button class="filter-tab" data-tab="tags" onclick="switchTab('tags')">Tags</button>
        </div>
    </header>

    <!-- Main content -->
    <main id="main-content">
        <!-- Default: trending + recent searches -->
        <div id="default-view">
            <!-- Recent searches -->
            <div class="section" id="recent-section" style="display:none;">
                <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">
                    <span class="section-title" style="margin-bottom:0;">Recent</span>
                    <button onclick="clearAllRecent()" style="background:none;border:none;color:var(--primary);font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;">Clear all</button>
                </div>
                <div id="recent-list"></div>
            </div>

            <!-- Trending tags -->
            <div class="section">
                <div class="section-title">Trending</div>
                <div class="trending-chips" id="trending-chips"></div>
            </div>

            <!-- Trending posts -->
            <div id="trending-posts-section">
                <div style="padding:0 16px 8px;">
                    <span class="section-title">Hot right now</span>
                </div>
                <div id="trending-posts-list"></div>
            </div>

            <!-- Suggested people -->
            <div class="section" style="padding-bottom:0;">
                <div class="section-title">Who to follow</div>
            </div>
            <div id="suggested-people-list"></div>
        </div>

        <!-- Search results view -->
        <div id="results-view" style="display:none;">
            <div id="spinner" class="spinner" style="display:none;"></div>
            <div id="results-list"></div>
            <div id="no-results" class="empty-state" style="display:none;">
                <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
                <h3>No results found</h3>
                <p>Try a different search term</p>
            </div>
        </div>
    </main>
</div>

<!-- Bottom Navigation -->
<nav class="bottom-nav">
    <button class="nav-item" onclick="window.location.href='index.html'">
        <i data-feather="home"></i>
        <span>Home</span>
    </button>
    <button class="nav-item active">
        <i data-feather="search"></i>
        <span>Search</span>
    </button>
    <button class="fab" onclick="window.location.href='index.html'">
        <i data-feather="plus" style="width:28px;height:28px;"></i>
    </button>
    <button class="nav-item" onclick="window.location.href='notifications.html'">
        <i data-feather="bell"></i>
        <span>Alerts</span>
        <span class="nav-badge" id="badge-notifications"></span>
    </button>
    <button class="nav-item" onclick="window.location.href='messages.html'">
        <i data-feather="mail"></i>
        <span>Messages</span>
        <span class="nav-badge" id="badge-messages"></span>
    </button>
</nav>

<div class="toast" id="toast"></div>

<script type="module">
    import { initializeApp }      from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getDatabase, ref, get, set, update, remove, onValue, push, serverTimestamp }
        from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const VERIFIED_SVG = `<svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor" style="color:#1D9BF0;"><path d="M22.25 12c0-1.43-.88-2.67-2.19-3.34.46-1.39.2-2.9-.81-3.91s-2.52-1.27-3.91-.81c-.66-1.31-1.91-2.19-3.34-2.19s-2.67.88-3.33 2.19c-1.4-.46-2.91-.2-3.92.81s-1.26 2.52-.8 3.91c-1.31.67-2.2 1.91-2.2 3.34s.89 2.67 2.2 3.34c-.46 1.39-.21 2.9.8 3.91s2.52 1.26 3.91.81c.67 1.31 1.91 2.19 3.34 2.19s2.68-.88 3.34-2.19c1.39.45 2.9.2 3.91-.81s1.27-2.52.81-3.91c1.31-.67 2.19-1.91 2.19-3.34zm-11.71 4.2L6.8 12.22l1.41-1.41 2.83 2.83 5.66-5.66 1.41 1.41-7.07 7.22z"/></svg>`;

    const firebaseConfig = {
        apiKey: "AIzaSyBOyZ3As4GTuNvjemvPF_SpsC6m6vqtNhc",
        authDomain: "fire-b-a8878.firebaseapp.com",
        databaseURL: "https://fire-b-a8878.firebaseio.com",
        projectId: "fire-b-a8878",
        storageBucket: "fire-b-a8878.appspot.com",
        messagingSenderId: "658673187627",
        appId: "1:658673187627:web:6e4c29af661785f0afa36e"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db   = getDatabase(app);

    let currentUser = null;
    let currentUserData = null;
    let allUsers = [];
    let allPosts = [];
    let followingMap = {};   // uid -> true
    let searchDebounce = null;
    let activeTab = 'all';
    let recentSearches = JSON.parse(localStorage.getItem('vynix_recent') || '[]');

    // ── Bootstrap ──
    onAuthStateChanged(auth, async user => {
        if (!user) { window.location.href = 'signup.html'; return; }
        currentUser = user;
        await loadCurrentUser();
        await loadAllData();
        renderDefaultView();
        setupUnreadListeners();
        feather.replace();
    });

    async function loadCurrentUser() {
        const snap = await get(ref(db, `users/${currentUser.uid}`));
        currentUserData = snap.val() || { uid: currentUser.uid, photoURL: '', username: '' };
    }

    async function loadAllData() {
        const [usersSnap, postsSnap, followSnap] = await Promise.all([
            get(ref(db, 'users')),
            get(ref(db, 'posts')),
            get(ref(db, `following/${currentUser.uid}`))
        ]);

        allUsers = [];
        if (usersSnap.exists()) {
            usersSnap.forEach(child => {
                if (child.key !== currentUser.uid) {
                    allUsers.push({ uid: child.key, ...child.val() });
                }
            });
        }

        allPosts = [];
        if (postsSnap.exists()) {
            postsSnap.forEach(child => {
                allPosts.push({ id: child.key, ...child.val() });
            });
            allPosts.sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0));
        }

        followingMap = {};
        if (followSnap.exists()) {
            followSnap.forEach(child => { followingMap[child.key] = true; });
        }
    }

    // ── Default view: trending + suggestions ──
    function renderDefaultView() {
        renderRecentSearches();
        renderTrendingChips();
        renderTrendingPosts();
        renderSuggestedPeople();
    }

    function renderRecentSearches() {
        const section = document.getElementById('recent-section');
        const list = document.getElementById('recent-list');
        if (recentSearches.length === 0) { section.style.display = 'none'; return; }

        section.style.display = 'block';
        list.innerHTML = recentSearches.slice(0, 8).map(q => `
            <div class="recent-item" onclick="applyRecent('${escHtml(q)}')">
                <div class="recent-icon"><i data-feather="clock" style="width:16px;height:16px;"></i></div>
                <span class="recent-text">${escHtml(q)}</span>
                <button class="recent-remove" onclick="removeRecent(event,'${escHtml(q)}')">
                    <i data-feather="x" style="width:14px;height:14px;"></i>
                </button>
            </div>
        `).join('');
        feather.replace();
    }

    function renderTrendingChips() {
        // Build hashtag frequency map from posts
        const tagCount = {};
        allPosts.forEach(p => {
            const matches = (p.text || '').match(/#([a-zA-Z0-9_]+)/g) || [];
            matches.forEach(t => { tagCount[t] = (tagCount[t] || 0) + 1; });
        });

        const sorted = Object.entries(tagCount).sort((a,b) => b[1]-a[1]).slice(0, 12);

        // Pad with placeholder trending tags if not enough
        const defaults = ['#trending','#viral','#fyp','#vynix','#explore','#new','#hot','#today'];
        while (sorted.length < 6) {
            const d = defaults[sorted.length % defaults.length];
            if (!tagCount[d]) sorted.push([d, Math.floor(Math.random()*500+50)]);
        }

        document.getElementById('trending-chips').innerHTML = sorted.slice(0,10).map(([tag]) => `
            <div class="trend-chip" onclick="searchTag('${escHtml(tag)}')">
                <span class="chip-hash">#</span>${escHtml(tag.slice(1))}
            </div>
        `).join('');
    }

    function renderTrendingPosts() {
        const container = document.getElementById('trending-posts-list');
        // Sort by likes count
        const top = [...allPosts]
            .sort((a, b) => Object.keys(b.likes || {}).length - Object.keys(a.likes || {}).length)
            .slice(0, 5);

        if (top.length === 0) { container.innerHTML = ''; return; }

        Promise.all(top.map(async (post, idx) => {
            const userSnap = await get(ref(db, `users/${post.uid}`));
            const user = userSnap.val() || {};
            const likeCount = Object.keys(post.likes || {}).length;
            const commentCount = Object.keys(post.comments || {}).length;
            const snippet = (post.text || '').slice(0, 80) + ((post.text || '').length > 80 ? '…' : '');

            return `
                <div class="trending-post" onclick="goToPost('${post.id}')">
                    <div class="trending-rank">${idx + 1}</div>
                    <div class="trending-meta">
                        <div class="trending-tag">${escHtml(snippet || '(media post)')}</div>
                        <div class="trending-count">${likeCount} likes · ${commentCount} comments · @${escHtml(user.username || 'user')}</div>
                    </div>
                    ${post.mediaUrl && post.mediaType !== 'video' ? `<img class="trending-thumb" src="${post.mediaUrl}" loading="lazy">` : ''}
                </div>
            `;
        })).then(htmls => { container.innerHTML = htmls.join(''); });
    }

    function renderSuggestedPeople() {
        const container = document.getElementById('suggested-people-list');
        const suggested = allUsers
            .filter(u => !followingMap[u.uid])
            .slice(0, 5);

        container.innerHTML = suggested.map((u, i) => userCardHtml(u, i * 50)).join('');
        feather.replace();
    }

    // ── Search logic ──
    window.onSearchInput = () => {
        const q = document.getElementById('search-input').value.trim();
        const clearBtn = document.getElementById('clear-btn');
        clearBtn.classList.toggle('show', q.length > 0);

        if (q.length === 0) {
            showDefaultView();
            return;
        }

        showResultsView();
        clearTimeout(searchDebounce);
        searchDebounce = setTimeout(() => runSearch(q), 300);
    };

    window.onSearchKeydown = (e) => {
        if (e.key === 'Enter') {
            const q = document.getElementById('search-input').value.trim();
            if (q) { saveRecent(q); runSearch(q); }
        }
    };

    async function runSearch(q) {
        document.getElementById('spinner').style.display = 'block';
        document.getElementById('results-list').innerHTML = '';
        document.getElementById('no-results').style.display = 'none';
        document.getElementById('filter-tabs').style.display = 'flex';

        const ql = q.toLowerCase();

        // Filter users
        const userResults = allUsers.filter(u =>
            u.username?.toLowerCase().includes(ql) ||
            u.displayName?.toLowerCase().includes(ql) ||
            u.bio?.toLowerCase().includes(ql)
        );

        // Filter posts
        const postResults = allPosts.filter(p =>
            (p.text || '').toLowerCase().includes(ql)
        ).slice(0, 30);

        // Attach user info to posts
        const postsWithUsers = await Promise.all(postResults.slice(0, 20).map(async post => {
            const snap = await get(ref(db, `users/${post.uid}`));
            return { ...post, user: snap.val() || {} };
        }));

        document.getElementById('spinner').style.display = 'none';
        renderResults(userResults, postsWithUsers, q);
    }

    function renderResults(users, posts, q) {
        const list = document.getElementById('results-list');
        list.innerHTML = '';

        const showPeople = activeTab === 'all' || activeTab === 'people';
        const showPosts  = activeTab === 'all' || activeTab === 'posts';
        const showTags   = activeTab === 'all' || activeTab === 'tags';

        let hasContent = false;

        // Tag results (from posts)
        if (showTags && q.startsWith('#')) {
            const tagPosts = posts.filter(p => (p.text || '').toLowerCase().includes(q.toLowerCase()));
            if (tagPosts.length > 0) {
                hasContent = true;
                const header = document.createElement('div');
                header.className = 'section';
                header.innerHTML = `<div class="section-title">Posts with ${escHtml(q)}</div>`;
                list.appendChild(header);
                tagPosts.forEach((p, i) => {
                    list.insertAdjacentHTML('beforeend', postResultHtml(p, q, i * 40));
                });
            }
        }

        // People
        if (showPeople && users.length > 0) {
            hasContent = true;
            const header = document.createElement('div');
            header.className = 'section';
            header.innerHTML = `<div class="section-title">People</div>`;
            list.appendChild(header);
            users.forEach((u, i) => {
                list.insertAdjacentHTML('beforeend', userCardHtml(u, i * 40));
            });
        }

        // Posts
        if (showPosts && posts.length > 0) {
            hasContent = true;
            const header = document.createElement('div');
            header.className = 'section';
            header.innerHTML = `<div class="section-title">Posts</div>`;
            list.appendChild(header);
            posts.forEach((p, i) => {
                list.insertAdjacentHTML('beforeend', postResultHtml(p, q, i * 40));
            });
        }

        if (!hasContent) {
            document.getElementById('no-results').style.display = 'block';
        }

        feather.replace();
    }

    // ── Tab switching ──
    window.switchTab = (tab) => {
        activeTab = tab;
        document.querySelectorAll('.filter-tab').forEach(t => {
            t.classList.toggle('active', t.dataset.tab === tab);
        });
        const q = document.getElementById('search-input').value.trim();
        if (q) runSearch(q);
    };

    // ── HTML builders ──
    function userCardHtml(u, delay = 0) {
        const isFollowing = followingMap[u.uid];
        return `
            <div class="user-card" style="animation-delay:${delay}ms" onclick="goToProfile('${u.uid}')">
                <img class="user-avatar" src="${u.photoURL || avatarUrl(u)}" loading="lazy">
                <div class="user-info">
                    <div class="user-name-row">
                        <span class="user-name">${escHtml(u.displayName || u.username || 'User')}</span>
                        ${u.verified ? `<span class="verified-badge">${VERIFIED_SVG}</span>` : ''}
                    </div>
                    <div class="user-handle">@${escHtml(u.username || '')}</div>
                    ${u.bio ? `<div class="user-bio">${escHtml(u.bio)}</div>` : ''}
                </div>
                <button class="follow-btn ${isFollowing ? 'following' : ''}"
                    onclick="toggleFollow(event, '${u.uid}')">
                    ${isFollowing ? 'Following' : 'Follow'}
                </button>
            </div>
        `;
    }

    function postResultHtml(post, q, delay = 0) {
        const user = post.user || {};
        const likeCount = Object.keys(post.likes || {}).length;
        const commentCount = Object.keys(post.comments || {}).length;
        const highlightedText = highlightQuery(escHtml(post.text || ''), q);

        return `
            <div class="post-result" style="animation-delay:${delay}ms" onclick="goToPost('${post.id}')">
                <div class="post-result-header">
                    <img class="post-result-avatar" src="${user.photoURL || avatarUrl(user)}" loading="lazy">
                    <div class="post-result-meta">
                        <div class="post-result-name">
                            ${escHtml(user.displayName || 'User')}
                            ${user.verified ? `<span class="verified-badge">${VERIFIED_SVG}</span>` : ''}
                        </div>
                        <div class="post-result-handle">@${escHtml(user.username || 'user')} · ${formatTime(post.timestamp)}</div>
                    </div>
                </div>
                ${post.text ? `<div class="post-result-text">${highlightedText}</div>` : ''}
                ${post.mediaUrl && post.mediaType !== 'video' ? `
                    <div class="post-result-media">
                        <img src="${post.mediaUrl}" loading="lazy">
                    </div>` : ''}
                <div class="post-result-stats">
                    <span class="post-stat">
                        <i data-feather="heart" style="width:13px;height:13px;"></i> ${likeCount}
                    </span>
                    <span class="post-stat">
                        <i data-feather="message-circle" style="width:13px;height:13px;"></i> ${commentCount}
                    </span>
                </div>
            </div>
        `;
    }

    function highlightQuery(escapedHtml, q) {
        if (!q || q.startsWith('#')) return escapedHtml;
        const escaped = escHtml(q);
        return escapedHtml.replace(
            new RegExp(`(${escaped.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi'),
            '<span class="highlight">$1</span>'
        );
    }

    // ── Follow / Unfollow ──
    window.toggleFollow = async (e, uid) => {
        e.stopPropagation();
        const btn = e.currentTarget;

        if (followingMap[uid]) {
            await remove(ref(db, `following/${currentUser.uid}/${uid}`));
            await remove(ref(db, `followers/${uid}/${currentUser.uid}`));
            delete followingMap[uid];
            btn.textContent = 'Follow';
            btn.classList.remove('following');
            showToast('Unfollowed');
        } else {
            await set(ref(db, `following/${currentUser.uid}/${uid}`), true);
            await set(ref(db, `followers/${uid}/${currentUser.uid}`), true);
            followingMap[uid] = true;
            btn.textContent = 'Following';
            btn.classList.add('following');
            showToast('Following!');
        }
    };

    // ── Recent searches ──
    function saveRecent(q) {
        recentSearches = [q, ...recentSearches.filter(r => r !== q)].slice(0, 10);
        localStorage.setItem('vynix_recent', JSON.stringify(recentSearches));
    }

    window.applyRecent = (q) => {
        document.getElementById('search-input').value = q;
        document.getElementById('clear-btn').classList.add('show');
        showResultsView();
        runSearch(q);
    };

    window.removeRecent = (e, q) => {
        e.stopPropagation();
        recentSearches = recentSearches.filter(r => r !== q);
        localStorage.setItem('vynix_recent', JSON.stringify(recentSearches));
        renderRecentSearches();
    };

    window.clearAllRecent = () => {
        recentSearches = [];
        localStorage.setItem('vynix_recent', JSON.stringify(recentSearches));
        renderRecentSearches();
    };

    // ── Tag shortcut ──
    window.searchTag = (tag) => {
        document.getElementById('search-input').value = tag;
        document.getElementById('clear-btn').classList.add('show');
        saveRecent(tag);
        showResultsView();
        runSearch(tag);
    };

    // ── View helpers ──
    function showDefaultView() {
        document.getElementById('default-view').style.display = 'block';
        document.getElementById('results-view').style.display = 'none';
        document.getElementById('filter-tabs').style.display = 'none';
        document.getElementById('clear-btn').classList.remove('show');
    }

    function showResultsView() {
        document.getElementById('default-view').style.display = 'none';
        document.getElementById('results-view').style.display = 'block';
    }

    window.clearSearch = () => {
        document.getElementById('search-input').value = '';
        showDefaultView();
        document.getElementById('search-input').focus();
    };

    // ── Navigation ──
    window.goToProfile = (uid) => {
        window.location.href = `profile.html?id=${uid}`;
    };

    window.goToPost = (postId) => {
        window.location.href = `index.html#post-${postId}`;
    };

    // ── Badges ──
    function setupUnreadListeners() {
        onValue(ref(db, `notifications/${currentUser.uid}`), snap => {
            let c = 0;
            if (snap.exists()) snap.forEach(ch => { if (!ch.val().read) c++; });
            updateBadge('badge-notifications', c);
        });
        onValue(ref(db, `userChats/${currentUser.uid}`), snap => {
            let c = 0;
            if (snap.exists()) snap.forEach(ch => { c += ch.val().unreadCount || 0; });
            updateBadge('badge-messages', c);
        });
    }

    function updateBadge(id, count) {
        const b = document.getElementById(id);
        if (!b) return;
        if (count > 0) { b.textContent = count > 99 ? '99+' : count; b.classList.add('show'); }
        else b.classList.remove('show');
    }

    // ── Utilities ──
    function escHtml(str) {
        const d = document.createElement('div');
        d.textContent = str || '';
        return d.innerHTML;
    }

    function avatarUrl(u) {
        return `https://ui-avatars.com/api/?name=${encodeURIComponent(u.username || u.displayName || 'U')}&background=random`;
    }

    function formatTime(ts) {
        if (!ts) return '';
        const s = Math.floor((Date.now() - ts) / 1000);
        if (s < 60) return 'now';
        if (s < 3600) return Math.floor(s / 60) + 'm';
        if (s < 86400) return Math.floor(s / 3600) + 'h';
        return Math.floor(s / 86400) + 'd';
    }

    window.showToast = (msg) => {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 2500);
    };

    feather.replace();
</script>

</body>
</html>
