<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Vynix</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/feather-icons"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366F1;
            --primary-dark: #4F46E5;
            --background: #F8FAFC;
            --surface: #FFFFFF;
            --border: #E2E8F0;
            --text-primary: #0F172A;
            --text-secondary: #64748B;
            --text-muted: #94A3B8;
            --like: #F43F5E;
            --verified: #1D9BF0;
            --repost: #10B981;
            --story-gradient: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            font-family: 'Inter', sans-serif;
            background: var(--background);
            color: var(--text-primary);
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
            padding-bottom: calc(90px + env(safe-area-inset-bottom));
        }
        
        .shimmer {
            background: linear-gradient(90deg, #f0f0f0 25%, #e8e8e8 50%, #f0f0f0 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }
        
        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* ── NEW POST PILL ALERT ── */
        .new-posts-pill {
            position: fixed;
            top: 120px;
            left: 50%;
            transform: translateX(-50%) translateY(-20px);
            background: var(--primary);
            color: white;
            padding: 10px 20px;
            border-radius: 9999px;
            font-size: 14px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            z-index: 80;
            box-shadow: 0 4px 24px rgba(99,102,241,0.45);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s cubic-bezier(0.34,1.56,0.64,1), transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
            white-space: nowrap;
            user-select: none;
        }

        .new-posts-pill.visible {
            opacity: 1;
            pointer-events: auto;
            transform: translateX(-50%) translateY(0);
        }

        .new-posts-pill svg {
            animation: pillBounce 0.6s ease-out;
        }

        @keyframes pillBounce {
            0%   { transform: translateY(0); }
            40%  { transform: translateY(-4px); }
            70%  { transform: translateY(2px); }
            100% { transform: translateY(0); }
        }

        .pill-count {
            background: rgba(255,255,255,0.25);
            border-radius: 9999px;
            padding: 1px 8px;
            font-size: 12px;
            font-weight: 800;
            min-width: 22px;
            text-align: center;
        }
        
        .stories-wrapper {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 16px 0;
            position: sticky;
            top: 60px;
            z-index: 40;
        }
        
        .stories-container {
            display: flex;
            flex-direction: row;
            flex-wrap: nowrap;
            gap: 20px;
            padding: 0 16px;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
        }
        
        .stories-container::-webkit-scrollbar { display: none; }
        
        .story-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            flex-shrink: 0;
            scroll-snap-align: start;
            position: relative;
        }
        
        .story-ring-group {
            width: 76px;
            height: 76px;
            border-radius: 50%;
            padding: 4px;
            background: var(--story-gradient);
            position: relative;
        }
        
        .story-ring-group.all-seen { background: #E2E8F0; }
        
        .story-img-group {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 3px solid var(--surface);
            object-fit: cover;
        }
        
        .story-count {
            position: absolute;
            bottom: -4px;
            right: -4px;
            background: var(--primary);
            color: white;
            font-size: 11px;
            font-weight: 700;
            padding: 2px 6px;
            border-radius: 10px;
            border: 2px solid var(--surface);
            min-width: 20px;
            text-align: center;
        }
        
        .story-label {
            font-size: 12px;
            font-weight: 500;
            color: var(--text-secondary);
            max-width: 76px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        
        .story-add-btn {
            position: absolute;
            bottom: 0;
            right: 0;
            background: var(--primary);
            color: white;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 3px solid var(--surface);
        }
        
        .app-container { max-width: 100%; margin: 0 auto; }
        @media (min-width: 1024px) { .app-container { max-width: 600px; border-left: 1px solid var(--border); border-right: 1px solid var(--border); } }
        
        .header {
            position: sticky;
            top: 0;
            z-index: 50;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .post-card {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 16px;
            animation: fadeIn 0.3s ease-out;
            position: relative;
        }

        /* Repost banner at top of post card */
        .repost-banner {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            font-weight: 600;
            color: var(--repost);
            margin-bottom: 8px;
            margin-left: 4px;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .actions {
            display: flex;
            justify-content: space-between;
            max-width: 400px;
            margin-top: 12px;
            padding-top: 12px;
        }
        
        .action-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            color: var(--text-secondary);
            font-size: 13px;
            font-weight: 600;
            padding: 8px;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.2s;
            background: none;
            border: none;
            font-family: inherit;
        }
        
        .action-btn:active { transform: scale(0.9); }
        .action-btn.liked { color: var(--like); }
        .action-btn.reposted { color: var(--repost); }

        /* Repost pop animation */
        @keyframes repostPop {
            0%   { transform: scale(1); }
            40%  { transform: scale(1.35) rotate(-8deg); }
            70%  { transform: scale(0.9) rotate(4deg); }
            100% { transform: scale(1) rotate(0deg); }
        }
        .action-btn.repost-animate svg {
            animation: repostPop 0.4s ease-out;
        }
        
        .post-menu {
            position: absolute;
            top: 16px;
            right: 16px;
            opacity: 0;
            transition: opacity 0.2s;
            z-index: 10;
        }
        
        .post-card:hover .post-menu { opacity: 1; }
        
        .post-menu-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            padding: 4px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .post-dropdown {
            position: absolute;
            top: 40px;
            right: 0;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.15);
            display: none;
            min-width: 160px;
            z-index: 20;
            overflow: hidden;
        }
        
        .post-dropdown.active { display: block; }
        
        .dropdown-item {
            padding: 12px 16px;
            font-size: 14px;
            color: var(--text-primary);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            border: none;
            background: none;
            width: 100%;
            text-align: left;
            transition: background 0.2s;
        }
        
        .dropdown-item:hover { background: var(--background); }
        .dropdown-item.delete { color: var(--like); }
        
        .verified-badge {
            color: var(--verified);
            flex-shrink: 0;
            display: inline-flex;
            align-items: center;
        }
        
        .avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            object-fit: cover;
            cursor: pointer;
        }
        
        .post-header { display: flex; gap: 12px; margin-bottom: 12px; padding-right: 40px; }
        .post-meta { flex: 1; min-width: 0; }
        .post-author-row {
            display: flex;
            align-items: center;
            gap: 4px;
            font-weight: 700;
            font-size: 15px;
        }
        
        .post-author {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        
        .post-handle {
            color: var(--text-secondary);
            font-size: 14px;
            font-weight: 400;
        }
        
        .post-text { font-size: 16px; line-height: 1.5; margin: 12px 0; word-wrap: break-word; }
        
        .post-media {
            border-radius: 16px;
            overflow: hidden;
            margin-bottom: 12px;
            border: 1px solid var(--border);
            position: relative;
        }
        
        .post-media img, .post-media video {
            width: 100%;
            max-height: 500px;
            object-fit: cover;
            display: block;
        }
        
        .comments-section {
            border-top: 1px solid var(--border);
            margin-top: 12px;
            padding-top: 12px;
            display: none;
        }
        
        .comments-section.active { display: block; }
        
        .comments-summary {
            color: var(--text-secondary);
            font-size: 14px;
            font-weight: 500;
            padding: 8px 0;
            cursor: pointer;
            margin-bottom: 8px;
        }
        
        .comments-summary:hover { color: var(--primary); }
        
        .comment {
            display: flex;
            gap: 12px;
            margin-bottom: 12px;
            animation: slideIn 0.3s ease-out;
        }
        
        .comment.hidden-comment { display: none; }
        .comment.hidden-comment.show { display: flex; }
        
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-10px); }
            to { opacity: 1; transform: translateX(0); }
        }
        
        .comment-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            object-fit: cover;
            flex-shrink: 0;
        }
        
        .comment-content { flex: 1; min-width: 0; }
        .comment-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 2px;
        }
        .comment-author { font-weight: 600; font-size: 14px; }
        .comment-time { font-size: 12px; color: var(--text-muted); }
        .comment-text { font-size: 14px; color: var(--text-primary); line-height: 1.4; }
        
        .comment-actions {
            display: flex;
            gap: 12px;
            margin-top: 4px;
            font-size: 12px;
            color: var(--text-secondary);
        }
        
        .comment-action {
            cursor: pointer;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 4px;
            transition: color 0.2s;
        }
        
        .comment-action:hover { color: var(--primary); }
        .comment-action.liked { color: var(--like); }
        
        .comment-menu {
            margin-left: auto;
            opacity: 0;
            transition: opacity 0.2s;
        }
        
        .comment:hover .comment-menu { opacity: 1; }
        
        .comment-menu-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            padding: 2px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .comment-menu-btn:hover { color: var(--like); }
        
        .replies-container {
            margin-left: 44px;
            margin-top: 8px;
            padding-left: 12px;
            border-left: 2px solid var(--border);
        }
        
        .reply-input-wrapper {
            display: flex;
            gap: 8px;
            margin-top: 8px;
            align-items: center;
        }
        
        .reply-input {
            flex: 1;
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 6px 12px;
            font-size: 13px;
            outline: none;
            font-family: inherit;
        }
        
        .reply-submit {
            background: var(--primary);
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            opacity: 0.5;
            transition: opacity 0.2s;
        }
        
        .reply-submit.active { opacity: 1; }
        
        .comment-input-wrapper {
            display: flex;
            gap: 12px;
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid var(--border);
        }
        
        .comment-input {
            flex: 1;
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 10px 16px;
            font-size: 14px;
            outline: none;
            font-family: inherit;
            transition: border-color 0.2s;
        }
        
        .comment-input:focus { border-color: var(--primary); }
        
        .comment-submit {
            background: var(--primary);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 20px;
            font-weight: 600;
            cursor: pointer;
            opacity: 0.5;
            transition: opacity 0.2s;
        }
        
        .comment-submit.active { opacity: 1; }
        
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(20px);
            border-top: 1px solid var(--border);
            padding: 8px 0 calc(8px + env(safe-area-inset-bottom));
            display: flex;
            justify-content: space-around;
            z-index: 100;
        }
        
        .nav-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            padding: 8px;
            color: var(--text-secondary);
            background: none;
            border: none;
            font-family: inherit;
            cursor: pointer;
            transition: color 0.2s;
            position: relative;
        }
        
        .nav-item.active { color: var(--primary); }
        .nav-item span { font-size: 11px; font-weight: 600; }
        
        .nav-badge {
            position: absolute;
            top: 4px;
            right: calc(50% - 16px);
            background: var(--like);
            color: white;
            font-size: 10px;
            font-weight: 700;
            min-width: 18px;
            height: 18px;
            border-radius: 9px;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 0 5px;
            border: 2px solid var(--surface);
        }
        
        .nav-badge.show { display: flex; }
        
        .fab {
            width: 56px;
            height: 56px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 20px rgba(99,102,241,0.4);
            transform: translateY(-20px);
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        .fab:active { transform: translateY(-20px) scale(0.9); }
        
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(4px);
            z-index: 200;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }
        
        .modal-overlay.active { opacity: 1; pointer-events: auto; }
        
        .bottom-sheet {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--surface);
            border-radius: 24px 24px 0 0;
            padding: 20px;
            padding-bottom: calc(20px + env(safe-area-inset-bottom));
            transform: translateY(100%);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 201;
            max-height: 90vh;
            overflow-y: auto;
        }
        
        .modal-overlay.active ~ .bottom-sheet { transform: translateY(0); }
        
        .confirm-modal {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.9);
            background: var(--surface);
            border-radius: 20px;
            padding: 24px;
            width: 90%;
            max-width: 320px;
            z-index: 210;
            opacity: 0;
            pointer-events: none;
            transition: all 0.3s;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        .confirm-modal.active {
            opacity: 1;
            pointer-events: auto;
            transform: translate(-50%, -50%) scale(1);
        }
        
        .confirm-title { font-size: 18px; font-weight: 700; margin-bottom: 8px; text-align: center; }
        .confirm-text { font-size: 14px; color: var(--text-secondary); margin-bottom: 20px; text-align: center; }
        .confirm-buttons { display: flex; gap: 12px; }
        .confirm-btn { flex: 1; padding: 12px; border-radius: 12px; border: none; font-weight: 600; cursor: pointer; font-size: 15px; }
        .confirm-btn.cancel { background: var(--background); color: var(--text-primary); }
        .confirm-btn.confirm { background: var(--like); color: white; }
        .confirm-btn.confirm.repost-confirm { background: var(--repost); }
        
        .story-viewer {
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 300;
            display: none;
            flex-direction: column;
        }
        
        .story-viewer.active { display: flex; }
        
        .story-progress-container {
            display: flex;
            gap: 4px;
            padding: 12px;
            padding-top: calc(12px + env(safe-area-inset-top));
        }
        
        .story-progress-bar {
            flex: 1;
            height: 3px;
            background: rgba(255,255,255,0.3);
            border-radius: 3px;
            overflow: hidden;
        }
        
        .story-progress-fill {
            height: 100%;
            background: white;
            width: 0%;
        }
        
        .story-media-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        
        .story-media {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }
        
        .story-video {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        
        .story-controls {
            position: absolute;
            bottom: 40px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            gap: 16px;
            padding: 0 24px;
        }
        
        .story-control-btn {
            background: rgba(255,255,255,0.2);
            color: white;
            border: 1px solid rgba(255,255,255,0.3);
            padding: 12px 24px;
            border-radius: 24px;
            cursor: pointer;
            font-weight: 600;
            backdrop-filter: blur(10px);
            transition: all 0.2s;
        }
        
        .story-control-btn:hover { background: rgba(255,255,255,0.3); }
        
        .story-header {
            position: absolute;
            top: calc(60px + env(safe-area-inset-top));
            left: 16px;
            right: 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            color: white;
            z-index: 10;
        }
        
        .story-header img {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.3);
        }
        
        .story-nav {
            position: absolute;
            top: 0;
            bottom: 0;
            width: 30%;
            z-index: 5;
        }
        
        .story-nav.prev { left: 0; }
        .story-nav.next { right: 0; }
        
        .upload-progress {
            height: 4px;
            background: var(--border);
            border-radius: 2px;
            overflow: hidden;
            margin: 12px 0;
            display: none;
        }
        
        .upload-progress.active { display: block; }
        
        .progress-bar-fill {
            height: 100%;
            background: var(--primary);
            width: 0%;
            transition: width 0.3s;
        }
        
        .loading-more {
            padding: 24px;
            text-align: center;
            color: var(--text-muted);
            display: none;
        }
        
        .loading-more.active { display: block; }
        
        .empty-state {
            padding: 48px 24px;
            text-align: center;
            color: var(--text-muted);
        }
        
        .toast {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #1e293b;
            color: white;
            padding: 12px 24px;
            border-radius: 9999px;
            font-weight: 500;
            opacity: 0;
            transition: all 0.3s;
            z-index: 9999;
            pointer-events: none;
        }
        
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

        /* Rich text highlights in posts */
        .post-text .mention, .post-text .hashtag, .post-text .post-link {
            color: var(--primary);
            font-weight: 500;
            cursor: pointer;
            text-decoration: none;
        }
        .post-text .mention:hover, .post-text .hashtag:hover, .post-text .post-link:hover {
            text-decoration: underline;
        }

        /* See more / less */
        .post-text {
            font-size: 16px;
            line-height: 1.6;
            margin: 12px 0;
            word-wrap: break-word;
            white-space: pre-wrap;
        }
        .post-text.collapsed {
            display: -webkit-box;
            -webkit-line-clamp: 4;
            -webkit-box-orient: vertical;
            overflow: hidden;
            white-space: normal;
        }
        .see-more-btn {
            color: var(--primary);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            background: none;
            border: none;
            padding: 2px 0 8px;
            display: inline-block;
            font-family: inherit;
        }
        .see-more-btn:hover { text-decoration: underline; }

        /* Mention dropdown */
        .mention-dropdown {
            position: absolute;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;

        @media (min-width: 1024px) {
            .bottom-nav { display: none; }
            body { padding-bottom: 0; }
        }
    </style>
</head>
<body>

<!-- New Posts Pill -->
<div class="new-posts-pill" id="new-posts-pill" onclick="showNewPosts()">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="18 15 12 9 6 15"></polyline>
    </svg>
    <span id="new-posts-label">New posts</span>

</div>

<div class="app-container">
    <header class="header">
        <img src="" id="header-avatar" class="avatar" style="width: 32px; height: 32px;" onclick="goToProfile()">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="color: var(--primary);">
            <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
        </svg>

    <div id="feed">

<nav class="bottom-nav">

<!-- Compose Modal -->

            <button onclick="document.getElementById('media-input').click()" style="background: none; border: none; color: var(--primary); cursor: pointer;">

</div>

<div class="toast" id="toast"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getDatabase, ref, onValue, onChildAdded, onChildChanged, onChildRemoved, push, set, get, update, remove, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const CLOUDINARY_CLOUD_NAME = 'dqkujefxj';
    const CLOUDINARY_UPLOAD_PRESET = 'banter_box';
    const MAX_VIDEO_DURATION = 120;
    const VERIFIED_BADGE_SVG = `<svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor" style="color: var(--verified);"><path d="M22.25 12c0-1.43-.88-2.67-2.19-3.34.46-1.39.2-2.9-.81-3.91s-2.52-1.27-3.91-.81c-.66-1.31-1.91-2.19-3.34-2.19s-2.67.88-3.33 2.19c-1.4-.46-2.91-.2-3.92.81s-1.26 2.52-.8 3.91c-1.31.67-2.2 1.91-2.2 3.34s.89 2.67 2.2 3.34c-.46 1.39-.21 2.9.8 3.91s2.52 1.26 3.91.81c.67 1.31 1.91 2.19 3.34 2.19s2.68-.88 3.34-2.19c1.39.45 2.9.2 3.91-.81s1.27-2.52.81-3.91c1.31-.67 2.19-1.91 2.19-3.34zm-11.71 4.2L6.8 12.22l1.41-1.41 2.83 2.83 5.66-5.66 1.41 1.41-7.07 7.22z"/></svg>`;

    // Repost SVG icon (repeat/retweet style)
    const REPOST_SVG = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="17 1 21 5 17 9"></polyline><path d="M3 11V9a4 4 0 0 1 4-4h14"></path><polyline points="7 23 3 19 7 15"></polyline><path d="M21 13v2a4 4 0 0 1-4 4H3"></path></svg>`;
    
    const firebaseConfig = {
        apiKey: "AIzaSyBOyZ3As4GTuNvjemvPF_SpsC6m6vqtNhc",
        authDomain: "fire-b-a8878.firebaseapp.com",
        databaseURL: "https://fire-b-a8878.firebaseio.com",
        projectId: "fire-b-a8878",
        storageBucket: "fire-b-a8878.appspot.com",
        messagingSenderId: "658673187627",
        appId: "1:658673187627:web:6e4c29af661785f0afa36e"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);

    let currentUser = null;
    let currentUserData = null;
    let selectedMedia = null;
    let deleteType = null;
    let deleteData = null;
    let confirmCallback = null;    // generic confirm callback
    let storyGroups = new Map();
    let currentStoryGroupIndex = 0;
    let currentStoryIndex = 0;
    let storyTimeout = null;
    let currentVideoElement = null;
    let loadedPostIds = new Set();
    let postsListenerAttached = false;

    // ── NEW POSTS PILL STATE ──
    let pendingNewPosts = [];       // posts waiting to be shown
    let isUserAtTop = true;         // track if user is near top

    // Track scroll position to decide pill visibility
    window.addEventListener('scroll', () => {
        isUserAtTop = window.scrollY < 200;
        if (isUserAtTop) {
            hidePill();
        }
    }, { passive: true });

    function showPill() {
        const pill = document.getElementById('new-posts-pill');
        const count = pendingNewPosts.length;
        if (count === 0) return;
        document.getElementById('new-posts-count').textContent = count;
        document.getElementById('new-posts-label').textContent = count === 1 ? 'New post' : 'New posts';
        pill.classList.add('visible');
    }

    function hidePill() {
        document.getElementById('new-posts-pill').classList.remove('visible');
    }

    window.showNewPosts = () => {
        // Flush all pending new posts to the top of the feed
        const feed = document.getElementById('feed');
        [...pendingNewPosts].reverse().forEach(post => {
            if (!document.getElementById(`post-${post.id}`)) {
                loadedPostIds.add(post.id);
                renderPost(post, true);
            }
        });
        pendingNewPosts = [];
        hidePill();
        window.scrollTo({ top: 0, behavior: 'smooth' });
    };

    async function uploadToCloudinary(file, folder = 'posts') {
        const formData = new FormData();
        formData.append('file', file);
        formData.append('upload_preset', CLOUDINARY_UPLOAD_PRESET);
        formData.append('folder', folder);
        
        const response = await fetch(`https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD_NAME}/upload`, {
            method: 'POST',
            body: formData
        });
        
        if (!response.ok) throw new Error('Upload failed');
        return await response.json();
    }

    onAuthStateChanged(auth, async (user) => {
        if (!user) {
            window.location.href = 'auth.html';
            return;
        }
        currentUser = user;
        await loadUserData();
        setupStoriesListeners();
        setupUnreadListeners();
        loadPosts();
    });

    async function loadUserData() {
        const userRef = ref(db, `users/${currentUser.uid}`);
        const snapshot = await get(userRef);
        
        if (snapshot.exists()) {
            currentUserData = snapshot.val();
        } else {
            currentUserData = {
                uid: currentUser.uid,
                email: currentUser.email,
                username: currentUser.email.split('@')[0],
                displayName: currentUser.displayName || 'User',
                photoURL: currentUser.photoURL || `https://ui-avatars.com/api/?name=${currentUser.email}&background=6366F1&color=fff`,
                verified: false,
                createdAt: Date.now()
            };
            await set(ref(db, `users/${currentUser.uid}`), currentUserData);
        }
        
        document.getElementById('header-avatar').src = currentUserData.photoURL;
        document.getElementById('compose-avatar').src = currentUserData.photoURL;
        document.getElementById('my-story-img').src = currentUserData.photoURL;
    }

    function setupUnreadListeners() {
        // Notifications unread count → badge-notifications
        onValue(ref(db, `notifications/${currentUser.uid}`), (snapshot) => {
            let count = 0;
            if (snapshot.exists()) {
                snapshot.forEach(child => { if (!child.val().read) count++; });
            }
            updateBadge('badge-notifications', count);
        });
        
        onValue(ref(db, `userChats/${currentUser.uid}`), (snapshot) => {
            let count = 0;
            if (snapshot.exists()) {
                snapshot.forEach(child => { count += child.val().unreadCount || 0; });
            }
            updateBadge('badge-messages', count);
        });
    }

    function updateBadge(id, count) {
        const badge = document.getElementById(id);
        if (count > 0) {
            badge.textContent = count > 99 ? '99+' : count;
            badge.classList.add('show');
        } else {
            badge.classList.remove('show');
        }
    }

    // ── INFINITE SCROLL ──
    const PAGE_SIZE = 10;
    let allPostKeys = [];
    let pageIndex = 0;
    let isLoadingPage = false;
    let hasMorePages = true;
    let scrollObserver = null;

    async function loadPosts() {
        const feed = document.getElementById('feed');
        feed.innerHTML = '';

        try {
            const snapshot = await get(ref(db, 'posts'));

            if (!snapshot.exists()) {
                feed.innerHTML = '<div class="empty-state">No posts yet. Be the first to post!</div>';
                setupPostsListeners();
                return;
            }

            allPostKeys = [];
            snapshot.forEach(child => {
                allPostKeys.push({ id: child.key, timestamp: child.val().timestamp || 0 });
            });
            allPostKeys.sort((a, b) => b.timestamp - a.timestamp);

            hasMorePages = allPostKeys.length > 0;

            await loadNextPage();
            setupScrollObserver();
            setupPostsListeners();

        } catch (error) {
            console.error('Error loading posts:', error);
            feed.innerHTML = '<div class="empty-state">Error loading posts. Please refresh.</div>';
        }
    }

    async function loadNextPage() {
        if (isLoadingPage || !hasMorePages) return;
        isLoadingPage = true;

        const loadingMore = document.getElementById('loading-more');
        loadingMore.classList.add('active');

        try {
            const start = pageIndex * PAGE_SIZE;
            const slice = allPostKeys.slice(start, start + PAGE_SIZE);

            if (slice.length === 0) {
                hasMorePages = false;
                return;
            }

            for (const { id } of slice) {
                if (loadedPostIds.has(id)) continue;
                loadedPostIds.add(id);

                try {
                    const postSnap = await get(ref(db, `posts/${id}`));
                    if (!postSnap.exists()) continue;

                    const post = { id, ...postSnap.val() };

                    const userSnap = await get(ref(db, `users/${post.uid}`));
                    post.user = userSnap.val() || {};
                    post.isVerified = post.user.verified || false;

                    // If this is a repost, also load the original poster's data
                    if (post.isRepost && post.originalUid) {
                        try {
                            const origUserSnap = await get(ref(db, `users/${post.originalUid}`));
                            post.originalUser = origUserSnap.val() || {};
                        } catch { post.originalUser = {}; }
                    }

                    renderPost(post);
                } catch {
                    // skip bad post
                }
            }

            pageIndex++;
            hasMorePages = pageIndex * PAGE_SIZE < allPostKeys.length;

        } finally {
            isLoadingPage = false;
            document.getElementById('loading-more').classList.remove('active');

            if (!hasMorePages) {
                const sentinel = document.getElementById('scroll-sentinel');
                if (sentinel) sentinel.remove();
            }
        }
    }

    function setupScrollObserver() {
        const old = document.getElementById('scroll-sentinel');
        if (old) old.remove();

        if (!hasMorePages) return;

        const sentinel = document.createElement('div');
        sentinel.id = 'scroll-sentinel';
        sentinel.style.height = '1px';
        document.getElementById('loading-more').before(sentinel);

        scrollObserver = new IntersectionObserver((entries) => {
            if (entries[0].isIntersecting) loadNextPage();
        }, { rootMargin: '200px' });

        scrollObserver.observe(sentinel);
    }

    function setupPostsListeners() {
        if (postsListenerAttached) return;
        postsListenerAttached = true;

        const postsRef = ref(db, 'posts');

        onChildAdded(postsRef, async (snapshot) => {
            const postId = snapshot.key;
            if (loadedPostIds.has(postId)) return;

            const post = { id: postId, ...snapshot.val() };

            // Add to sorted index
            allPostKeys.unshift({ id: postId, timestamp: post.timestamp || 0 });

            try {
                const userSnap = await get(ref(db, `users/${post.uid}`));
                post.user = userSnap.val() || {};
                post.isVerified = post.user.verified || false;

                if (post.isRepost && post.originalUid) {
                    try {
                        const origUserSnap = await get(ref(db, `users/${post.originalUid}`));
                        post.originalUser = origUserSnap.val() || {};
                    } catch { post.originalUser = {}; }
                }
            } catch {
                post.user = {};
                post.isVerified = false;
            }

            // ── PILL LOGIC ──
            // If user scrolled away from top, queue post for pill; else prepend immediately
            if (!isUserAtTop) {
                loadedPostIds.add(postId);
                pendingNewPosts.unshift(post);
                showPill();
            } else {
                loadedPostIds.add(postId);
                renderPost(post, true);
            }
        });

        onChildChanged(postsRef, (snapshot) => {
            updatePostInDOM(snapshot.key, snapshot.val());
        });

        onChildRemoved(postsRef, (snapshot) => {
            const el = document.getElementById(`post-${snapshot.key}`);
            if (el) el.remove();
            allPostKeys = allPostKeys.filter(p => p.id !== snapshot.key);
            pendingNewPosts = pendingNewPosts.filter(p => p.id !== snapshot.key);
            if (pendingNewPosts.length === 0) hidePill();
        });
    }

    function renderPost(post, prepend = false) {
        const feed = document.getElementById('feed');
        if (document.getElementById(`post-${post.id}`)) return;

        const user = post.user || {};
        const isOwner = post.uid === currentUser.uid;

        // Repost data
        const isRepost = !!post.isRepost;
        const reposterName = isRepost ? (user.displayName || 'Someone') : null;
        // For reposts, show original post's author data
        const displayUser = isRepost && post.originalUser ? post.originalUser : user;

        const div = document.createElement('div');
        div.className = 'post-card';
        div.id = `post-${post.id}`;

        const repostCount = Object.keys(post.reposts || {}).length;
        const userReposted = post.reposts?.[currentUser.uid];

        div.innerHTML = `
            ${isRepost ? `
            <div class="repost-banner">
                ${REPOST_SVG}
                <span>${escapeHtml(reposterName)} reposted</span>
            </div>
            ` : ''}

            ${isOwner ? `
            <div class="post-menu">
                <button class="post-menu-btn" onclick="togglePostMenu('${post.id}', event)">
                    <i data-feather="more-horizontal" style="width: 20px; height: 20px;"></i>
                </button>
                <div class="post-dropdown" id="dropdown-${post.id}">
                    <button class="dropdown-item delete" onclick="confirmDeletePost('${post.id}')">
                        <i data-feather="trash-2" style="width: 16px; height: 16px;"></i>
                        Delete
                    </button>
                </div>
            </div>
            ` : ''}

            <div class="post-header">
                <img src="${displayUser.photoURL || `https://ui-avatars.com/api/?name=${displayUser.username || 'U'}&background=random`}" class="avatar" onclick="goToProfile('${isRepost && post.originalUid ? post.originalUid : post.uid}')">
                <div class="post-meta">
                    <div class="post-author-row">
                        <span class="post-author">${displayUser.displayName || 'User'}</span>
                        ${displayUser.verified ? `<span class="verified-badge" title="Verified">${VERIFIED_BADGE_SVG}</span>` : ''}
                    </div>
                    <div class="post-handle">@${displayUser.username || 'user'} · ${formatTime(post.timestamp)}</div>
                </div>
            </div>

            ${renderPostText(post.text || '', post.id)}

            ${post.mediaUrl ? `
                <div class="post-media">
                    ${post.mediaType === 'video'
                        ? `<video src="${post.mediaUrl}" controls playsinline style="width: 100%;"></video>`
                        : `<img src="${post.mediaUrl}" style="width: 100%; display: block;" loading="lazy">`
                    }
                </div>
            ` : ''}

            <div class="actions">
                <button class="action-btn ${post.likes?.[currentUser.uid] ? 'liked' : ''}" onclick="toggleLike('${post.id}')" id="like-btn-${post.id}">
                    <i data-feather="heart" style="width: 20px; height: 20px;" ${post.likes?.[currentUser.uid] ? 'fill="currentColor"' : ''}></i>
                    <span id="like-count-${post.id}">${Object.keys(post.likes || {}).length}</span>
                </button>
                <button class="action-btn" onclick="toggleComments('${post.id}')">
                    <i data-feather="message-circle" style="width: 20px; height: 20px;"></i>
                    <span id="comment-count-${post.id}">${Object.keys(post.comments || {}).length}</span>
                </button>
                <button class="action-btn ${userReposted ? 'reposted' : ''}" onclick="handleRepost('${post.id}')" id="repost-btn-${post.id}" title="${userReposted ? 'Undo repost' : 'Repost'}">
                    ${REPOST_SVG}
                    <span id="repost-count-${post.id}">${repostCount > 0 ? repostCount : ''}</span>
                </button>
            </div>

            <div class="comments-section" id="comments-${post.id}">
                <div id="comments-list-${post.id}"></div>
                <div class="comment-input-wrapper">
                    <img src="${currentUserData.photoURL}" class="comment-avatar">
                    <input type="text" class="comment-input" id="comment-input-${post.id}" placeholder="Write a comment..." onkeypress="handleCommentKeypress(event, '${post.id}')" oninput="updateCommentButton('${post.id}')">
                    <button class="comment-submit" id="comment-submit-${post.id}" onclick="submitComment('${post.id}')" disabled>Post</button>
                </div>
            </div>
        `;

        const emptyState = feed.querySelector('.empty-state');
        if (emptyState) emptyState.remove();

        if (prepend && feed.firstChild) {
            feed.insertBefore(div, feed.firstChild);
        } else {
            feed.appendChild(div);
        }

        setupCommentsListener(post.id);
        feather.replace();
    }

    // Scroll to & highlight a post linked from search
    const hash = window.location.hash;
    if (hash.startsWith('#post-')) {
        const postId = hash.slice(6);
        setTimeout(() => {
            const el = document.getElementById(`post-${postId}`);
            if (el) {
                el.scrollIntoView({ behavior: 'smooth', block: 'center' });
                el.style.background = 'rgba(99,102,241,0.06)';
                setTimeout(() => el.style.background = '', 2000);
            }
        }, 1500);
    }

    function updatePostInDOM(postId, postData) {
        const likeCount = Object.keys(postData.likes || {}).length;
        const userLiked = postData.likes?.[currentUser.uid];
        const likeBtn = document.getElementById(`like-btn-${postId}`);
        const likeCountEl = document.getElementById(`like-count-${postId}`);

        if (likeCountEl) likeCountEl.textContent = likeCount;
        if (likeBtn) {
            const icon = likeBtn.querySelector('i');
            if (userLiked) {
                likeBtn.classList.add('liked');
                icon?.setAttribute('fill', 'currentColor');
            } else {
                likeBtn.classList.remove('liked');
                icon?.removeAttribute('fill');
            }
        }

        const commentCountEl = document.getElementById(`comment-count-${postId}`);
        if (commentCountEl) commentCountEl.textContent = Object.keys(postData.comments || {}).length;

        // Update repost count & state
        const repostCount = Object.keys(postData.reposts || {}).length;
        const userReposted = postData.reposts?.[currentUser.uid];
        const repostBtn = document.getElementById(`repost-btn-${postId}`);
        const repostCountEl = document.getElementById(`repost-count-${postId}`);
        if (repostCountEl) repostCountEl.textContent = repostCount > 0 ? repostCount : '';
        if (repostBtn) {
            if (userReposted) {
                repostBtn.classList.add('reposted');
            } else {
                repostBtn.classList.remove('reposted');
            }
        }
