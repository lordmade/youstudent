    // ── REPOST ──
    window.handleRepost = async (postId) => {
        const repostRef = ref(db, `posts/${postId}/reposts/${currentUser.uid}`);
        const snapshot = await get(repostRef);

        // Animate icon
        const btn = document.getElementById(`repost-btn-${postId}`);
        if (btn) {
            btn.classList.add('repost-animate');
            setTimeout(() => btn.classList.remove('repost-animate'), 450);
        }

        if (snapshot.exists()) {
            // Undo repost: remove marker + remove repost post from feed
            await remove(repostRef);

            // Find and remove the repost post owned by current user
            try {
                const postsSnap = await get(ref(db, 'posts'));
                if (postsSnap.exists()) {
                    postsSnap.forEach(child => {
                        const p = child.val();
                        if (p.isRepost && p.originalPostId === postId && p.uid === currentUser.uid) {
                            remove(ref(db, `posts/${child.key}`));
                        }
                    });
                }
            } catch {}

            showToast('Repost removed');
        } else {
            // Confirm repost
            confirmCallback = async () => {
                try {
                    // Get original post data
                    const origSnap = await get(ref(db, `posts/${postId}`));
                    if (!origSnap.exists()) { showToast('Post not found'); return; }
                    const origPost = origSnap.val();

                    // Mark repost on original post
                    await set(repostRef, serverTimestamp());

                    // Create a new repost post
                    const repostPostRef = push(ref(db, 'posts'));
                    await set(repostPostRef, {
                        uid: currentUser.uid,
                        isRepost: true,
                        originalPostId: postId,
                        originalUid: origPost.uid,
                        text: origPost.text || '',
                        mediaUrl: origPost.mediaUrl || null,
                        mediaType: origPost.mediaType || null,
                        timestamp: serverTimestamp(),
                        likes: {},
                        comments: {},
                        reposts: {}
                    });

                    showToast('Reposted!');
                    if (navigator.vibrate) navigator.vibrate(40);
                } catch {
                    showToast('Repost failed');
                }
            };

            showConfirmModal(
                'Repost this?',
                'This will share the post with your followers.',
                'Repost',
                true
            );
        }
    };

    // Comments
    function setupCommentsListener(postId) {
        onChildAdded(ref(db, `posts/${postId}/comments`), async (snapshot) => {
            const commentId = snapshot.key;
            const comment = snapshot.val();
            if (document.getElementById(`comment-${postId}-${commentId}`)) return;
            await renderComment(postId, commentId, comment);
            updateCommentsSummary(postId);
        });
    }

    async function renderComment(postId, commentId, comment, isReply = false, parentId = null) {
        const containerId = parentId ? `replies-${postId}-${parentId}` : `comments-list-${postId}`;
        const container = document.getElementById(containerId);
        if (!container) return;
        if (document.getElementById(`comment-${postId}-${commentId}`)) return;

        let user = {};
        try {
            const userSnap = await get(ref(db, `users/${comment.uid}`));
            user = userSnap.val() || {};
        } catch {}

        const isOwner = comment.uid === currentUser.uid;
        const likes = comment.likes || {};
        const likeCount = Object.keys(likes).length;
        const userLiked = likes[currentUser.uid];

        const existingCount = container.querySelectorAll('.comment:not(.hidden-comment)').length;
        const shouldHide = !isReply && existingCount >= 2;

        const div = document.createElement('div');
        div.className = `comment ${shouldHide ? 'hidden-comment' : ''}`;
        div.id = `comment-${postId}-${commentId}`;

        div.innerHTML = `
            <img src="${user.photoURL || `https://ui-avatars.com/api/?name=${user.username || 'U'}&background=random`}" class="comment-avatar">
            <div class="comment-content">
                <div class="comment-header">
                    <span class="comment-author">${user.displayName || 'User'}</span>
                    <span class="comment-time">${formatTime(comment.timestamp)}</span>
                    ${isOwner ? `
                    <div class="comment-menu">
                        <button class="comment-menu-btn" onclick="confirmDeleteComment('${postId}', '${commentId}')">
                            <i data-feather="trash-2" style="width: 14px; height: 14px;"></i>
                        </button>
                    </div>
                    ` : ''}
                </div>
                <div class="comment-text">${escapeHtml(comment.text)}</div>
                <div class="comment-actions">
                    <span class="comment-action ${userLiked ? 'liked' : ''}" onclick="toggleCommentLike('${postId}', '${commentId}')">
                        <i data-feather="heart" style="width: 12px; height: 12px;" ${userLiked ? 'fill="currentColor"' : ''}></i>
                        ${likeCount > 0 ? likeCount : 'Like'}
                    </span>
                    ${!isReply ? `<span class="comment-action" onclick="showReplyInput('${postId}', '${commentId}')">Reply</span>` : ''}
                </div>
                <div id="replies-${postId}-${commentId}"></div>
                <div id="reply-input-${postId}-${commentId}"></div>
            </div>
        `;

        container.appendChild(div);

        if (comment.replies) {
            Object.entries(comment.replies).forEach(([replyId, reply]) => {
                renderComment(postId, replyId, reply, true, commentId);
            });
        }

        feather.replace();
    }

    function updateCommentsSummary(postId) {
        const container = document.getElementById(`comments-list-${postId}`);
        if (!container) return;

        const hiddenCount = container.querySelectorAll('.comment.hidden-comment').length;
        let summary = document.getElementById(`summary-${postId}`);

        if (hiddenCount === 0) {
            if (summary) summary.remove();
            return;
        }

        if (!summary) {
            summary = document.createElement('div');
            summary.className = 'comments-summary';
            summary.id = `summary-${postId}`;
            container.insertBefore(summary, container.firstChild);
        }

        summary.innerHTML = `<span onclick="showAllComments('${postId}')">View ${hiddenCount} more comment${hiddenCount > 1 ? 's' : ''}</span>`;
    }

    window.showAllComments = (postId) => {
        const container = document.getElementById(`comments-list-${postId}`);
        if (!container) return;
        container.querySelectorAll('.comment.hidden-comment').forEach((c, i) => {
            setTimeout(() => c.classList.add('show'), i * 50);
        });
        const summary = document.getElementById(`summary-${postId}`);
        if (summary) summary.remove();
    };

    // Interactions
    window.togglePostMenu = (postId, event) => {
        event.stopPropagation();
        document.getElementById(`dropdown-${postId}`).classList.toggle('active');
    };

    window.toggleLike = async (postId) => {
        const likeRef = ref(db, `posts/${postId}/likes/${currentUser.uid}`);
        const snapshot = await get(likeRef);
        if (snapshot.exists()) {
            await remove(likeRef);
        } else {
            await set(likeRef, true);
            if (navigator.vibrate) navigator.vibrate(50);
        }
    };

    window.toggleComments = (postId) => {
        document.getElementById(`comments-${postId}`).classList.toggle('active');
    };

    window.updateCommentButton = (postId) => {
        const input = document.getElementById(`comment-input-${postId}`);
        const btn = document.getElementById(`comment-submit-${postId}`);
        btn.disabled = !input.value.trim();
        btn.classList.toggle('active', !!input.value.trim());
    };

    window.handleCommentKeypress = (event, postId) => {
        if (event.key === 'Enter') submitComment(postId);
    };

    window.submitComment = async (postId) => {
        const input = document.getElementById(`comment-input-${postId}`);
        const text = input.value.trim();
        if (!text) return;

        const btn = document.getElementById(`comment-submit-${postId}`);
        btn.disabled = true;

        try {
            const commentRef = push(ref(db, `posts/${postId}/comments`));
            await set(commentRef, {
                uid: currentUser.uid,
                text,
                timestamp: serverTimestamp(),
                likes: {}
            });
            input.value = '';
            updateCommentButton(postId);
        } catch {
            showToast('Failed to post comment');
        } finally {
            btn.disabled = false;
        }
    };

    window.toggleCommentLike = async (postId, commentId) => {
        const likeRef = ref(db, `posts/${postId}/comments/${commentId}/likes/${currentUser.uid}`);
        const snapshot = await get(likeRef);
        if (snapshot.exists()) await remove(likeRef);
        else await set(likeRef, true);
    };

    window.showReplyInput = (postId, commentId) => {
        const container = document.getElementById(`reply-input-${postId}-${commentId}`);
        if (container.innerHTML) { container.innerHTML = ''; return; }

        container.innerHTML = `
            <div class="reply-input-wrapper">
                <img src="${currentUserData.photoURL}" class="comment-avatar" style="width: 28px; height: 28px;">
                <input type="text" class="reply-input" id="reply-text-${postId}-${commentId}" placeholder="Write a reply..." onkeypress="if(event.key==='Enter') submitReply('${postId}', '${commentId}')">
                <button class="reply-submit" onclick="submitReply('${postId}', '${commentId}')">Post</button>
            </div>
        `;
        setTimeout(() => document.getElementById(`reply-text-${postId}-${commentId}`)?.focus(), 100);
    };

    window.submitReply = async (postId, commentId) => {
        const input = document.getElementById(`reply-text-${postId}-${commentId}`);
        if (!input) return;
        const text = input.value.trim();
        if (!text) return;

        try {
            const replyRef = push(ref(db, `posts/${postId}/comments/${commentId}/replies`));
            await set(replyRef, {
                uid: currentUser.uid,
                text,
                timestamp: serverTimestamp(),
                likes: {}
            });
            input.value = '';
        } catch {
            showToast('Failed to post reply');
        }
    };

    // ── DELETE / CONFIRM SYSTEM ──
    window.confirmDeletePost = (postId) => {
        deleteType = 'post';
        deleteData = postId;
        confirmCallback = null;
        showConfirmModal('Delete Post?', 'This action cannot be undone.', 'Delete', false);
    };

    window.confirmDeleteComment = (postId, commentId) => {
        deleteType = 'comment';
        deleteData = { postId, commentId };
        confirmCallback = null;
        showConfirmModal('Delete Comment?', 'This comment will be permanently removed.', 'Delete', false);
    };

    function showConfirmModal(title, text, confirmText, isRepost = false) {
        document.getElementById('confirm-title').textContent = title;
        document.getElementById('confirm-text').textContent = text;
        const btn = document.getElementById('confirm-action-btn');
        btn.textContent = confirmText;
        btn.className = `confirm-btn confirm${isRepost ? ' repost-confirm' : ''}`;
        document.getElementById('confirm-overlay').classList.add('active');
        document.getElementById('confirm-modal').classList.add('active');
    }

    window.closeConfirmModal = () => {
        document.getElementById('confirm-overlay').classList.remove('active');
        document.getElementById('confirm-modal').classList.remove('active');
        deleteType = null;
        deleteData = null;
        confirmCallback = null;
    };

    window.executeConfirmAction = async () => {
        // If there's a custom callback (e.g. repost), run it
        if (confirmCallback) {
            const cb = confirmCallback;
            closeConfirmModal();
            await cb();
            return;
        }

        if (!deleteType || !deleteData) { closeConfirmModal(); return; }

        try {
            if (deleteType === 'post') {
                await remove(ref(db, `posts/${deleteData}`));
                showToast('Post deleted');
            } else if (deleteType === 'comment') {
                await remove(ref(db, `posts/${deleteData.postId}/comments/${deleteData.commentId}`));
                showToast('Comment deleted');
            } else if (deleteType === 'story') {
                await remove(ref(db, `stories/${deleteData}`));
                closeStoryViewer();
                showToast('Story deleted');
            }
        } catch {
            showToast('Delete failed');
        }

        closeConfirmModal();
    };

    // Stories
    function setupStoriesListeners() {
        const storiesRef = ref(db, 'stories');

        onChildAdded(storiesRef, (snapshot) => {
            const story = { id: snapshot.key, ...snapshot.val() };
            if (Date.now() - story.timestamp < 24 * 60 * 60 * 1000) {
                addStoryToGroup(story);
            }
        });

        onChildChanged(storiesRef, (snapshot) => {
            updateStoryInGroup({ id: snapshot.key, ...snapshot.val() });
        });

        onChildRemoved(storiesRef, (snapshot) => {
            removeStoryFromGroup(snapshot.key);
        });
    }

    function addStoryToGroup(story) {
        const userId = story.uid;
        if (!storyGroups.has(userId)) {
            storyGroups.set(userId, {
                user: { uid: userId, username: story.username, photoURL: story.userPhoto },
                stories: []
            });
        }
        const group = storyGroups.get(userId);
        if (!group.stories.find(s => s.id === story.id)) {
            group.stories.push(story);
            group.stories.sort((a, b) => a.timestamp - b.timestamp);
            renderStoryGroups();
        }
    }

    function updateStoryInGroup(story) {
        const group = storyGroups.get(story.uid);
        if (group) {
            const index = group.stories.findIndex(s => s.id === story.id);
            if (index !== -1) { group.stories[index] = story; renderStoryGroups(); }
        }
    }

    function removeStoryFromGroup(storyId) {
        for (const [userId, group] of storyGroups) {
            const index = group.stories.findIndex(s => s.id === storyId);
            if (index !== -1) {
                group.stories.splice(index, 1);
                if (group.stories.length === 0) storyGroups.delete(userId);
                renderStoryGroups();
                break;
            }
        }
    }

    function renderStoryGroups() {
        const container = document.getElementById('stories-container');
        const addBtn = container.firstElementChild;
        container.innerHTML = '';
        container.appendChild(addBtn);

        for (const [userId, group] of storyGroups) {
            const hasUnseen = group.stories.some(s => !s.viewed?.[currentUser.uid]);
            const isOwn = userId === currentUser.uid;

            const groupEl = document.createElement('div');
            groupEl.className = 'story-group';
            groupEl.onclick = () => openStoryViewer(userId);

            groupEl.innerHTML = `
                <div class="story-ring-group ${hasUnseen ? '' : 'all-seen'}">
                    <img src="${group.user.photoURL}" class="story-img-group">
                    ${group.stories.length > 1 ? `<div class="story-count">${group.stories.length}</div>` : ''}
                </div>
                <span class="story-label">${isOwn ? 'Your Story' : group.user.username}</span>
            `;

            container.appendChild(groupEl);
        }
    }

    window.triggerStoryUpload = () => document.getElementById('story-input').click();

    window.validateAndUploadStory = async (e) => {
        const file = e.target.files[0];
        if (!file) return;

        if (file.type.startsWith('video/')) {
            const video = document.createElement('video');
            video.preload = 'metadata';
            video.onloadedmetadata = async () => {
                window.URL.revokeObjectURL(video.src);
                if (video.duration > MAX_VIDEO_DURATION) {
                    showToast(`Video too long. Max ${MAX_VIDEO_DURATION / 60} minutes.`);
                    return;
                }
                await uploadStory(file);
            };
            video.src = URL.createObjectURL(file);
        } else {
            await uploadStory(file);
        }
    };

    async function uploadStory(file) {
        showToast('Uploading...');
        try {
            const result = await uploadToCloudinary(file, 'stories');
            const storyRef = push(ref(db, 'stories'));
            await set(storyRef, {
                uid: currentUser.uid,
                username: currentUserData.username,
                userPhoto: currentUserData.photoURL,
                mediaUrl: result.secure_url,
                mediaType: result.resource_type,
                timestamp: serverTimestamp(),
                viewed: { [currentUser.uid]: true }
            });
            showToast('Story added!');
        } catch {
            showToast('Upload failed');
        }
    }

    window.openStoryViewer = (userId) => {
        const group = storyGroups.get(userId);
        if (!group || group.stories.length === 0) return;

        const userIds = Array.from(storyGroups.keys());
        currentStoryGroupIndex = userIds.indexOf(userId);
        currentStoryIndex = 0;

        const firstUnseen = group.stories.findIndex(s => !s.viewed?.[currentUser.uid]);
        if (firstUnseen !== -1) currentStoryIndex = firstUnseen;

        displayCurrentStory();
    };

    function displayCurrentStory() {
        const userIds = Array.from(storyGroups.keys());
        const userId = userIds[currentStoryGroupIndex];
        const group = storyGroups.get(userId);
        const story = group?.stories[currentStoryIndex];

        if (!story) { closeStoryViewer(); return; }

        const viewer = document.getElementById('story-viewer');
        const container = document.getElementById('story-media-container');

        document.getElementById('story-viewer-avatar').src = group.user.photoURL;
        document.getElementById('story-viewer-name').textContent = group.user.username;
        document.getElementById('story-viewer-time').textContent = formatTime(story.timestamp);

        const deleteBtn = document.getElementById('delete-story-btn');
        deleteBtn.style.display = story.uid === currentUser.uid ? 'block' : 'none';

        if (story.uid !== currentUser.uid) {
            update(ref(db, `stories/${story.id}/viewed`), { [currentUser.uid]: true });
        }

        const progressContainer = document.getElementById('story-progress-container');
        progressContainer.innerHTML = '';
        group.stories.forEach((_, idx) => {
            const bar = document.createElement('div');
            bar.className = 'story-progress-bar';
            const fill = document.createElement('div');
            fill.className = 'story-progress-fill';
            fill.style.width = idx < currentStoryIndex ? '100%' : '0%';
            if (idx === currentStoryIndex) {
                fill.id = 'current-progress';
                setTimeout(() => {
                    fill.style.transition = 'width 5s linear';
                    fill.style.width = '100%';
                }, 50);
            }
            bar.appendChild(fill);
            progressContainer.appendChild(bar);
        });

        container.innerHTML = '';
        if (currentVideoElement) { currentVideoElement.pause(); currentVideoElement = null; }
        if (storyTimeout) clearTimeout(storyTimeout);

        storyTimeout = setTimeout(() => navigateStory(1), 5000);

        if (story.mediaType === 'video') {
            const video = document.createElement('video');
            video.className = 'story-video';
            video.src = story.mediaUrl;
            video.autoplay = true;
            video.playsInline = true;
            video.onended = () => navigateStory(1);
            container.appendChild(video);
            currentVideoElement = video;
        } else {
            const img = document.createElement('img');
            img.className = 'story-media';
            img.src = story.mediaUrl;
            container.appendChild(img);
        }

        viewer.classList.add('active');
    }

    window.navigateStory = (direction) => {
        if (storyTimeout) clearTimeout(storyTimeout);

        const userIds = Array.from(storyGroups.keys());
        const currentGroup = storyGroups.get(userIds[currentStoryGroupIndex]);

        currentStoryIndex += direction;

        if (currentStoryIndex >= currentGroup.stories.length) {
            currentStoryGroupIndex++;
            currentStoryIndex = 0;
            if (currentStoryGroupIndex >= userIds.length) { closeStoryViewer(); return; }
        } else if (currentStoryIndex < 0) {
            currentStoryGroupIndex--;
            if (currentStoryGroupIndex < 0) { closeStoryViewer(); return; }
            const prevGroup = storyGroups.get(userIds[currentStoryGroupIndex]);
            currentStoryIndex = prevGroup.stories.length - 1;
        }

        displayCurrentStory();
    };

    window.closeStoryViewer = () => {
        if (storyTimeout) clearTimeout(storyTimeout);
        if (currentVideoElement) { currentVideoElement.pause(); currentVideoElement = null; }
        document.getElementById('story-viewer').classList.remove('active');
    };

    window.deleteCurrentStory = () => {
        const userIds = Array.from(storyGroups.keys());
        const group = storyGroups.get(userIds[currentStoryGroupIndex]);
        const story = group.stories[currentStoryIndex];
        deleteType = 'story';
        deleteData = story.id;
        confirmCallback = null;
        showConfirmModal('Delete Story?', 'This story will be permanently removed.', 'Delete', false);
    };

    // Compose
    window.openCompose = () => document.querySelector('.modal-overlay').classList.add('active');

    window.closeCompose = () => {
        document.querySelector('.modal-overlay').classList.remove('active');
        clearMedia();
    };

    window.updatePostButton = () => {
        const text = document.getElementById('compose-text').value;
        const btn = document.getElementById('post-btn');
        document.getElementById('char-count').textContent = 280 - text.length;
        const hasContent = text.trim().length > 0 || selectedMedia;
        btn.disabled = !hasContent;
        btn.style.opacity = hasContent ? '1' : '0.5';
    };

    window.handleMediaSelect = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        selectedMedia = file;
        document.getElementById('preview-img').src = URL.createObjectURL(file);
        document.getElementById('media-preview').style.display = 'block';
        updatePostButton();
    };

    window.clearMedia = () => {
        selectedMedia = null;
        document.getElementById('media-preview').style.display = 'none';
        document.getElementById('media-input').value = '';
        updatePostButton();
    };

    window.createPost = async () => {
        const text = document.getElementById('compose-text').value.trim();
        if (!text && !selectedMedia) return;

        const btn = document.getElementById('post-btn');
        btn.disabled = true;
        btn.textContent = 'Posting...';

        try {
            let mediaUrl = null;
            let mediaType = null;

            if (selectedMedia) {
                const result = await uploadToCloudinary(selectedMedia, 'posts');
                mediaUrl = result.secure_url;
                mediaType = result.resource_type;
            }

            const postRef = push(ref(db, 'posts'));
            await set(postRef, {
                uid: currentUser.uid,
                text,
                mediaUrl,
                mediaType,
                timestamp: serverTimestamp(),
                likes: {},
                comments: {}
            });

            document.getElementById('compose-text').value = '';
            closeCompose();
            showToast('Posted!');
        } catch {
            showToast('Upload failed');
        } finally {
            btn.textContent = 'Post';
            btn.disabled = false;
        }
    };

    // ── UTILITIES ──
    const POST_TRUNCATE_CHARS = 280;

    function renderPostText(rawText, postId) {
        const escaped = escapeHtml(rawText);
        const rich = enrichText(escaped);
        const isLong = rawText.length > POST_TRUNCATE_CHARS;

        if (!isLong) {
            return `<div class="post-text" id="post-text-${postId}">${rich}</div>`;
        }

        const truncated = truncateRich(rich, POST_TRUNCATE_CHARS);

        return `
            <div class="post-text collapsed" id="post-text-${postId}">${truncated}</div>
            <button class="see-more-btn" id="see-more-${postId}" onclick="toggleSeeMore('${postId}', ${JSON.stringify(rich).replace(/'/g, "\\'")})">See more</button>
        `;
    }

    window.toggleSeeMore = (postId, fullRich) => {
        const el = document.getElementById(`post-text-${postId}`);
        const btn = document.getElementById(`see-more-${postId}`);
        if (!el || !btn) return;

        if (el.classList.contains('collapsed')) {
            el.innerHTML = fullRich;
            el.classList.remove('collapsed');
            btn.textContent = 'See less';
        } else {
            el.innerHTML = truncateRich(fullRich, POST_TRUNCATE_CHARS);
            el.classList.add('collapsed');
            btn.textContent = 'See more';
        }
    };

    function truncateRich(rich, limit) {
        const stripped = rich.replace(/<[^>]+>/g, '');
        if (stripped.length <= limit) return rich;

        let realCount = 0;
        let i = 0;
        while (i < rich.length && realCount < limit) {
            if (rich[i] === '<') {
                while (i < rich.length && rich[i] !== '>') i++;
            } else {
                realCount++;
            }
            i++;
        }
        let cut = i;
        while (cut > 0 && rich[cut] !== ' ' && rich[cut] !== '\n') cut--;
        return rich.slice(0, cut) + '…';
    }

    function enrichText(escapedHtml) {
        return escapedHtml
            .replace(/(https?:\/\/[^\s<]+)/g, '<a class="post-link" href="$1" target="_blank" rel="noopener">$1</a>')
            .replace(/@([a-zA-Z0-9_]+)/g, '<span class="mention" onclick="goToProfileByUsername(\'$1\')">@$1</span>')
            .replace(/#([a-zA-Z0-9_]+)/g, '<span class="hashtag">#$1</span>');
    }

    window.goToProfileByUsername = async (username) => {
        try {
            const snap = await get(ref(db, 'users'));
            if (snap.exists()) {
                snap.forEach(child => {
                    if (child.val().username === username) {
                        window.location.href = `profile.html?id=${child.key}`;
                    }
                });
            }
        } catch {
            showToast('Could not find user');
        }
    };

    // ── MENTION AUTOCOMPLETE ──
    let mentionQuery = '';
    let mentionStart = -1;
    let mentionResults = [];
    let mentionSelected = 0;
    let allUsersCache = null;

    async function getAllUsers() {
        if (allUsersCache) return allUsersCache;
        try {
            const snap = await get(ref(db, 'users'));
            allUsersCache = [];
            if (snap.exists()) {
                snap.forEach(child => {
                    const u = child.val();
                    if (child.key !== currentUser.uid) {
                        allUsersCache.push({ uid: child.key, ...u });
                    }
                });
            }
        } catch {
            allUsersCache = [];
        }
        return allUsersCache;
    }

    window.handleMentionInput = async (e) => {
        const ta = e.target;
        const val = ta.value;
        const pos = ta.selectionStart;

        let start = pos - 1;
        while (start >= 0 && val[start] !== '@' && val[start] !== ' ' && val[start] !== '\n') start--;

        if (start >= 0 && val[start] === '@') {
            mentionStart = start;
            mentionQuery = val.slice(start + 1, pos).toLowerCase();
            const users = await getAllUsers();
            mentionResults = users.filter(u =>
                u.username?.toLowerCase().includes(mentionQuery) ||
                u.displayName?.toLowerCase().includes(mentionQuery)
            ).slice(0, 6);
            mentionSelected = 0;
            renderMentionDropdown();
        } else {
            closeMentionDropdown();
        }
    };

    window.handleMentionKeydown = (e) => {
        const dropdown = document.getElementById('mention-dropdown');
        if (!dropdown.classList.contains('active')) return;

        if (e.key === 'ArrowDown') {
            e.preventDefault();
            mentionSelected = Math.min(mentionSelected + 1, mentionResults.length - 1);
            renderMentionDropdown();
        } else if (e.key === 'ArrowUp') {
            e.preventDefault();
            mentionSelected = Math.max(mentionSelected - 1, 0);
            renderMentionDropdown();
        } else if (e.key === 'Enter' || e.key === 'Tab') {
            if (mentionResults.length > 0) {
                e.preventDefault();
                insertMention(mentionResults[mentionSelected]);
            }
        } else if (e.key === 'Escape') {
            closeMentionDropdown();
        }
    };

    function renderMentionDropdown() {
        const dropdown = document.getElementById('mention-dropdown');
        if (mentionResults.length === 0) { closeMentionDropdown(); return; }

        dropdown.innerHTML = mentionResults.map((u, i) => `
            <div class="mention-item ${i === mentionSelected ? 'selected' : ''}" onclick="insertMentionByIndex(${i})">
                <img src="${u.photoURL || `https://ui-avatars.com/api/?name=${u.username}&background=random`}" alt="">
                <div class="mention-item-info">
                    <span class="mention-item-name">${escapeHtml(u.displayName || u.username)}</span>
                    <span class="mention-item-handle">@${escapeHtml(u.username || '')}</span>
                </div>
            </div>
        `).join('');

        dropdown.classList.add('active');
    }

    window.insertMentionByIndex = (i) => insertMention(mentionResults[i]);

    function insertMention(user) {
        const ta = document.getElementById('compose-text');
        const val = ta.value;
        const pos = ta.selectionStart;

        const before = val.slice(0, mentionStart);
        const after = val.slice(pos);
        const insert = `@${user.username} `;

        ta.value = before + insert + after;

        const newPos = mentionStart + insert.length;
        ta.setSelectionRange(newPos, newPos);
        ta.focus();

        closeMentionDropdown();
        updatePostButton();
    }

    function closeMentionDropdown() {
        const dropdown = document.getElementById('mention-dropdown');
        if (dropdown) dropdown.classList.remove('active');
        mentionResults = [];
        mentionStart = -1;
    }

    document.addEventListener('click', (e) => {
        if (!e.target.closest('.compose-input-wrapper')) closeMentionDropdown();
        if (!e.target.closest('.post-menu')) {
            document.querySelectorAll('.post-dropdown').forEach(d => d.classList.remove('active'));
        }
    });

    function formatTime(timestamp) {
        if (!timestamp) return 'now';
        const secs = Math.floor((Date.now() - timestamp) / 1000);
        if (secs < 60) return 'now';
        if (secs < 3600) return Math.floor(secs / 60) + 'm';
        if (secs < 86400) return Math.floor(secs / 3600) + 'h';
        return Math.floor(secs / 86400) + 'd';
    }

    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    window.showToast = (msg) => {
        const toast = document.getElementById('toast');
        toast.textContent = msg;
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 3000);
    };

    window.goToProfile = (uid) => {
        window.location.href = `profile.html?id=${uid || currentUser.uid}`;
    };

    window.goToNotifications = () => { window.location.href = 'notifications.html'; };
    window.goToMessages = () => { window.location.href = 'messages.html'; };
    window.goToSearch = () => { window.location.href = 'search.html'; };

    feather.replace();
</script>
