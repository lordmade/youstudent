<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Vynix · Profile</title>
    <script src="https://unpkg.com/feather-icons"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root,[data-theme="light"]{--primary:#6366F1;--primary-dark:#4F46E5;--primary-rgb:99,102,241;--background:#F8FAFC;--surface:#FFFFFF;--surface2:#F1F5F9;--border:#E2E8F0;--text-primary:#0F172A;--text-secondary:#64748B;--text-muted:#94A3B8;--like:#F43F5E;--verified:#1D9BF0;--repost:#10B981;--shadow:0 2px 12px rgba(0,0,0,0.08);--shadow-lg:0 10px 40px rgba(0,0,0,0.12);--nav-bg:rgba(255,255,255,0.92);}
        [data-theme="dark"]{--primary:#818CF8;--primary-dark:#6366F1;--primary-rgb:129,140,248;--background:#0F172A;--surface:#1E293B;--surface2:#334155;--border:#334155;--text-primary:#F1F5F9;--text-secondary:#94A3B8;--text-muted:#64748B;--like:#FB7185;--verified:#38BDF8;--repost:#34D399;--shadow:0 2px 12px rgba(0,0,0,0.3);--shadow-lg:0 10px 40px rgba(0,0,0,0.5);--nav-bg:rgba(15,23,42,0.95);}
        [data-theme="midnight"]{--primary:#C084FC;--primary-dark:#A855F7;--primary-rgb:192,132,252;--background:#09090B;--surface:#18181B;--surface2:#27272A;--border:#3F3F46;--text-primary:#FAFAFA;--text-secondary:#A1A1AA;--text-muted:#71717A;--like:#F472B6;--verified:#67E8F9;--repost:#4ADE80;--shadow:0 2px 12px rgba(0,0,0,0.4);--shadow-lg:0 10px 40px rgba(0,0,0,0.7);--nav-bg:rgba(9,9,11,0.95);}
        [data-theme="ocean"]{--primary:#06B6D4;--primary-dark:#0891B2;--primary-rgb:6,182,212;--background:#F0F9FF;--surface:#FFFFFF;--surface2:#E0F2FE;--border:#BAE6FD;--text-primary:#0C4A6E;--text-secondary:#0369A1;--text-muted:#7DD3FC;--like:#F43F5E;--verified:#06B6D4;--repost:#10B981;--shadow:0 2px 12px rgba(6,182,212,0.1);--shadow-lg:0 10px 40px rgba(6,182,212,0.15);--nav-bg:rgba(240,249,255,0.92);}
        [data-theme="rose"]{--primary:#E11D48;--primary-dark:#BE123C;--primary-rgb:225,29,72;--background:#FFF1F2;--surface:#FFFFFF;--surface2:#FFE4E6;--border:#FECDD3;--text-primary:#881337;--text-secondary:#9F1239;--text-muted:#FDA4AF;--like:#E11D48;--verified:#3B82F6;--repost:#10B981;--shadow:0 2px 12px rgba(225,29,72,0.08);--shadow-lg:0 10px 40px rgba(225,29,72,0.15);--nav-bg:rgba(255,241,242,0.92);}

        *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}

        /* Prevent ALL selection/highlight on long press everywhere */
        html, body, * {
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
        }
        /* Re-allow selection only in text inputs and post text */
        input, textarea, .post-text, .bio-text {
            -webkit-user-select: text;
            -moz-user-select: text;
            user-select: text;
        }

        body{font-family:'Inter',sans-serif;background:var(--background);color:var(--text-primary);-webkit-font-smoothing:antialiased;overflow-x:hidden;padding-bottom:calc(100px + env(safe-area-inset-bottom));min-height:100vh;transition:background 0.3s,color 0.3s;}

        @keyframes fadeIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
        @keyframes fadeInUp{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}
        @keyframes shimmer{0%{background-position:200% 0;}100%{background-position:-200% 0;}}
        @keyframes spin{to{transform:rotate(360deg);}}
        @keyframes scaleIn{from{transform:scale(0.9);opacity:0;}to{transform:scale(1);opacity:1;}}
        @keyframes avatarPop{0%{transform:scale(1);}50%{transform:scale(1.06);}100%{transform:scale(1);}}
        @keyframes countPop{0%{transform:scale(1);}40%{transform:scale(1.22);}100%{transform:scale(1);}}
        @keyframes navSlideUp{from{opacity:0;transform:translateX(-50%) translateY(20px);}to{opacity:1;transform:translateX(-50%) translateY(0);}}
        @keyframes badgePop{0%{transform:scale(0.5);}70%{transform:scale(1.2);}100%{transform:scale(1);}}
        @keyframes likeHeart{0%{transform:scale(1);}30%{transform:scale(1.4);}60%{transform:scale(0.85);}100%{transform:scale(1);}}

        .shimmer{background:linear-gradient(90deg,var(--surface2) 25%,var(--border) 50%,var(--surface2) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:6px;}

        .app-container{max-width:100%;margin:0 auto;}
        @media(min-width:1024px){.app-container{max-width:600px;border-left:1px solid var(--border);border-right:1px solid var(--border);}}

        .header{position:sticky;top:0;z-index:50;background:rgba(255,255,255,0.95);backdrop-filter:blur(20px);border-bottom:1px solid transparent;padding:12px 16px;display:flex;align-items:center;gap:12px;transition:border-color 0.3s,background 0.3s;}
        [data-theme="dark"] .header{background:rgba(30,41,59,0.95);}
        [data-theme="midnight"] .header{background:rgba(24,24,27,0.96);}
        [data-theme="ocean"] .header{background:rgba(240,249,255,0.95);}
        [data-theme="rose"] .header{background:rgba(255,241,242,0.95);}
        .header.scrolled{border-bottom-color:var(--border);}
        .back-btn{background:none;border:none;cursor:pointer;color:var(--text-primary);padding:7px;border-radius:50%;display:flex;align-items:center;justify-content:center;transition:background 0.15s;flex-shrink:0;}
        .back-btn:hover{background:var(--surface2);}
        .header-name-wrap{flex:1;min-width:0;opacity:0;transition:opacity 0.2s;}
        .header-name-wrap.show{opacity:1;}
        .header-username{font-size:17px;font-weight:800;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text-primary);}
        .header-post-count{font-size:12px;color:var(--text-muted);}
        .header-actions{display:flex;gap:4px;}
        .header-icon-btn{background:none;border:none;color:var(--text-primary);cursor:pointer;padding:7px;border-radius:50%;display:flex;align-items:center;justify-content:center;transition:background 0.15s;}
        .header-icon-btn:hover{background:var(--surface2);}

        .cover-wrap{position:relative;height:160px;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);overflow:hidden;cursor:pointer;}
        .cover-img{width:100%;height:100%;object-fit:cover;display:block;}
        .cover-overlay{position:absolute;inset:0;background:rgba(0,0,0,0);display:flex;align-items:center;justify-content:center;transition:background 0.2s;opacity:0;}
        .cover-wrap:hover .cover-overlay{background:rgba(0,0,0,0.35);opacity:1;}
        .cover-edit-hint{color:white;font-size:13px;font-weight:600;display:flex;align-items:center;gap:6px;}

        .avatar-row{padding:0 16px;display:flex;align-items:flex-end;justify-content:space-between;margin-top:-36px;margin-bottom:12px;}
        .avatar-wrap{position:relative;flex-shrink:0;}
        .profile-avatar{width:82px;height:82px;border-radius:50%;object-fit:cover;border:4px solid var(--surface);display:block;box-shadow:var(--shadow);transition:transform 0.2s,box-shadow 0.2s;}
        .profile-avatar.clickable{cursor:pointer;}
        .profile-avatar.clickable:hover{transform:scale(1.04);box-shadow:0 4px 20px rgba(var(--primary-rgb),0.3);}
        .profile-avatar.clickable:active{animation:avatarPop 0.3s ease-out;}
        .avatar-edit-btn{position:absolute;bottom:2px;right:2px;width:26px;height:26px;border-radius:50%;background:var(--primary);color:white;border:2px solid var(--surface);display:none;align-items:center;justify-content:center;cursor:pointer;}
        .avatar-edit-btn.own{display:flex;}

        .profile-actions{display:flex;gap:8px;align-items:center;}
        .follow-btn{padding:8px 22px;border-radius:9999px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;transition:all 0.2s;border:none;animation:scaleIn 0.3s ease-out;}
        .follow-btn.follow-action{background:var(--text-primary);color:var(--surface);}
        .follow-btn.follow-action:hover{opacity:0.85;}
        .follow-btn.following-action{background:var(--surface);color:var(--text-primary);border:1.5px solid var(--border);}
        .follow-btn.following-action:hover{border-color:var(--like);color:var(--like);}
        .msg-btn{width:36px;height:36px;border-radius:50%;background:var(--surface);color:var(--text-primary);border:1.5px solid var(--border);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.2s;}
        .msg-btn:hover{border-color:var(--primary);color:var(--primary);}
        .edit-profile-btn{padding:8px 18px;border-radius:9999px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;background:var(--surface);color:var(--text-primary);border:1.5px solid var(--border);transition:all 0.2s;animation:scaleIn 0.3s ease-out;}
        .edit-profile-btn:hover{border-color:var(--primary);color:var(--primary);}
        .more-btn{width:36px;height:36px;border-radius:50%;background:var(--surface);color:var(--text-secondary);border:1.5px solid var(--border);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.2s;position:relative;}
        .more-btn:hover{background:var(--surface2);}
        .more-dropdown{position:absolute;top:calc(100% + 6px);right:0;background:var(--surface);border:1px solid var(--border);border-radius:14px;box-shadow:var(--shadow-lg);min-width:160px;z-index:30;overflow:hidden;display:none;animation:fadeIn 0.15s ease-out;}
        .more-dropdown.open{display:block;}
        .more-dropdown-item{display:flex;align-items:center;gap:10px;padding:11px 14px;font-size:14px;cursor:pointer;color:var(--text-primary);transition:background 0.15s;border:none;background:none;width:100%;text-align:left;font-family:inherit;}
        .more-dropdown-item:hover{background:var(--surface2);}
        .more-dropdown-item.danger{color:var(--like);}

        .bio-section{padding:0 16px 14px;animation:fadeInUp 0.4s ease-out;}
        .display-name-row{display:flex;align-items:center;gap:6px;font-size:20px;font-weight:800;margin-bottom:2px;color:var(--text-primary);}
        .verified-badge{color:var(--verified);display:inline-flex;align-items:center;}
        .username-text{font-size:14px;color:var(--text-secondary);margin-bottom:8px;}
        .bio-text{font-size:15px;line-height:1.55;color:var(--text-primary);margin-bottom:10px;white-space:pre-wrap;word-wrap:break-word;}
        .meta-row{display:flex;flex-wrap:wrap;gap:10px 18px;margin-bottom:10px;}
        .meta-item{display:flex;align-items:center;gap:5px;font-size:13px;color:var(--text-secondary);}
        .meta-item a{color:var(--primary);text-decoration:none;}
        .meta-item a:hover{text-decoration:underline;}

        .stats-row{display:flex;gap:0;padding:0;border-top:1px solid var(--border);border-bottom:1px solid var(--border);background:var(--surface);transition:background 0.3s;}
        .stat-item{display:flex;flex-direction:column;align-items:center;cursor:pointer;flex:1;padding:14px 8px;border-right:1px solid var(--border);transition:background 0.15s;}
        .stat-item:last-child{border-right:none;}
        .stat-item:hover{background:var(--surface2);}
        .stat-item:hover .stat-num{color:var(--primary);}
        .stat-num{font-size:18px;font-weight:800;color:var(--text-primary);line-height:1.2;transition:color 0.2s;display:inline-block;}
        .stat-num.pop{animation:countPop 0.3s cubic-bezier(0.34,1.56,0.64,1);}
        .stat-label{font-size:12px;color:var(--text-muted);font-weight:500;margin-top:2px;}

        .profile-tabs{display:flex;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:56px;z-index:40;transition:background 0.3s;}
        .profile-tab{flex:1;padding:14px 8px;text-align:center;font-size:13px;font-weight:700;color:var(--text-secondary);background:none;border:none;cursor:pointer;position:relative;transition:color 0.2s;font-family:inherit;}
        .profile-tab::after{content:'';position:absolute;bottom:0;left:20%;right:20%;height:3px;border-radius:3px 3px 0 0;background:var(--primary);transform:scaleX(0);transition:transform 0.2s;}
        .profile-tab.active{color:var(--primary);}
        .profile-tab.active::after{transform:scaleX(1);}
        .profile-tab i{display:block;margin:0 auto 4px;}

        .media-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:2px;background:var(--border);}
        .media-cell{aspect-ratio:1;overflow:hidden;cursor:pointer;position:relative;background:var(--surface2);animation:fadeIn 0.3s ease-out both;}
        .media-cell img,.media-cell video{width:100%;height:100%;object-fit:cover;display:block;transition:transform 0.3s;}
        .media-cell:hover img,.media-cell:hover video{transform:scale(1.05);}
        .media-cell-overlay{position:absolute;inset:0;background:rgba(0,0,0,0);display:flex;align-items:center;justify-content:center;gap:12px;color:white;font-size:13px;font-weight:700;transition:background 0.2s;pointer-events:none;}
        .media-cell:hover .media-cell-overlay{background:rgba(0,0,0,0.35);}
        .media-cell-stat{display:flex;align-items:center;gap:4px;}
        .video-badge{position:absolute;top:6px;right:6px;background:rgba(0,0,0,0.6);color:white;border-radius:6px;padding:2px 6px;font-size:11px;font-weight:700;}

        /* ── POST CARDS — identical style to home page ── */
        .post-card{background:var(--surface);border-bottom:1px solid var(--border);padding:16px;animation:fadeIn 0.3s ease-out both;position:relative;transition:background 0.15s;}
        .post-menu{position:absolute;top:16px;right:16px;z-index:10;}
        .post-menu-btn{background:none;border:none;color:var(--text-muted);cursor:pointer;padding:4px;border-radius:50%;display:flex;align-items:center;justify-content:center;}
        .post-header{display:flex;gap:12px;margin-bottom:12px;padding-right:40px;}
        .post-avatar{width:48px;height:48px;border-radius:50%;object-fit:cover;flex-shrink:0;cursor:pointer;}
        .post-meta{flex:1;min-width:0;}
        .post-author-row{display:flex;align-items:center;gap:4px;font-weight:700;font-size:15px;}
        .post-author{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text-primary);}
        .post-handle{color:var(--text-secondary);font-size:14px;font-weight:400;}
        .post-text{font-size:16px;line-height:1.6;margin:12px 0;word-wrap:break-word;white-space:pre-wrap;color:var(--text-primary);}
        .post-text.collapsed{display:-webkit-box;-webkit-line-clamp:4;-webkit-box-orient:vertical;overflow:hidden;white-space:normal;}
        .see-more-btn{color:var(--primary);font-size:14px;font-weight:600;cursor:pointer;background:none;border:none;padding:2px 0 8px;display:inline-block;font-family:inherit;}
        .post-text .mention,.post-text .hashtag,.post-text .post-link{color:var(--primary);font-weight:500;cursor:pointer;text-decoration:none;}
        .post-media{border-radius:16px;overflow:hidden;margin-bottom:12px;border:1px solid var(--border);}
        .post-media img{width:100%;max-height:500px;object-fit:cover;display:block;}
        .post-media video{width:100%;max-height:500px;object-fit:cover;display:block;}
        .actions{display:flex;justify-content:space-between;max-width:400px;margin-top:12px;padding-top:12px;}
        .action-btn{display:flex;align-items:center;gap:6px;color:var(--text-secondary);font-size:13px;font-weight:600;padding:8px;border-radius:50%;cursor:pointer;transition:all 0.2s;background:none;border:none;font-family:inherit;}
        .action-btn:active{transform:scale(0.9);}
        .action-btn.liked{color:var(--like);}
        .action-btn.liked svg{animation:likeHeart 0.4s ease-out;}

        /* ── PILL BOTTOM NAV — identical to home page ── */
        .bottom-nav {
            position: fixed;
            bottom: calc(16px + env(safe-area-inset-bottom));
            left: 50%;
            transform: translateX(-50%);
            width: calc(100% - 32px);
            max-width: 420px;
            background: var(--nav-bg);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--border);
            border-radius: 9999px;
            padding: 8px 12px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 100;
            box-shadow: 0 8px 32px rgba(0,0,0,0.12), 0 2px 8px rgba(0,0,0,0.06);
            animation: navSlideUp 0.4s cubic-bezier(0.34,1.56,0.64,1) both;
            transition: background 0.3s, border-color 0.3s, box-shadow 0.3s;
        }
        [data-theme="dark"] .bottom-nav,[data-theme="midnight"] .bottom-nav{box-shadow:0 8px 32px rgba(0,0,0,0.45),0 2px 8px rgba(0,0,0,0.3);}
        .nav-item{flex:1;display:flex;align-items:center;justify-content:center;padding:10px 4px;background:none;border:none;cursor:pointer;color:var(--text-secondary);transition:color 0.2s,transform 0.15s;position:relative;border-radius:9999px;}
        .nav-item:active{transform:scale(0.85);}
        .nav-item.active{color:var(--text-primary);}
        .nav-item .nav-dot{position:absolute;bottom:3px;left:50%;transform:translateX(-50%) scale(0);width:4px;height:4px;border-radius:50%;background:var(--primary);transition:transform 0.2s cubic-bezier(0.34,1.56,0.64,1);}
        .nav-item.active .nav-dot{transform:translateX(-50%) scale(1);}
        .nav-item .nav-icon-filled{display:none;}
        .nav-item .nav-icon-outline{display:block;}
        .nav-item.active .nav-icon-filled{display:block;}
        .nav-item.active .nav-icon-outline{display:none;}
        .nav-fab{width:44px;height:44px;background:var(--primary);color:white;border:none;border-radius:9999px;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 4px 16px rgba(var(--primary-rgb),0.45);transition:transform 0.2s,box-shadow 0.2s;flex-shrink:0;}
        .nav-fab:active{transform:scale(0.88);box-shadow:0 2px 8px rgba(var(--primary-rgb),0.35);}
        .nav-avatar-ring{width:30px;height:30px;border-radius:50%;border:2px solid transparent;overflow:hidden;transition:border-color 0.2s;}
        .nav-item.active .nav-avatar-ring{border-color:var(--primary);}
        .nav-avatar-ring img{width:100%;height:100%;object-fit:cover;display:block;}
        .nav-badge{position:absolute;top:7px;right:calc(50% - 16px);width:8px;height:8px;border-radius:50%;background:var(--like);border:2px solid var(--surface);display:none;animation:badgePop 0.3s ease-out;}
        .nav-badge.show{display:block;}

        /* ── MODALS ── */
        .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.55);backdrop-filter:blur(4px);z-index:200;opacity:0;pointer-events:none;transition:opacity 0.25s;}
        .modal-overlay.active{opacity:1;pointer-events:auto;}
        .bottom-sheet{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-radius:24px 24px 0 0;padding:0;z-index:201;max-height:80vh;overflow:hidden;transform:translateY(100%);transition:transform 0.3s cubic-bezier(0.4,0,0.2,1);display:flex;flex-direction:column;}
        .modal-overlay.active ~ .bottom-sheet{transform:translateY(0);}
        .sheet-handle{width:36px;height:4px;border-radius:2px;background:var(--border);margin:12px auto 0;}
        .sheet-header{display:flex;align-items:center;justify-content:space-between;padding:12px 20px 10px;border-bottom:1px solid var(--border);flex-shrink:0;}
        .sheet-title{font-size:17px;font-weight:800;color:var(--text-primary);}
        .sheet-close{background:none;border:none;color:var(--text-secondary);cursor:pointer;padding:4px;border-radius:50%;display:flex;align-items:center;justify-content:center;}
        .sheet-body{overflow-y:auto;flex:1;padding-bottom:calc(20px + env(safe-area-inset-bottom));}
        .user-row{display:flex;align-items:center;gap:12px;padding:12px 20px;cursor:pointer;transition:background 0.15s;}
        .user-row:hover{background:var(--surface2);}
        .user-row img{width:46px;height:46px;border-radius:50%;object-fit:cover;flex-shrink:0;}
        .user-row-info{flex:1;min-width:0;}
        .user-row-name-row{display:flex;align-items:center;gap:4px;}
        .user-row-name{font-weight:700;font-size:15px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text-primary);}
        .user-row-handle{font-size:13px;color:var(--text-muted);}
        .user-row-follow{padding:6px 16px;border-radius:9999px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;border:none;background:var(--primary);color:white;transition:opacity 0.2s;}
        .user-row-follow:hover{opacity:0.85;}
        .user-row-follow.following{background:var(--surface2);color:var(--text-primary);border:1.5px solid var(--border);}

        .edit-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.55);backdrop-filter:blur(4px);z-index:300;opacity:0;pointer-events:none;transition:opacity 0.25s;}
        .edit-overlay.active{opacity:1;pointer-events:auto;}
        .edit-sheet{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-radius:24px 24px 0 0;z-index:301;max-height:90vh;overflow-y:auto;transform:translateY(100%);transition:transform 0.3s cubic-bezier(0.4,0,0.2,1);padding:0 0 calc(20px + env(safe-area-inset-bottom));}
        .edit-overlay.active ~ .edit-sheet{transform:translateY(0);}
        .edit-header{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--surface);z-index:10;}
        .edit-title{font-size:17px;font-weight:800;color:var(--text-primary);}
        .edit-cancel{background:none;border:none;color:var(--text-secondary);font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;}
        .edit-save{background:var(--primary);color:white;border:none;padding:8px 20px;border-radius:9999px;font-weight:700;cursor:pointer;font-family:inherit;}
        .edit-avatar-section{display:flex;flex-direction:column;align-items:center;padding:20px 20px 0;gap:10px;}

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getDatabase, ref, get, set, update, remove, push, onValue, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const DEFAULT_AVATAR = "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%2394A3B8' stroke-width='2' stroke-linecap='round' stroke-linejoin='round' style='background-color:%23F1F5F9'%3E%3Cpath d='M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2'/%3E%3Ccircle cx='12' cy='7' r='4'/%3E%3C/svg%3E";

const CLOUDINARY_CLOUD = 'dqkujefxj', CLOUDINARY_PRESET = 'banter_box';

const firebaseConfig = {
    apiKey: "AIzaSyBOyZ3As4GTuNvjemvPF_SpsC6m6vqtNhc",
    authDomain: "fire-b-a8878.firebaseapp.com",
    databaseURL: "https://fire-b-a8878.firebaseio.com",
    projectId: "fire-b-a8878",
    storageBucket: "fire-b-a8878.appspot.com",
    messagingSenderId: "658673187627",
    appId: "1:658673187627:web:6e4c29af661785f0afa36e"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

document.documentElement.setAttribute('data-theme', localStorage.getItem('vynix_theme') || 'light');

let currentUser = null, currentUserData = null;
let profileUid = null, profileData = null;
let isOwnProfile = false, isFollowing = false;
let userPosts = [], activeTab = 'posts';
let editAvatarFile = null, confirmCallback = null;
let unsubFollowers = null, unsubFollowing = null;

onAuthStateChanged(auth, async user => {
    if (!user) { window.location.href = 'signup.html'; return; }
    currentUser = user;
    const params = new URLSearchParams(window.location.search);
    profileUid = params.get('id') || currentUser.uid;
    isOwnProfile = profileUid === currentUser.uid;

    try { await loadCurrentUser(); } catch(e) {
        currentUserData = { uid: currentUser.uid, username: currentUser.email?.split('@')[0] || 'user', displayName: currentUser.displayName || 'User', photoURL: currentUser.photoURL || DEFAULT_AVATAR, verified: false };
    }

    document.getElementById('nav-profile-avatar').src = currentUserData?.photoURL || DEFAULT_AVATAR;

    await loadProfile();

    if (unsubFollowers) { unsubFollowers(); unsubFollowers = null; }
    if (unsubFollowing) { unsubFollowing(); unsubFollowing = null; }

    unsubFollowers = onValue(ref(db, `followers/${profileUid}`), snap => {
        const count = snap.exists() ? Object.keys(snap.val() || {}).length : 0;
        const el = document.getElementById('stat-followers'); if (el) el.textContent = fmt(count);
    });
    unsubFollowing = onValue(ref(db, `following/${profileUid}`), snap => {
        const count = snap.exists() ? Object.keys(snap.val() || {}).length : 0;
        const el = document.getElementById('stat-following'); if (el) el.textContent = fmt(count);
    });

    setupBadgeListeners();
    setupScrollBehavior();
    feather.replace();
});

async function loadCurrentUser() {
    const snap = await get(ref(db, `users/${currentUser.uid}`));
    if (snap.exists()) {
        currentUserData = snap.val();
    } else {
        currentUserData = { uid: currentUser.uid, email: currentUser.email, username: currentUser.email?.split('@')[0] || 'user', displayName: currentUser.displayName || 'User', photoURL: currentUser.photoURL || DEFAULT_AVATAR, verified: false, createdAt: Date.now() };
        await set(ref(db, `users/${currentUser.uid}`), currentUserData);
    }
}

async function loadProfile() {
    const unshimmer = () => { document.getElementById('skeleton').style.display = 'none'; document.getElementById('profile-content').style.display = 'block'; };
    if (!profileUid) { unshimmer(); document.getElementById('tab-posts').innerHTML = emptyTabHtml('alert-circle', 'Invalid Profile', 'No user ID specified.'); return; }
    try {
        const userSnap = await get(ref(db, `users/${profileUid}`));
        if (!userSnap.exists()) { unshimmer(); document.getElementById('tab-posts').innerHTML = emptyTabHtml('user-x', 'User not found', 'This account may have been removed.'); feather.replace(); return; }
        profileData = { uid: profileUid, ...userSnap.val() };
        isFollowing = false; userPosts = [];
        let followerCount = 0, followingCount = 0, totalLikes = 0;
        try { const s = await get(ref(db, `followers/${profileUid}`)); followerCount = s.exists() ? Object.keys(s.val() || {}).length : 0; } catch {}
        try { const s = await get(ref(db, `following/${profileUid}`)); followingCount = s.exists() ? Object.keys(s.val() || {}).length : 0; } catch {}
        if (!isOwnProfile) { try { const s = await get(ref(db, `following/${currentUser.uid}/${profileUid}`)); isFollowing = s.exists(); } catch {} }
        try {
            const postsSnap = await get(ref(db, 'posts'));
            if (postsSnap.exists()) {
                postsSnap.forEach(c => { if (c.val().uid === profileUid) userPosts.push({ id: c.key, ...c.val() }); });
                userPosts.sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0));
                totalLikes = userPosts.reduce((s, p) => s + Object.keys(p.likes || {}).length, 0);
            }
        } catch {}
        unshimmer();
        renderProfile(profileData, followerCount, followingCount, totalLikes);
    } catch(err) {
        document.getElementById('skeleton').style.display = 'none';
        document.getElementById('profile-content').style.display = 'block';
        document.getElementById('tab-posts').innerHTML = emptyTabHtml('alert-circle', 'Something went wrong', err.message || 'Could not load profile.');
        feather.replace();
    }
}

function renderProfile(u, followers, following, likes) {
    document.getElementById('header-username').textContent = u.displayName || u.username || 'User';
    document.getElementById('header-post-count').textContent = `${userPosts.length} post${userPosts.length !== 1 ? 's' : ''}`;
    const coverImg = document.getElementById('cover-img');
    if (u.coverPhoto) { coverImg.src = u.coverPhoto; coverImg.style.display = 'block'; } else { coverImg.style.display = 'none'; }
    if (isOwnProfile) { document.getElementById('cover-wrap').addEventListener('click', () => document.getElementById('cover-input').click()); document.getElementById('cover-overlay').style.display = 'flex'; }
    else { document.getElementById('cover-overlay').style.display = 'none'; }
    const avatarEl = document.getElementById('profile-avatar');
    const photoURL = u.photoURL || DEFAULT_AVATAR;
    avatarEl.src = photoURL;
    avatarEl.onerror = () => { avatarEl.src = DEFAULT_AVATAR; };
    avatarEl.classList.add('clickable');
    if (isOwnProfile) { document.getElementById('avatar-edit-btn').classList.add('own'); }
    else { avatarEl.addEventListener('click', () => openAvatarLightbox(photoURL, u.displayName || u.username || 'User')); }
    renderActions();
    document.getElementById('display-name').textContent = u.displayName || u.username || 'User';
    if (u.verified) document.getElementById('verified-badge').style.display = 'inline-flex';
    document.getElementById('username-text').textContent = `@${u.username || ''}`;
    if (u.bio) { const b = document.getElementById('bio-text'); b.innerHTML = enrichText(esc(u.bio)); b.style.display = 'block'; }
    const meta = [];
    if (u.location) meta.push(`<span class="meta-item"><i data-feather="map-pin" style="width:13px;height:13px;"></i>${esc(u.location)}</span>`);
    if (u.website) meta.push(`<span class="meta-item"><i data-feather="link" style="width:13px;height:13px;"></i><a href="${esc(u.website)}" target="_blank" rel="noopener">${esc(u.website.replace(/^https?:\/\//, ''))}</a></span>`);
    if (u.createdAt) meta.push(`<span class="meta-item"><i data-feather="calendar" style="width:13px;height:13px;"></i>Joined ${new Date(u.createdAt).toLocaleDateString('en-US', { month: 'long', year: 'numeric' })}</span>`);
    document.getElementById('meta-row').innerHTML = meta.join('');
    document.getElementById('stat-followers').textContent = fmt(followers);
    document.getElementById('stat-following').textContent = fmt(following);
    document.getElementById('stat-posts').textContent = fmt(userPosts.length);
    document.getElementById('stat-likes').textContent = fmt(likes);
    if (!isOwnProfile) { document.getElementById('block-btn').style.display = 'flex'; document.getElementById('report-btn').style.display = 'flex'; }
    renderTab(activeTab); feather.replace();
}

function renderActions() {
    const c = document.getElementById('profile-actions');
    if (isOwnProfile) {
        c.innerHTML = `<button class="edit-profile-btn" onclick="openEditSheet()">Edit profile</button>`;
    } else {
        c.innerHTML = `<button class="follow-btn ${isFollowing ? 'following-action' : 'follow-action'}" id="follow-btn" onclick="toggleFollow()">${isFollowing ? 'Following' : 'Follow'}</button><button class="msg-btn" onclick="goToMessage()" title="Message"><i data-feather="mail" style="width:16px;height:16px;"></i></button>`;
    }
    feather.replace();
}

window.switchTab = (tab) => {
    activeTab = tab;
    document.querySelectorAll('.profile-tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
    document.getElementById('tab-posts').style.display = tab === 'posts' ? 'block' : 'none';
    document.getElementById('tab-media').style.display = tab === 'media' ? 'block' : 'none';
    document.getElementById('tab-liked').style.display = tab === 'liked' ? 'block' : 'none';
    renderTab(tab);
};

async function renderTab(tab) {
    if (tab === 'posts') renderPostsTab();
    if (tab === 'media') renderMediaTab();
    if (tab === 'liked') await renderLikedTab();
}

function renderPostsTab() {
    const el = document.getElementById('tab-posts');
    if (!userPosts.length) { el.innerHTML = emptyTabHtml('align-left', 'No posts yet', isOwnProfile ? 'Share your first post!' : 'Nothing here yet.'); feather.replace(); return; }
    el.innerHTML = userPosts.map((p, i) => postCardHtml(p, profileData, i * 40)).join('');
    feather.replace();
}

function renderMediaTab() {
    const el = document.getElementById('tab-media');
    const media = userPosts.filter(p => p.mediaUrl);
    if (!media.length) { el.innerHTML = emptyTabHtml('image', 'No media yet', isOwnProfile ? 'Post a photo or video!' : 'No photos or videos yet.'); feather.replace(); return; }
    el.innerHTML = `<div class="media-grid">${media.map((p, i) => mediaCellHtml(p, i * 30)).join('')}</div>`;
    feather.replace();
}

async function renderLikedTab() {
    const el = document.getElementById('tab-liked');
    el.innerHTML = loadingSpinnerHtml();
    try {
        const snap = await get(ref(db, 'posts'));
        const liked = [];
        if (snap.exists()) snap.forEach(c => { if (c.val().likes?.[profileUid]) liked.push({ id: c.key, ...c.val() }); });
        liked.sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0));
        if (!liked.length) { el.innerHTML = emptyTabHtml('heart', 'No liked posts', isOwnProfile ? 'Posts you like will appear here.' : 'No liked posts yet.'); feather.replace(); return; }
        const uids = [...new Set(liked.map(p => p.uid))];
        const userMap = {};
        await Promise.all(uids.map(async uid => { try { const s = await get(ref(db, `users/${uid}`)); userMap[uid] = s.val() || {}; } catch {} }));
        el.innerHTML = liked.map((p, i) => postCardHtml(p, userMap[p.uid] || {}, i * 40)).join('');
        feather.replace();
    } catch { el.innerHTML = emptyTabHtml('alert-circle', 'Error loading likes', 'Could not load liked posts.'); feather.replace(); }
}

/* ── POST CARD — matches home page style exactly ── */
function postCardHtml(post, user, delay = 0) {
    const lc = Object.keys(post.likes || {}).length;
    const cc = Object.keys(post.comments || {}).length;
    const ul = post.likes?.[currentUser?.uid];
    const ph = user?.photoURL || DEFAULT_AVATAR;
    const text = post.text || '';
    const isLong = text.length > 280;
    const rt = enrichText(esc(text));
    const tr = isLong ? truncateRich(rt, 280) : rt;
    const own = post.uid === currentUser?.uid;
    const isRepost = !!post.isRepost;
    const REPOST_SVG = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>`;
    return `<div class="post-card" id="pc-${post.id}" style="animation-delay:${delay}ms;">
        ${isRepost ? `<div style="display:flex;align-items:center;gap:6px;font-size:12px;font-weight:600;color:var(--repost);margin-bottom:8px;">${REPOST_SVG}<span>Reposted</span></div>` : ''}
        ${own ? `<div class="post-menu"><button class="post-menu-btn" onclick="deletePost('${post.id}',event)" title="Delete"><i data-feather="trash-2" style="width:16px;height:16px;"></i></button></div>` : ''}
        <div class="post-header">
            <img class="post-avatar" src="${ph}" onerror="this.src='${DEFAULT_AVATAR}'" onclick="goToProfilePage('${post.uid}')">
            <div class="post-meta">
                <div class="post-author-row">
                    <span class="post-author">${esc(user?.displayName || 'User')}</span>
                    ${user?.verified ? VERIFIED_SVG : ''}
                </div>
                <div class="post-handle">@${esc(user?.username || 'user')} · ${formatTime(post.timestamp)}</div>
            </div>
        </div>
        ${text ? `<div class="post-text${isLong ? ' collapsed' : ''}" id="pt-${post.id}">${tr}</div>${isLong ? `<button class="see-more-btn" id="ptb-${post.id}" onclick="togglePostText('${post.id}',this)">See more</button>` : ''}` : ''}
        ${post.mediaUrl ? `<div class="post-media">${post.mediaType === 'video'
            ? `<video src="${post.mediaUrl}" controls playsinline style="width:100%;max-height:500px;object-fit:cover;display:block;"></video>`
            : `<img src="${post.mediaUrl}" loading="lazy" onclick="openLightbox('${post.mediaUrl}')" style="cursor:zoom-in;">`
        }</div>` : ''}
        <div class="actions">
            <button class="action-btn ${ul ? 'liked' : ''}" id="pl-${post.id}" onclick="toggleLike('${post.id}')">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="${ul ? 'currentColor' : 'none'}" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
                <span id="plc-${post.id}">${lc}</span>
            </button>
            <button class="action-btn" onclick="window.location.href='home.html#post-${post.id}'">
                <i data-feather="message-circle" style="width:20px;height:20px;"></i>
                <span>${cc}</span>
            </button>
            <button class="action-btn" onclick="sharePost('${post.id}')">
                <i data-feather="share" style="width:20px;height:20px;"></i>
            </button>
        </div>
    </div>`;
}

function mediaCellHtml(post, delay) {
    const l = Object.keys(post.likes || {}).length;
    const c = Object.keys(post.comments || {}).length;
    return `<div class="media-cell" style="animation-delay:${delay}ms;" onclick="${post.mediaType === 'video' ? `window.location.href='home.html#post-${post.id}'` : `openLightbox('${post.mediaUrl}')`}">${post.mediaType === 'video' ? `<video src="${post.mediaUrl}" muted playsinline preload="metadata"></video><div class="video-badge">▶</div>` : `<img src="${post.mediaUrl}" loading="lazy">`}<div class="media-cell-overlay"><span class="media-cell-stat"><i data-feather="heart" style="width:14px;height:14px;" fill="white"></i>${l}</span><span class="media-cell-stat"><i data-feather="message-circle" style="width:14px;height:14px;"></i>${c}</span></div></div>`;
}

function emptyTabHtml(i, t, m) { return `<div class="empty-tab"><div class="empty-tab-icon"><i data-feather="${i}" style="width:26px;height:26px;"></i></div><h3>${t}</h3><p>${m}</p></div>`; }

window.toggleLike = async postId => {
    if (!currentUser) return;
    const lr = ref(db, `posts/${postId}/likes/${currentUser.uid}`);
    const s = await get(lr);
    const btn = document.getElementById(`pl-${postId}`);
    const ce = document.getElementById(`plc-${postId}`);
    const ic = btn?.querySelector('svg');
    let cnt = parseInt(ce?.textContent || '0');
    if (s.exists()) {
        await remove(lr); btn?.classList.remove('liked'); ic?.setAttribute('fill', 'none');
        if (ce) ce.textContent = Math.max(0, cnt - 1);
    } else {
        await set(lr, true); btn?.classList.add('liked'); ic?.setAttribute('fill', 'currentColor');
        if (ce) ce.textContent = cnt + 1;
        if (navigator.vibrate) navigator.vibrate(40);
    }
};

window.deletePost = (postId, e) => {
    e.stopPropagation();
    showConfirm('Delete post?', 'This cannot be undone.', async () => {
        try {
            await remove(ref(db, `posts/${postId}`));
            document.getElementById(`pc-${postId}`)?.remove();
            userPosts = userPosts.filter(p => p.id !== postId);
            document.getElementById('stat-posts').textContent = fmt(userPosts.length);
            document.getElementById('header-post-count').textContent = `${userPosts.length} post${userPosts.length !== 1 ? 's' : ''}`;
            showToast('Post deleted');
        } catch { showToast('Failed to delete post'); }
    });
};

window.togglePostText = (postId, btn) => {
    const el = document.getElementById(`pt-${postId}`);
    if (!el || !btn) return;
    if (el.classList.contains('collapsed')) {
        const p = userPosts.find(p => p.id === postId);
        if (p) el.innerHTML = enrichText(esc(p.text || ''));
        el.classList.remove('collapsed'); btn.textContent = 'See less';
    } else { el.classList.add('collapsed'); btn.textContent = 'See more'; }
};

window.toggleFollow = async () => {
    if (!currentUser || isOwnProfile) return;
    const btn = document.getElementById('follow-btn'); if (!btn) return;
    try {
        if (isFollowing) {
            await remove(ref(db, `following/${currentUser.uid}/${profileUid}`));
            await remove(ref(db, `followers/${profileUid}/${currentUser.uid}`));
            isFollowing = false; btn.textContent = 'Follow'; btn.className = 'follow-btn follow-action';
            showToast('Unfollowed');
        } else {
            await set(ref(db, `following/${currentUser.uid}/${profileUid}`), true);
            await set(ref(db, `followers/${profileUid}/${currentUser.uid}`), true);
            const nr = push(ref(db, `notifications/${profileUid}`));
            await set(nr, { type: 'follow', actorId: currentUser.uid, actorName: currentUserData?.displayName || 'Someone', actorPhoto: currentUserData?.photoURL || '', timestamp: serverTimestamp(), read: false });
            isFollowing = true; btn.textContent = 'Following'; btn.className = 'follow-btn following-action';
            showToast('Following!'); if (navigator.vibrate) navigator.vibrate(40);
        }
    } catch { showToast('Action failed. Try again.'); }
};

window.goToMessage = async () => {
    if (!currentUser || !profileUid) return;
    const ids = [currentUser.uid, profileUid].sort();
    const chatId = ids.join('_');
    const u = {};
    u[`userChats/${currentUser.uid}/${chatId}/otherUid`] = profileUid;
    u[`userChats/${currentUser.uid}/${chatId}/unreadCount`] = 0;
    u[`userChats/${profileUid}/${chatId}/otherUid`] = currentUser.uid;
    try {
        const otherSnap = await get(ref(db, `userChats/${profileUid}/${chatId}/unreadCount`));
        u[`userChats/${profileUid}/${chatId}/unreadCount`] = otherSnap.val() || 0;
        await update(ref(db), u);
        window.location.href = `messages.html?uid=${profileUid}`;
    } catch { showToast('Could not open messages'); }
};

window.showFollowers = async () => {
    document.getElementById('list-sheet-title').textContent = 'Followers';
    document.getElementById('list-sheet-body').innerHTML = loadingSpinnerHtml();
    openListSheet();
    try {
        const snap = await get(ref(db, `followers/${profileUid}`));
        const uids = snap.exists() ? Object.keys(snap.val() || {}) : [];
        document.getElementById('list-sheet-title').textContent = `Followers (${fmt(uids.length)})`;
        await renderUserList(uids, 'list-sheet-body');
    } catch { document.getElementById('list-sheet-body').innerHTML = `<div style="padding:32px;text-align:center;color:var(--text-muted);">Failed to load</div>`; }
};

window.showFollowing = async () => {
    document.getElementById('list-sheet-title').textContent = 'Following';
    document.getElementById('list-sheet-body').innerHTML = loadingSpinnerHtml();
    openListSheet();
    try {
        const snap = await get(ref(db, `following/${profileUid}`));
        const uids = snap.exists() ? Object.keys(snap.val() || {}) : [];
        document.getElementById('list-sheet-title').textContent = `Following (${fmt(uids.length)})`;
        await renderUserList(uids, 'list-sheet-body');
    } catch { document.getElementById('list-sheet-body').innerHTML = `<div style="padding:32px;text-align:center;color:var(--text-muted);">Failed to load</div>`; }
};

async function renderUserList(uids, containerId) {
    const c = document.getElementById(containerId);
    if (!uids.length) { c.innerHTML = `<div style="padding:32px;text-align:center;color:var(--text-muted);">No users yet</div>`; return; }
    let fs; try { fs = await get(ref(db, `following/${currentUser?.uid}`)); } catch { fs = { exists: () => false }; }
    const mf = fs.exists() ? fs.val() : {};
    const htmls = await Promise.all(uids.map(async uid => {
        try {
            const s = await get(ref(db, `users/${uid}`));
            const u = s.val() || {};
            const self = uid === currentUser?.uid;
            const iaf = mf[uid];
            const ph = u.photoURL || DEFAULT_AVATAR;
            return `<div class="user-row" onclick="goToProfilePage('${uid}')"><img src="${ph}" onerror="this.src='${DEFAULT_AVATAR}'" loading="lazy"><div class="user-row-info"><div class="user-row-name-row"><span class="user-row-name">${esc(u.displayName || u.username || 'User')}</span>${u.verified ? `<svg viewBox="0 0 24 24" width="13" height="13" fill="#1D9BF0"><path d="M22.25 12c0-1.43-.88-2.67-2.19-3.34.46-1.39.2-2.9-.81-3.91s-2.52-1.27-3.91-.81c-.66-1.31-1.91-2.19-3.34-2.19s-2.67.88-3.33 2.19c-1.4-.46-2.91-.2-3.92.81s-1.26 2.52-.8 3.91c-1.31.67-2.2 1.91-2.2 3.34s.89 2.67 2.2 3.34c-.46 1.39-.21 2.9.8 3.91s2.52 1.26 3.91.81c.67 1.31 1.91 2.19 3.34 2.19s2.68-.88 3.34-2.19c1.39.45 2.9.2 3.91-.81s1.27-2.52.81-3.91c1.31-.67 2.19-1.91 2.19-3.34zm-11.71 4.2L6.8 12.22l1.41-1.41 2.83 2.83 5.66-5.66 1.41 1.41-7.07 7.22z"/></svg>` : ''}</div><div class="user-row-handle">@${esc(u.username || '')}</div></div>${!self ? `<button class="user-row-follow ${iaf ? 'following' : ''}" onclick="quickFollow(event,'${uid}',this)">${iaf ? 'Following' : 'Follow'}</button>` : ''}</div>`;
        } catch { return ''; }
    }));
    c.innerHTML = htmls.join('') || `<div style="padding:32px;text-align:center;color:var(--text-muted);">No users found</div>`;
    feather.replace();
}

window.quickFollow = async (e, uid, btn) => {
    e.stopPropagation();
    if (!currentUser) return;
    const isF = btn.classList.contains('following');
    try {
        if (isF) {
            await remove(ref(db, `following/${currentUser.uid}/${uid}`));
            await remove(ref(db, `followers/${uid}/${currentUser.uid}`));
            btn.textContent = 'Follow'; btn.classList.remove('following');
        } else {
            await set(ref(db, `following/${currentUser.uid}/${uid}`), true);
            await set(ref(db, `followers/${uid}/${currentUser.uid}`), true);
            const nr = push(ref(db, `notifications/${uid}`));
            await set(nr, { type: 'follow', actorId: currentUser.uid, actorName: currentUserData?.displayName || 'Someone', actorPhoto: currentUserData?.photoURL || '', timestamp: serverTimestamp(), read: false });
            btn.textContent = 'Following'; btn.classList.add('following');
        }
    } catch { showToast('Action failed'); }
};

function openListSheet() { document.getElementById('list-overlay').classList.add('active'); feather.replace(); }
window.closeListSheet = () => document.getElementById('list-overlay').classList.remove('active');

window.openEditSheet = () => {
    if (!profileData) return;
    const u = profileData;
    document.getElementById('edit-avatar-preview').src = u.photoURL || DEFAULT_AVATAR;
    document.getElementById('edit-display-name').value = u.displayName || '';
    document.getElementById('edit-username').value = u.username || '';
    document.getElementById('edit-bio').value = u.bio || '';
    document.getElementById('edit-location').value = u.location || '';
    document.getElementById('edit-website').value = u.website || '';
    updateEditCount(document.getElementById('edit-display-name'), 'name-count', 50);
    updateEditCount(document.getElementById('edit-bio'), 'bio-count', 160);
    updateEditCount(document.getElementById('edit-username'), 'username-count', 30);
    editAvatarFile = null;
    document.getElementById('edit-overlay').classList.add('active');
};
window.closeEditSheet = () => document.getElementById('edit-overlay').classList.remove('active');
window.previewEditAvatar = e => { const f = e.target.files[0]; if (!f) return; editAvatarFile = f; document.getElementById('edit-avatar-preview').src = URL.createObjectURL(f); };
window.updateEditCount = (el, cid, max) => { document.getElementById(cid).textContent = max - (el?.value?.length || 0); };

window.saveProfile = async () => {
    const sb = document.querySelector('.edit-save'); sb.textContent = 'Saving…'; sb.disabled = true;
    try {
        const u = { displayName: document.getElementById('edit-display-name').value.trim(), username: document.getElementById('edit-username').value.trim().toLowerCase().replace(/[^a-z0-9_]/g, ''), bio: document.getElementById('edit-bio').value.trim(), location: document.getElementById('edit-location').value.trim(), website: document.getElementById('edit-website').value.trim() };
        if (editAvatarFile) { const url = await uploadToCloudinary(editAvatarFile, 'avatars'); u.photoURL = url; }
        await update(ref(db, `users/${currentUser.uid}`), u);
        Object.assign(profileData, u);
        document.getElementById('display-name').textContent = u.displayName || u.username || 'User';
        document.getElementById('username-text').textContent = `@${u.username}`;
        document.getElementById('header-username').textContent = u.displayName || u.username;
        if (u.bio) { const b = document.getElementById('bio-text'); b.innerHTML = enrichText(esc(u.bio)); b.style.display = 'block'; }
        if (u.photoURL) { document.getElementById('profile-avatar').src = u.photoURL; document.getElementById('edit-avatar-preview').src = u.photoURL; document.getElementById('nav-profile-avatar').src = u.photoURL; }
        closeEditSheet(); showToast('Profile updated!');
    } catch { showToast('Save failed, try again'); } finally { sb.textContent = 'Save'; sb.disabled = false; }
};

window.uploadCoverPhoto = async e => {
    const f = e.target.files[0]; if (!f) return;
    showToast('Uploading cover…');
    try {
        const url = await uploadToCloudinary(f, 'covers');
        await update(ref(db, `users/${currentUser.uid}`), { coverPhoto: url });
        const i = document.getElementById('cover-img'); i.src = url; i.style.display = 'block';
        profileData.coverPhoto = url; showToast('Cover updated!');
    } catch { showToast('Upload failed'); }
};

window.uploadAvatar = async e => {
    const f = e.target.files[0]; if (!f || !isOwnProfile) return;
    showToast('Uploading…');
    try {
        const url = await uploadToCloudinary(f, 'avatars');
        await update(ref(db, `users/${currentUser.uid}`), { photoURL: url });
        document.getElementById('profile-avatar').src = url;
        document.getElementById('nav-profile-avatar').src = url;
        profileData.photoURL = url; showToast('Photo updated!');
    } catch { showToast('Upload failed'); }
};

window.openAvatarLightbox = (src, name) => { document.getElementById('avatar-lightbox-img').src = src; document.getElementById('avatar-lightbox-name').textContent = name; document.getElementById('avatar-lightbox').classList.add('active'); feather.replace(); };
window.closeAvatarLightbox = () => document.getElementById('avatar-lightbox').classList.remove('active');
window.openLightbox = src => { document.getElementById('lightbox-img').src = src; document.getElementById('lightbox').classList.add('active'); };
window.closeLightbox = () => document.getElementById('lightbox').classList.remove('active');
window.toggleMoreMenu = e => { e.stopPropagation(); document.getElementById('more-dropdown').classList.toggle('open'); };
window.shareProfile = () => { const url = window.location.href; if (navigator.share) navigator.share({ title: profileData?.displayName || 'Profile', url }); else { navigator.clipboard?.writeText(url); showToast('Link copied!'); } document.getElementById('more-dropdown').classList.remove('open'); };
window.copyProfileLink = () => { navigator.clipboard?.writeText(window.location.href); showToast('Link copied!'); document.getElementById('more-dropdown').classList.remove('open'); };
window.blockUser = () => { document.getElementById('more-dropdown').classList.remove('open'); showToast('User blocked'); };
window.reportUser = () => { document.getElementById('more-dropdown').classList.remove('open'); showToast('Report submitted'); };

document.addEventListener('click', e => { if (!e.target.closest('#header-more-btn') && !e.target.closest('.more-dropdown')) document.getElementById('more-dropdown')?.classList.remove('open'); });

function showConfirm(t, m, cb) { confirmCallback = cb; document.getElementById('confirm-title').textContent = t; document.getElementById('confirm-text').textContent = m; document.getElementById('confirm-overlay').classList.add('active'); document.getElementById('confirm-modal').classList.add('active'); }
window.closeConfirm = () => { document.getElementById('confirm-overlay').classList.remove('active'); document.getElementById('confirm-modal').classList.remove('active'); confirmCallback = null; };
window.executeConfirm = () => { closeConfirm(); if (confirmCallback) confirmCallback(); };

function setupScrollBehavior() {
    window.addEventListener('scroll', () => {
        document.getElementById('page-header').classList.toggle('scrolled', window.scrollY > 10);
        document.getElementById('header-name-wrap').classList.toggle('show', window.scrollY > 140);
    });
}

function setupBadgeListeners() {
    if (!currentUser) return;
    onValue(ref(db, `notifications/${currentUser.uid}`), snap => {
        let c = 0; if (snap.exists()) snap.forEach(ch => { if (!ch.val().read) c++; });
        const b = document.getElementById('badge-notifications');
        if (b) { if (c > 0) b.classList.add('show'); else b.classList.remove('show'); }
    });
}

window.goToProfilePage = uid => { if (uid) window.location.href = `profile.html?id=${uid}`; };
window.sharePost = postId => { const url = `${window.location.origin}/home.html#post-${postId}`; if (navigator.share) navigator.share({ url }); else { navigator.clipboard?.writeText(url); showToast('Link copied!'); } };

async function uploadToCloudinary(file, folder) {
    const fd = new FormData(); fd.append('file', file); fd.append('upload_preset', CLOUDINARY_PRESET); fd.append('folder', folder);
    const r = await fetch(`https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD}/upload`, { method: 'POST', body: fd });
    const d = await r.json(); if (!d.secure_url) throw new Error('Upload failed'); return d.secure_url;
}

function esc(s) { const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }
function formatTime(ts) { if (!ts) return ''; const s = Math.floor((Date.now() - ts) / 1000); if (s < 60) return 'just now'; if (s < 3600) return Math.floor(s/60)+'m'; if (s < 86400) return Math.floor(s/3600)+'h'; return Math.floor(s/86400)+'d'; }
function fmt(n) { if (!n && n !== 0) return '0'; if (n >= 1e6) return (n/1e6).toFixed(1).replace('.0','')+'M'; if (n >= 1e3) return (n/1e3).toFixed(1).replace('.0','')+'K'; return String(n); }
function enrichText(h) { return h.replace(/(https?:\/\/[^\s<]+)/g,'<a class="post-link" href="$1" target="_blank" rel="noopener">$1</a>').replace(/@([a-zA-Z0-9_]+)/g,'<span class="mention" onclick="goToProfilePage(\'$1\')">@$1</span>').replace(/#([a-zA-Z0-9_]+)/g,'<span class="hashtag">#$1</span>'); }
function truncateRich(r, l) { const s = r.replace(/<[^>]+>/g,''); if (s.length <= l) return r; let rc=0,i=0; while(i<r.length&&rc<l){if(r[i]==='<'){while(i<r.length&&r[i]!=='>')i++;}else rc++;i++;} let c=i; while(c>0&&r[c]!==' '&&r[c]!=='\n')c--; return r.slice(0,c)+'…'; }
function loadingSpinnerHtml() { return `<div style="padding:32px;text-align:center;"><div style="width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto;"></div></div>`; }
window.showToast = msg => { const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2500); };

feather.replace();
</script>
